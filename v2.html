<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Mapa ELOS · Comportamental</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='47' fill='%23B4823A'/%3E%3Ctext x='50' y='70' font-family='Georgia,serif' font-size='58' font-style='italic' fill='%23FBF3E2' text-anchor='middle'%3E5%3C/text%3E%3C/svg%3E">
<meta name="description" content="Os 5 Elos — Mapa Comportamental do Instituto ELOS. Como você funciona, e onde está a sua alavanca.">
<meta property="og:title" content="Os 5 Elos · Mapa Comportamental ELOS">
<meta property="og:description" content="Um espelho do seu comportamento em 5 valores — e a sua alavanca de mudança.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================ DESIGN SYSTEM ============================ */
:root{
  --bg:#F4EFE7; --bg-grad-a:#F7F2EA; --bg-grad-b:#EFE7DA;
  --ink:#231F1A; --ink-2:#5E574D; --ink-3:#928A7C;
  --line:#E5DCCC; --line-2:#D8CCB8; --card:#FFFFFF;
  --gold:#B4823A; --gold-2:#C99A50; --gold-soft:#EFDFBE; --gold-bg:#FBF3E2;
  --green:#3E7A5C; --green-soft:#D7E9DC; --green-bg:#EAF3EC;
  --terra:#B25B3C; --terra-soft:#F0D7CC;
  --amber:#A6863F; --amber-soft:#EFE3C4;
  --falta:#A6863F; --ponto:#3E7A5C; --excesso:#B25B3C;
  --shadow-sm:0 2px 10px -4px rgba(60,40,15,.18);
  --shadow:0 14px 50px -22px rgba(60,40,15,.40);
  --shadow-lg:0 30px 70px -30px rgba(60,40,15,.45);
  --serif:"Fraunces",ui-serif,Georgia,"Times New Roman",serif;
  --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --r:18px; --r-lg:26px;
  --ease:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);color:var(--ink);line-height:1.55;font-size:16px;
  background:radial-gradient(120% 90% at 50% -10%, var(--bg-grad-a), var(--bg-grad-b) 70%) fixed;
  min-height:100dvh;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  display:flex;flex-direction:column;align-items:center;overflow-x:hidden;
}
.wrap{width:100%;max-width:680px;padding:0 22px;flex:1;display:flex;flex-direction:column}
::selection{background:var(--gold-soft)}

/* ---------- top bar / progress ---------- */
.top{position:sticky;top:0;z-index:20;padding:18px 0 12px;
  background:linear-gradient(var(--bg-grad-a) 62%, transparent);display:flex;align-items:center;gap:14px;opacity:0;transition:opacity .4s}
.top.show{opacity:1}
.logo{font-family:var(--serif);font-weight:600;font-size:16px;letter-spacing:.01em;white-space:nowrap}
.logo b{color:var(--gold);font-style:italic}
.bar{flex:1;height:6px;background:rgba(180,160,130,.22);border-radius:99px;overflow:hidden}
.bar > i{display:block;height:100%;width:0;border-radius:99px;
  background:linear-gradient(90deg,var(--gold-2),var(--gold) 40%,var(--green));transition:width .55s var(--ease)}
.pctn{font-size:12.5px;font-weight:600;color:var(--ink-3);font-variant-numeric:tabular-nums;min-width:36px;text-align:right}

/* ---------- screen transitions ---------- */
.screen{flex:1;display:flex;flex-direction:column;justify-content:center;padding:6px 0 52px}
.enter{animation:enter .55s var(--ease) both}
.leaving{animation:leave .26s ease both}
@keyframes enter{from{opacity:0;transform:translateY(20px) scale(.985)}to{opacity:1;transform:none}}
@keyframes leave{to{opacity:0;transform:translateY(-12px) scale(.99)}}
.stagger > *{animation:enter .5s var(--ease) both}
.stagger > *:nth-child(2){animation-delay:.05s}.stagger > *:nth-child(3){animation-delay:.1s}
.stagger > *:nth-child(4){animation-delay:.15s}.stagger > *:nth-child(5){animation-delay:.2s}
.stagger > *:nth-child(6){animation-delay:.25s}.stagger > *:nth-child(n+7){animation-delay:.3s}

/* ---------- typography ---------- */
.eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:16px}
h1{font-family:var(--serif);font-weight:600;font-size:clamp(33px,8.5vw,50px);line-height:1.04;letter-spacing:-.018em;margin-bottom:20px}
h1 .it{font-style:italic;color:var(--gold)}
.lead{font-size:18px;color:var(--ink);line-height:1.5;margin-bottom:16px}
.sub{font-size:16px;color:var(--ink-2);margin-bottom:18px}
.pull{font-family:var(--serif);font-style:italic;font-size:19px;line-height:1.4;color:var(--ink);
  border-left:3px solid var(--gold-soft);padding-left:18px;margin:22px 0}

/* ---------- buttons / fields ---------- */
.btn{appearance:none;border:none;cursor:pointer;font-family:var(--sans);font-weight:650;font-size:16px;
  background:var(--ink);color:#fff;padding:17px 30px;border-radius:15px;box-shadow:var(--shadow);
  transition:transform .14s var(--ease),box-shadow .2s,filter .2s;display:inline-flex;align-items:center;gap:9px}
.btn:hover{filter:brightness(1.08)}.btn:active{transform:translateY(1px) scale(.985)}
.btn.gold{background:linear-gradient(135deg,var(--gold-2),var(--gold))}
.btn.ghost{background:transparent;color:var(--ink-2);box-shadow:none;border:1.5px solid var(--line-2);font-weight:600}
.row{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.field{width:100%;font:inherit;font-size:18px;padding:17px 18px;border:1.5px solid var(--line-2);border-radius:15px;
  background:var(--card);color:var(--ink);margin:8px 0 20px;box-shadow:var(--shadow-sm);transition:border-color .2s,box-shadow .2s}
.field:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-soft)}
.field::placeholder{color:var(--ink-3)}

/* ---------- question ---------- */
.qhead{display:flex;align-items:center;gap:11px;margin-bottom:18px}
.qnum{font-size:13px;color:var(--gold);font-weight:700;letter-spacing:.04em;font-variant-numeric:tabular-nums}
.qnum span{color:var(--ink-3);font-weight:600}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;letter-spacing:.04em;
  text-transform:uppercase;color:var(--green);background:var(--green-bg);padding:5px 12px;border-radius:99px;border:1px solid var(--green-soft)}
.qtext{font-family:var(--serif);font-weight:500;font-size:clamp(21px,5.2vw,28px);line-height:1.26;margin-bottom:26px;letter-spacing:-.01em}
.opts{display:flex;flex-direction:column;gap:11px}
.opt{display:flex;align-items:center;gap:15px;width:100%;text-align:left;background:var(--card);
  border:1.5px solid var(--line);border-radius:16px;padding:17px 18px;cursor:pointer;font:inherit;font-size:16px;
  color:var(--ink);line-height:1.4;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
  transition:border-color .18s,transform .14s var(--ease),box-shadow .18s,background .18s}
.opt:hover{border-color:var(--gold-soft);transform:translateY(-1px)}
.opt:active{transform:scale(.99)}
.opt .key{font-family:var(--serif);font-weight:600;font-size:15px;color:var(--gold);width:24px;height:24px;flex:none;
  display:grid;place-items:center;border:1.5px solid var(--line-2);border-radius:8px;transition:.18s}
.opt.sel{border-color:var(--gold);background:var(--gold-bg);box-shadow:0 0 0 3px var(--gold-soft),var(--shadow-sm)}
.opt.sel .key{background:var(--gold);color:#fff;border-color:var(--gold)}
.opt.sel::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(201,154,80,.16),transparent);
  animation:sweep .5s var(--ease)}
@keyframes sweep{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.scale{display:flex;gap:8px}
.scale b{flex:1;text-align:center;background:var(--card);border:1.5px solid var(--line);border-radius:13px;
  padding:15px 4px;font:inherit;font-size:13.5px;font-weight:600;color:var(--ink-2);cursor:pointer;line-height:1.2;
  box-shadow:var(--shadow-sm);transition:.16s var(--ease)}
.scale b:hover{border-color:var(--gold-soft);color:var(--ink);transform:translateY(-1px)}
.scale b.sel{background:linear-gradient(135deg,var(--gold-2),var(--gold));color:#fff;border-color:var(--gold);transform:translateY(-2px)}
.skip{display:block;margin:18px auto 0;background:none;border:none;color:var(--ink-3);text-decoration:underline;
  text-underline-offset:3px;cursor:pointer;font:inherit;font-size:14px}
.nav{margin-top:26px}
.back{background:none;border:none;color:var(--ink-3);cursor:pointer;font:inherit;font-size:14.5px;display:inline-flex;align-items:center;gap:6px}
.back:hover{color:var(--ink-2)}
.cheer{margin-top:14px;font-size:13.5px;color:var(--gold);font-weight:600;text-align:center;animation:enter .5s var(--ease)}

/* ---------- computing ---------- */
.computing{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:26px;min-height:60vh}
.orbits{position:relative;width:120px;height:120px}
.orbits .d{position:absolute;width:15px;height:15px;border-radius:99px;top:50%;left:50%;margin:-7px}
.orbits .d:nth-child(1){background:var(--gold)}.orbits .d:nth-child(2){background:var(--green)}
.orbits .d:nth-child(3){background:var(--terra)}.orbits .d:nth-child(4){background:var(--amber)}
.orbits .d:nth-child(5){background:var(--ink)}
.orbits .d{animation:orbit 1.5s var(--ease) infinite}
.orbits .d:nth-child(2){animation-delay:.12s}.orbits .d:nth-child(3){animation-delay:.24s}
.orbits .d:nth-child(4){animation-delay:.36s}.orbits .d:nth-child(5){animation-delay:.48s}
@keyframes orbit{0%,100%{transform:rotate(0deg) translateX(46px) scale(.7);opacity:.5}50%{transform:rotate(180deg) translateX(46px) scale(1.25);opacity:1}}
.computing .t{font-family:var(--serif);font-size:22px;color:var(--ink);font-weight:500}

/* ============================ REPORT ============================ */
.seal{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--green);
  background:var(--green-bg);border:1px solid var(--green-soft);padding:8px 15px;border-radius:99px;margin:8px 0 20px}
.hero{background:linear-gradient(150deg,#28221b,#3c3023 55%,#4a3a26);color:#f7eede;border-radius:var(--r-lg);
  padding:30px 26px;margin:8px 0 28px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;right:-60px;top:-50px;width:220px;height:220px;
  background:radial-gradient(circle,rgba(201,154,80,.5),transparent 68%)}
.hero::after{content:"";position:absolute;left:-40px;bottom:-60px;width:180px;height:180px;
  background:radial-gradient(circle,rgba(62,122,92,.32),transparent 70%)}
.hero .k{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-soft);font-weight:700;position:relative}
.hero .name{font-family:var(--serif);font-weight:600;font-size:clamp(30px,7vw,40px);line-height:1.05;margin:8px 0 12px;position:relative;letter-spacing:-.01em}
.hero p{color:#e8dcc7;font-size:16px;position:relative;margin:0}
.hero .mm{margin-top:16px;font-family:var(--serif);font-style:italic;font-size:17.5px;color:#f8eed8;
  border-top:1px solid rgba(255,255,255,.16);padding-top:15px;position:relative}
.lbl{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:700;margin:34px 0 15px;display:flex;align-items:center;gap:10px}
.lbl::after{content:"";flex:1;height:1px;background:var(--line)}

/* gauges */
.gauge{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 19px;margin-bottom:11px;box-shadow:var(--shadow-sm)}
.gauge .gh{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;gap:8px}
.gauge .gn{font-family:var(--serif);font-weight:600;font-size:17.5px}
.gauge .gr{display:flex;gap:8px;align-items:center}
.tagp{font-size:10.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:3px 9px;border-radius:99px}
.tagp.lev{background:var(--terra-soft);color:#8c3f23}.tagp.for{background:var(--green-soft);color:#2c5942}
.gz{font-size:12.5px;font-weight:700}
.track{position:relative;height:11px;border-radius:99px;display:flex;margin:0 9px;box-shadow:inset 0 1px 3px rgba(0,0,0,.07)}
.track .s{flex:1;height:100%}
.track .s:first-child{border-radius:99px 0 0 99px;background:var(--amber-soft)}
.track .s:nth-child(2){background:var(--green-soft)}
.track .s:last-child{border-radius:0 99px 99px 0;background:var(--terra-soft)}
.nd{position:absolute;top:50%;width:21px;height:21px;border-radius:99px;background:#fff;border:3px solid var(--ink);
  transform:translate(-50%,-50%) scale(0);box-shadow:0 3px 12px -2px rgba(0,0,0,.45);left:50%;transition:left .9s var(--ease) .2s}
.nd.go{animation:pop .5s var(--ease) forwards}
@keyframes pop{to{transform:translate(-50%,-50%) scale(1)}}
.tl{display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink-3);margin:9px 9px 0;font-weight:500}

/* bloco em camadas */
.bloco{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:24px 22px;margin-bottom:15px;box-shadow:var(--shadow-sm)}
.bloco.lead{border:1.5px solid var(--gold-soft);box-shadow:0 0 0 3px var(--gold-soft),var(--shadow)}
.bloco .ban{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:700}
.bloco .epi{font-family:var(--serif);font-weight:600;font-size:24px;margin:5px 0 3px;line-height:1.12;display:flex;align-items:center;gap:11px;flex-wrap:wrap}
.start{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:4px 10px;border-radius:99px;background:linear-gradient(135deg,var(--gold-2),var(--gold));color:#fff}
.estado{font-size:13px;color:var(--ink-2);font-weight:600;margin-bottom:2px}
.voz{font-family:var(--serif);font-style:italic;color:var(--ink-2);font-size:16px;margin:15px 0 0;line-height:1.4}
.lyr{margin-top:15px}
.lyr .h{font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:800;color:var(--gold)}
.lyr.gr .h{color:var(--green)}
.lyr p{margin:4px 0 0;color:var(--ink);font-size:15.5px;line-height:1.5}
.alav{margin-top:8px;display:flex;flex-direction:column;gap:9px}
.alav li{list-style:none;position:relative;padding:12px 14px 12px 38px;background:var(--gold-bg);border:1px solid var(--gold-soft);
  border-radius:12px;font-size:15px;color:var(--ink);line-height:1.45;cursor:pointer;transition:.16s var(--ease)}
.alav li::before{content:"";position:absolute;left:14px;top:15px;width:14px;height:14px;border:1.5px solid var(--gold);border-radius:5px;transition:.16s}
.alav li:hover{transform:translateX(2px)}
.alav li.on{background:#fff;border-color:var(--gold)}
.alav li.on::before{background:var(--gold);box-shadow:inset 0 0 0 2px #fff}
.fill{margin-top:13px;background:var(--bg-grad-b);border:1px dashed var(--gold-2);border-radius:13px;padding:14px 15px;font-size:14.5px;color:var(--ink-2)}
.fill b{color:var(--ink)}
.ponte{margin-top:15px;font-size:15px;color:var(--ink-2);line-height:1.5}
.ponte .h{font-weight:700;color:var(--green);font-size:11px;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:3px}
.bpull{font-family:var(--serif);font-style:italic;font-size:18px;line-height:1.35;color:var(--gold);margin-top:17px;padding-left:16px;border-left:3px solid var(--gold-soft)}
.pcard{background:var(--green-bg);border:1px solid var(--green-soft);border-radius:var(--r);padding:17px 19px;margin-bottom:10px}
.pcard .pe{font-family:var(--serif);font-weight:600;font-size:17px;display:flex;gap:10px;align-items:center}
.pcard .pe i{font-size:10px;font-weight:800;text-transform:uppercase;background:var(--green);color:#fff;padding:3px 9px;border-radius:99px;font-style:normal;letter-spacing:.04em}
.pcard p{margin:8px 0 0;font-size:15px;color:var(--ink)}
.rep{background:linear-gradient(150deg,#163029,#274a3f);color:#eaf3ee;border-radius:var(--r-lg);padding:24px 22px;margin:8px 0}
.rep .k{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--green-soft);font-weight:700}
.rep .n{font-family:var(--serif);font-size:23px;font-weight:600;margin:7px 0 9px}
.rep p{color:#d6e7de;font-size:15px;margin:0}
.close{font-family:var(--serif);font-size:21px;line-height:1.42;color:var(--ink);margin:30px 0 14px}
.close b{color:var(--gold)}

/* guia do lider */
.lcta{background:linear-gradient(150deg,#1d2a25,#243a32);color:#eaf3ee;border-radius:var(--r-lg);padding:24px 22px;margin:20px 0;box-shadow:var(--shadow)}
.lcta .k{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--green-soft);font-weight:700}
.lcta .t{font-family:var(--serif);font-size:21px;font-weight:600;margin:7px 0 8px;line-height:1.15}
.lcta p{color:#cfe0d8;font-size:15px;margin:0 0 16px}
.lcta button{background:#fff;color:#16302a;border:none;border-radius:13px;padding:14px 24px;font:inherit;font-weight:700;font-size:15px;cursor:pointer;box-shadow:var(--shadow);transition:transform .14s var(--ease),filter .2s}
.lcta button:hover{filter:brightness(.96)}.lcta button:active{transform:scale(.98)}
.postura{font-family:var(--serif);font-style:italic;color:var(--ink-2);font-size:16px;margin:6px 0 18px;border-left:3px solid var(--green-soft);padding-left:16px;line-height:1.45}
.lcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px 21px;margin-bottom:13px;box-shadow:var(--shadow-sm)}
.lcard.lead{border:1.5px solid var(--green-soft);box-shadow:0 0 0 3px var(--green-soft),var(--shadow-sm)}
.lcard h3{font-family:var(--serif);font-size:19px;font-weight:600;margin-bottom:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.lb{margin-top:12px}
.lb .h{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--green)}
.lb.w .h{color:var(--terra)}
.lb p{margin:3px 0 0;font-size:15px;color:var(--ink);line-height:1.48}
.lb.q{background:var(--green-bg);border:1px solid var(--green-soft);border-radius:12px;padding:13px 15px;margin-top:15px}
.lb.q p{font-family:var(--serif);font-style:italic;font-size:16px;color:#1f3a30}

.foot{font-size:12.5px;color:var(--ink-3);border-top:1px solid var(--line);margin-top:34px;padding:20px 0 46px;text-align:center;line-height:1.6}
.foot b{color:var(--ink-2)}
.hidden{display:none!important}
@media(max-width:480px){.wrap{padding:0 18px}}
@media print{.top,.nav,.row,.lcta button,.skip{display:none!important}.hidden{display:block!important}body{background:#fff}.hero,.rep,.lcta{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top" id="top"><div class="logo">Os 5 <b>Elos</b></div><div class="bar"><i id="bar"></i></div><div class="pctn" id="pct">0%</div></div>
  <main id="app"></main>
</div>
<script>
"use strict";
/* ════════════════════════ DADOS ════════════════════════ */
const BANK = {"fatores": {"H": [{"area": "Você", "texto": "Se eu quiser algo de uma pessoa de quem não gosto, vou agir de forma bem simpática com ela para conseguir o que quero.", "reverse": true}, {"area": "Dinheiro", "texto": "Se eu soubesse que nunca seria pego, eu estaria disposto a roubar um milhão de reais.", "reverse": true}, {"area": "Você", "texto": "Sou uma pessoa comum, que não é melhor do que as outras.", "reverse": false}, {"area": "Dinheiro", "texto": "Eu não usaria bajulação para conseguir um aumento ou uma promoção no trabalho, mesmo que achasse que daria certo.", "reverse": false}, {"area": "Você", "texto": "Eu gostaria de morar em um bairro muito caro e de alto padrão.", "reverse": true}, {"area": "Dinheiro", "texto": "Se eu quiser algo de alguém, sou capaz de rir até das piores piadas dessa pessoa.", "reverse": true}, {"area": "Você", "texto": "Eu nunca aceitaria uma propina, mesmo que fosse muito alta.", "reverse": false}, {"area": "Dinheiro", "texto": "Acho que tenho direito a mais respeito do que a maioria das pessoas.", "reverse": true}, {"area": "Você", "texto": "Eu não fingiria gostar de alguém só para conseguir que essa pessoa me fizesse favores.", "reverse": false}, {"area": "Dinheiro", "texto": "Eu teria muito prazer em possuir artigos de luxo caros.", "reverse": true}], "E": [{"area": "Saúde", "texto": "Eu sentiria medo se tivesse que viajar em condições de mau tempo.", "reverse": false}, {"area": "Você", "texto": "Às vezes não consigo evitar me preocupar com pequenas coisas.", "reverse": false}, {"area": "Saúde", "texto": "Sinto vontade de chorar quando vejo outras pessoas chorando.", "reverse": false}, {"area": "Você", "texto": "Não me incomodo de fazer tarefas que envolvem trabalho perigoso.", "reverse": true}, {"area": "Saúde", "texto": "Consigo lidar com situações difíceis sem precisar do apoio emocional de ninguém.", "reverse": true}, {"area": "Você", "texto": "Quando se trata de perigo físico, sinto muito medo.", "reverse": false}, {"area": "Saúde", "texto": "Raramente, ou quase nunca, tenho dificuldade para dormir por causa de estresse ou ansiedade.", "reverse": true}, {"area": "Você", "texto": "Sinto emoções fortes quando alguém próximo de mim vai ficar longe por muito tempo.", "reverse": false}, {"area": "Saúde", "texto": "Mesmo em uma emergência, eu não sentiria vontade de entrar em pânico.", "reverse": true}, {"area": "Você", "texto": "Raramente converso sobre meus problemas com outras pessoas.", "reverse": true}], "X": [{"area": "Equipe", "texto": "No geral, me sinto razoavelmente satisfeito comigo mesmo.", "reverse": false}, {"area": "Você", "texto": "Raramente exponho minhas opiniões em reuniões em grupo.", "reverse": true}, {"area": "Equipe", "texto": "Sou cheio de energia quase o tempo todo.", "reverse": false}, {"area": "Você", "texto": "Acho que a maioria das pessoas gosta de alguns aspectos da minha personalidade.", "reverse": false}, {"area": "Equipe", "texto": "Gosto de ter bastante gente por perto para conversar.", "reverse": false}, {"area": "Você", "texto": "Sinto que sou uma pessoa pouco popular.", "reverse": true}, {"area": "Equipe", "texto": "Quando estou em um grupo, costumo ser quem fala em nome de todos.", "reverse": false}, {"area": "Você", "texto": "As pessoas costumam me dizer que eu deveria tentar me animar mais.", "reverse": true}, {"area": "Equipe", "texto": "Às vezes sinto que sou uma pessoa sem valor.", "reverse": true}, {"area": "Você", "texto": "A primeira coisa que sempre faço em um lugar novo é fazer amizades.", "reverse": false}], "A": [{"area": "Equipe", "texto": "Raramente guardo rancor, mesmo das pessoas que me fizeram muito mal.", "reverse": false}, {"area": "Você", "texto": "Às vezes me dizem que sou crítico demais com os outros.", "reverse": true}, {"area": "Equipe", "texto": "As pessoas me veem como alguém de pavio curto.", "reverse": true}, {"area": "Você", "texto": "Minha atitude com quem me tratou mal é 'perdoar e esquecer'.", "reverse": false}, {"area": "Equipe", "texto": "Costumo ser bem flexível nas minhas opiniões quando as pessoas discordam de mim.", "reverse": false}, {"area": "Você", "texto": "Se alguém me enganou uma vez, sempre vou desconfiar dessa pessoa.", "reverse": true}, {"area": "Equipe", "texto": "Costumo ser tolerante ao julgar as outras pessoas.", "reverse": false}, {"area": "Você", "texto": "A maioria das pessoas tende a se irritar mais rápido do que eu.", "reverse": false}, {"area": "Equipe", "texto": "Tenho dificuldade de perdoar completamente alguém que fez algo maldoso comigo.", "reverse": true}, {"area": "Você", "texto": "Tenho dificuldade de ceder quando realmente acho que estou certo.", "reverse": true}], "C": [{"area": "Trabalho", "texto": "Eu limpo meu escritório ou minha casa com bastante frequência.", "reverse": false}, {"area": "Você", "texto": "Quando trabalho, costumo definir metas ambiciosas para mim mesmo.", "reverse": false}, {"area": "Trabalho", "texto": "Tomo minhas decisões com base na emoção do momento, em vez de pensar com cuidado.", "reverse": true}, {"area": "Você", "texto": "Eu planejo e organizo as coisas com antecedência, para não ficar correndo de última hora.", "reverse": false}, {"area": "Trabalho", "texto": "Quando trabalho em algo, não presto muita atenção aos pequenos detalhes.", "reverse": true}, {"area": "Você", "texto": "As pessoas costumam brincar comigo sobre a bagunça do meu quarto ou da minha mesa.", "reverse": true}, {"area": "Trabalho", "texto": "Muitas vezes, quando defino uma meta, acabo desistindo antes de alcançá-la.", "reverse": true}, {"area": "Você", "texto": "Não deixo meus impulsos comandarem o meu comportamento.", "reverse": false}, {"area": "Trabalho", "texto": "Quando trabalho, às vezes tenho dificuldades por ser desorganizado.", "reverse": true}, {"area": "Você", "texto": "As pessoas costumam me chamar de perfeccionista.", "reverse": false}], "O": [{"area": "Você", "texto": "Eu ficaria bastante entediado numa visita a uma galeria de arte.", "reverse": true}, {"area": "Trabalho", "texto": "Tenho interesse em aprender sobre a história e a política de outros países.", "reverse": false}, {"area": "Você", "texto": "Acho que prestar atenção a ideias radicais é perda de tempo.", "reverse": true}, {"area": "Trabalho", "texto": "Eu não gastaria meu tempo lendo um livro de poesia.", "reverse": true}, {"area": "Você", "texto": "Eu gostaria de criar uma obra de arte, como um romance, uma música ou uma pintura.", "reverse": false}, {"area": "Trabalho", "texto": "Se tivesse a oportunidade, eu gostaria de assistir a um concerto de música clássica.", "reverse": false}, {"area": "Você", "texto": "Eu ficaria muito entediado com um livro sobre a história da ciência e da tecnologia.", "reverse": true}, {"area": "Trabalho", "texto": "Eu me considero uma pessoa um tanto excêntrica.", "reverse": false}, {"area": "Você", "texto": "Às vezes eu gosto simplesmente de observar o vento passando pelas árvores.", "reverse": false}, {"area": "Trabalho", "texto": "Eu não me considero do tipo artístico ou criativo.", "reverse": true}]}, "psico": [{"area": "Trabalho", "texto": "Você e um colega tocam uma entrega juntos. A parte que chega até você, pra encaixar com a sua, vem com umas pontas soltas — uns detalhes de acabamento sem fechar. O que você faz?", "opcoes": [{"texto": "Encaixo do jeito que veio e sigo em frente. Esse acabamento quase nunca muda o resultado, e travar tudo pra alinhar cada ponta é o que faz a entrega atrasar — prefiro manter o ritmo e dar conta do que tá na fila."}, {"texto": "Capricho no que pesa, entrego no ponto e sigo. Só que onde eu corto é meio chute: largo um detalhe achando que não importa, ele volta, alguém percebe, e me toca refazer o que eu já tinha dado por fechado."}, {"texto": "Pego pra mim e lapido até ficar redondo, sem empurrar de volta pro colega. O que sai leva o nosso nome junto — então prefiro segurar mais um tempo a deixar passar qualquer coisa torta que eu não assino embaixo."}]}, {"area": "Você", "texto": "Veio à tona uma coisa que você vinha deixando pra lá — daquelas sem prazo marcado, que não pegam fogo, mas que ficam ali cutucando a cabeça. E bateu bem no meio de um dia que já tava cheio. O que você faz?", "opcoes": [{"texto": "Anoto pra não esquecer e sigo no que eu já tava tocando — esse tipo de coisa não pega fogo, dá pra esperar a hora certa. Sair correndo atrás de tudo que aparece, no meio de um dia cheio, é o que me deixa moído à toa. Quando abrir um respiro, eu pego com calma."}, {"texto": "Paro e resolvo agora, enquanto tá fresco na cabeça — escolho essa uma, foco nela até sair e não saio abrindo o resto junto. Só que pra isso eu corto o que eu já tava no meio de fazer, perco o fio da meada, e o que larguei às vezes esfria de vez e não volta. Topo esse preço — pra mim, deixar pra depois é deixar virar mais uma pendência pendurada."}, {"texto": "Paro e já emendo: resolvo essa e, no embalo, vou puxando junto todas as outras pendências que estavam paradas — se a mão já tá na massa, limpo tudo de uma vez. Sei que às vezes abro mais frente do que consigo fechar e o dia descarrila, mas parar no meio com coisa ainda aberta é que não desce em mim."}]}, {"area": "Trabalho", "texto": "Tem um padrão que você defende em voz alta no trabalho — aquele que você é o primeiro a lembrar quando vê um colega deixando passar. Essa semana foi você quem deixou passar, justo nesse ponto, e ninguém reparou. Como você lida com isso?", "opcoes": [{"texto": "Trago à tona e aponto o meu próprio deslize do mesmo jeito que apontaria num colega. Sei que pode soar como quem se acha dono da régua — fazer caso de um detalhe que dava pra deixar quieto, e tem gente próxima que acha isso cansativo. Mas se a régua vale, ela me alcança igual; prefiro o incômodo de levantar do que ficar com a sensação de ter falado uma coisa e feito outra."}, {"texto": "Deixo essa passar. Um tropeço fora da curva não derruba um combinado que é bom — foi um dia atípico, não é quem eu sou nesse ponto. O padrão continua de pé; ficar me crucificando por um deslize isolado não me torna mais coerente, só mais duro comigo à toa."}, {"texto": "Isso fica martelando em mim. Se escorreguei justo naquilo que defendo, fico com a sensação de que a minha palavra valeu menos — e demoro pra soltar, fico remoendo se ainda tenho moral pra puxar o assunto. Levo a sério demais, eu sei, mas coerência pra mim não é detalhe."}]}, {"area": "Trabalho", "texto": "Um colega seu tá rendendo menos e dá pra perceber que tá passando por uma fase difícil. O que você faz?", "opcoes": [{"texto": "Sigo no mesmo trato de sempre, cordial e na minha, sem mudar o tom por causa do que ele tá vivendo. Não fico cavando a vida dele — se não me chamou, é porque quer resolver do jeito dele, e respeitar esse espaço pra mim também é um jeito de cuidar."}, {"texto": "Pego uma parte concreta do que dá pra carregar e devolvo o resto pra ele tocar — mesmo sabendo que vou parecer meio seco largando o que sobra na mão dele justo nessa fase. Ajudo no que cabe em mim e não furo esse limite."}, {"texto": "Falo 'pode deixar comigo' antes mesmo dele pedir e puxo um pedaço das tarefas dele pra cima das minhas. Seguro tudo calado, mesmo me apertando — ver alguém afundando sozinho numa fase dessas eu não consigo, prefiro me virar dobrado a deixar ele com esse peso nas costas."}]}, {"area": "Equipe", "texto": "Uma pessoa do trabalho de quem você gosta de verdade, quase um amigo, vive deixando a parte dele pela metade num combinado que é de todo mundo — e a conta acaba sobrando pro grupo. O pessoal já reparou e começou a cochichar. O que você faz?", "opcoes": [{"texto": "Acabo desabafando com uma pessoa de confiança — preciso pôr isso pra fora pra não ir azedando por dentro nem explodir na hora errada. Bater de frente com ele não é meu forte; prefiro aliviar a tensão com quem me entende a engolir tudo calado."}, {"texto": "Chamo ele num canto e falo na lata, com cuidado, o que tá me incomodando — direto pra ele, não pros outros. Só sei que, dentro de uma amizade, isso cobra um preço: pode soar como puxão de tapete, ele se fechar comigo e a gente esfriar — e nem sempre volta a ser como era."}, {"texto": "Seguro o incômodo pra não magoar — ele é gente boa, e apontar isso ia só constranger. Vou cobrindo a parte que falta calado e torço pra ele se tocar sozinho, sem precisar ouvir de mim."}]}], "norms": {"H": {"mean": 3.19, "sd": 0.62}, "E": {"mean": 3.43, "sd": 0.62}, "X": {"mean": 3.5, "sd": 0.57}, "A": {"mean": 2.94, "sd": 0.58}, "C": {"mean": 3.44, "sd": 0.56}, "O": {"mean": 3.41, "sd": 0.6}}};
const CONTENT = {"H": {"fator": "H", "nomeElos": "Postura", "essencia": "Postura mede o quanto você joga limpo quando levar vantagem seria fácil e ninguém ficaria sabendo.", "niveis": {"baixo": {"epi": "Leva vantagem", "da": "Você não deixa dinheiro na mesa. Negocia duro, lê a relação de força, usa imagem e status como ferramenta e vende a si mesmo sem travar. Onde o outro hesita por escrúpulo, você fecha. No curto prazo, ninguém te passa a perna.", "custa": "Confiança é a única moeda que não se compra de volta. Quando o pessoal percebe que você sempre puxa a brasa pra sua sardinha, começa a contar os talheres depois que você sai da sala. Você ganha a negociação e perde o sócio, o cliente que te indicaria, o funcionário que vestiria a camisa. Sobra a vitória — e a solidão dela.", "alavanca": "Nos próximos dias, escolhe UMA negociação onde você normalmente espremeria até a última gota e deixa algo na mesa de propósito. Entrega mais do que combinou pra alguém que não tem como te retribuir agora. Isso não é bondade, é abrir uma conta de reputação que rende juros por anos."}, "medio": {"epi": "Na medida", "da": "Você joga limpo sem ser ingênuo. Tem palavra, mas não é otário — sabe a hora de ceder e a hora de bater o pé. As pessoas confiam em você e ainda assim te respeitam na queda de braço. É o terreno onde negócio bom e noite de sono dormem juntos.", "custa": "O meio também é um ótimo lugar pra se esconder. Tem hora que 'equilíbrio' é o nome bonito que você dá pra fugir de uma posição firme que ia custar caro. Você fica em cima do muro, não desagrada ninguém e, no processo, ninguém sabe exatamente onde você está. Ficar bem com todo mundo é o primeiro passo pra não significar nada pra ninguém.", "alavanca": "Nos próximos dias, acha UMA situação em que você vem adiando tomar posição clara só pra continuar confortável e fala o que pensa, com nome e sobrenome. Em cima do muro não se constrói nada."}, "alto": {"epi": "Reto", "da": "Sua palavra vale escritura. As pessoas fecham com você de olhos fechados porque sabem que não tem segunda intenção, não tem letra miúda, não tem você de dois rostos. Você dorme tranquilo porque não carrega uma versão pra esconder. Num mundo de personagem, gente assim virou ativo raro.", "custa": "O mercado não premia santo. Enquanto você mantém a mão limpa, alguém menos preocupado com isso almoça o seu cliente. E tem o outro lado: por achar feio se valorizar, você cobra menos do que entrega, não reivindica o status que já conquistou e ainda olha torto pra quem joga o jogo. Cuidado — ser correto não é a mesma coisa que ser invisível, e às vezes você confunde os dois.", "alavanca": "Nos próximos dias, pega um lugar onde você se encolhe por 'modéstia' — um preço que você não sobe, um mérito que você não assume — e reivindica em voz alta o que é seu por direito. Cobrar o justo não te deixa menos reto. Te deixa menos refém."}}}, "E": {"fator": "E", "nomeElos": "Sensibilidade", "essencia": "Mede o quanto você sente — medo, preocupação, apego ao outro — e o quanto o que sente entra na sala na hora de decidir.", "niveis": {"baixo": {"epi": "Não treme", "da": "Você não treme. A pressão que paralisa os outros passa por você sem deixar marca — decide no susto, encara o risco que faz a maioria recuar e segura a crise sem se descontrolar. Quando tudo desaba, é a sua cabeça que continua funcionando.", "custa": "Quem não sente o próprio medo também não sente o do outro. Você passa por cima de sinais que devia ouvir, e quem trabalha do seu lado te acha distante, difícil de chegar perto. Não precisar de colo é força até o dia em que vira não saber receber ajuda nenhuma — e aí você carrega o que não precisava carregar sozinho.", "alavanca": "Nos próximos dias, numa decisão que importa, pergunte a uma pessoa de confiança como ela se sente sobre aquilo — e segure o impulso de já rebater com lógica. Ouça o sentimento dela inteiro antes de filtrar. Você vai notar dado que o número não te deu."}, "medio": {"epi": "Na medida", "da": "Você sente o suficiente pra ler a sala e se importar de verdade, sem deixar a emoção sequestrar o volante. Conecta com gente e ainda decide com a cabeça no lugar. Sabe a hora de baixar a guarda e a hora de segurar — e isso é mais raro do que parece.", "custa": "O risco do meio é virar morno. Nem a frieza que aguenta a crise pesada sem piscar, nem a entrega que faz o outro se sentir realmente visto. No momento extremo — aquele que define — você pode ficar em cima do muro quando o que se exigia era um lado. Equilíbrio que não se posiciona vira ausência.", "alavanca": "Nos próximos dias, repare em qual ponta você se apoia quando aperta de verdade: corre pra planilha ou pro sentimento? Da próxima vez, escolha de propósito qual usar — em vez de deixar a situação escolher por você no automático."}, "alto": {"epi": "Sente tudo", "da": "Você percebe o que não foi dito. Sente o clima virar antes de virar, se importa de verdade, e quem está perto sabe que é cuidado — não atuação. Essa ligação prende: gente não larga quem faz ela se sentir vista. É a sua maior arma de fidelização, e você nem cobra por ela.", "custa": "Sentir tudo tem fatura. Você carrega o peso que era do outro, perde o sono com o que talvez nunca aconteça e leva pro lado pessoal o que era só negócio. Preocupação demais trava a decisão na hora de agir. E quem não aguenta decidir sozinho acaba entregando o leme pra quem não merece — só pra não ficar com o medo na mão.", "alavanca": "Nos próximos dias, quando a preocupação bater forte, escreva o que você teme que aconteça e, ao lado, a chance real disso acontecer. Separe o perigo verdadeiro do barulho. Boa parte do peso não sobrevive ao papel — e o que sobrar, aí sim, merece sua energia."}}}, "X": {"fator": "X", "nomeElos": "Presença", "essencia": "Mede quanta energia e espaço você ocupa quando está no meio de gente — se puxa a frente e se sente bem em cena, ou se prefere a borda da sala.", "niveis": {"baixo": {"epi": "Reservado", "da": "Você não precisa de plateia pra existir. Escuta antes de falar, lê a sala em silêncio, e quando abre a boca é porque tem o que dizer. Num ambiente cheio de barulho, peso vem de quem segura a palavra.", "custa": "Só que empresa também se vende no olho, na voz, na presença. Se você some na própria reunião, o mercado não percebe que você existe e a sua equipe não sente pra onde ir. Negócio bom que ninguém nota morre quieto. Tem dinheiro e liderança que você deixa na mesa só por economizar presença.", "alavanca": "Nos próximos dias eu escolho uma reunião e sou o primeiro a falar — não a melhor fala, a primeira. Ocupo o espaço antes que o silêncio me ocupe."}, "medio": {"epi": "Na medida", "da": "Você lê a sala. Puxa a frente quando precisa, recua quando é o outro que tem de brilhar. Tem voz sem gritar, presença sem dominar. É o lugar raro: ninguém te acha apagado nem te acha cansativo.", "custa": "O risco do meio é virar morno. De tanto se ajustar à sala, tem hora que ninguém sabe onde você de fato pisa. Versatilidade demais apaga a sua marca — te respeitam, mas não te seguem. Cuidado pra 'saber a hora' não virar desculpa pra nunca bancar a sua.", "alavanca": "Nos próximos dias eu pego um assunto onde costumo me ajustar e banco uma posição clara, mesmo contra a corrente da sala. Pra sentir na pele a diferença entre ler a sala e sumir nela."}, "alto": {"epi": "Ocupa a sala", "da": "Você entra e o ambiente muda. Energia, voz, vontade de puxar a frente — você mobiliza, vende, contagia. A equipe sente o seu pique, o cliente compra o seu entusiasmo. Lugar nenhum fica parado com você dentro.", "custa": "Mas quem ocupa a sala inteira não sobra espaço pra mais ninguém. Você fala tanto que parou de escutar — e decisão tomada no carisma, e não na substância, cobra caro depois. Sua equipe pode estar concordando com a sua energia, não com a sua ideia. E no dia em que você cansa, o negócio desinfla junto, porque virou dependente do seu pique. Aplauso não é a mesma coisa que acordo.", "alavanca": "Nos próximos dias, numa reunião que eu normalmente conduzo, eu fico calado nos primeiros dez minutos e deixo os outros ocuparem o vazio. Vou descobrir o que a minha presença andava abafando."}}}, "A": {"fator": "A", "nomeElos": "Temperamento", "essencia": "Mede como você lida com o atrito com o outro: se cede ou bate o pé, se perdoa ou remói, se dá o benefício da dúvida ou cobra na hora.", "niveis": {"baixo": {"epi": "Durão", "da": "Você não cede no que importa. Cobra o que é seu, fala a verdade que trava na garganta dos outros e não deixa erro passar batido. Numa mesa de negociação, você não amarela — segura a linha até o fim, e é por isso que poucos te empurram.", "custa": "Você ganha a discussão e perde a pessoa. Remói o que te fizeram, e a mágoa vira muro. A equipe pisa em ovos perto de você, mede cada palavra — e quem mede palavra esconde problema. Em casa, o pavio que acende rápido cobra um preço que o mercado não vê.", "alavanca": "Nos próximos dias eu escolho uma briga que não vale a pena e deixo passar de propósito. E numa cobrança que ia sair seca, eu pergunto antes de sentenciar — dou o benefício da dúvida em vez de já concluir o pior."}, "medio": {"epi": "No ponto", "da": "Você lê a situação antes de reagir. Cede onde dá pra ceder, crava onde não pode abrir mão. Perdoa sem virar bobo, cobra sem queimar o outro. As pessoas chegam em você sabendo que vão ser ouvidas — e que não vão te enrolar.", "custa": "O meio-termo tem uma armadilha: de longe, ninguém sabe onde fica a sua linha. Hoje você releva, amanhã você crava o pé no mesmo assunto — e o outro não decifra qual versão vai encontrar. Quando o critério mora só na sua cabeça, vira loteria pra quem trabalha com você.", "alavanca": "Nos próximos dias eu escrevo, antes da hora quente, onde eu cedo e onde eu não abro mão. Decidir a régua a frio é o que separa equilíbrio de oscilação — e dá ao outro um chão pra pisar."}, "alto": {"epi": "Pano quente", "da": "Você mantém a relação inteira mesmo quando o assunto é líbrio que a maioria persegue e poucos sustentam — confiável sem ser engessado.", "custa": "O risco é o conforto. 'Tá bom' vira o seu teto. Quando aperta, você pende pro lado que dá menos trabalho no dia, e o que poderia ser excelente para no aceitável. Ninguém te cobra além disso — então você também não se cobra, e o bom vira inimigo do ótimo bem debaixo do seu nariz.", "alavanca": "Nos próximos dias, pegue um processo que está no 'tá bom' e suba a régua de propósito: defina como seria o feito-bem-feito de verdade e entregue nesse nível uma vez, só pra sentir na pele a diferença que mora ali."}, "alto": {"epi": "Exigente", "da": "Você é a pessoa que termina. Planeja, confere, capricha, cumpre prazo. Quem trabalha com você sabe que o que sai da sua mão sai inteiro — e essa confiabilidade virou a sua reputação. Onde tem padrão e disciplina, você entrega o que prometeu, do jeito que prometeu.", "custa": "O preço é o gargalo ser você. Detalhe vira obsessão, delegar dói porque ninguém faz no seu padrão, e tem entrega que não sai porque 'ainda não está pronta'. Você confunde controle com excelência — e enquanto lapida a vírgula, o mercado já virou a página. Não adianta a obra ser perfeita se ela nunca fica pronta.", "alavanca": "Nos próximos dias, escolha uma entrega e mande no 'bom o suficiente' de propósito — pronto e na rua vale mais que perfeito na gaveta. E delegue uma tarefa inteira aceitando, sem retomar, que ela vai sair em 80% do seu padrão."}}}, "O": {"fator": "O", "nomeElos": "Abertura", "essencia": "Mede o quanto você corre atrás do novo — ideia diferente, método diferente, jeito que ninguém testou — em vez de ficar no que já conhece e já dá resultado.", "niveis": {"baixo": {"epi": "Pragmático", "da": "Você não se perde em modinha. O que já provou que funciona, você roda até o fim, sem trocar de estratégia toda semana porque viu algo brilhando. Enquanto o mercado corre atrás de cada novidade, você entrega o feijão com arroz bem feito — e é isso que paga a conta no fim do mês.", "custa": "O mundo muda e você é o último a perceber. Novidade, pra você, é incômodo antes de ser oportunidade — então você descarta como 'frescura' justo o que o concorrente está usando pra te ver de longe. No dia em que o jeito que sempre funcionou parar de funcionar, você não vai ter um plano B, porque nunca achou que precisaria de um.", "alavanca": "Nos próximos dias eu separo uma hora pra olhar de perto uma coisa que já descartei como bobagem — uma ferramenta, um jeito novo de vender, um concorrente fora do meu padrão. Não pra adotar. Pra entender por que gente séria aposta nisso. Se eu não souber responder, é sinal de que descartei rápido demais."}, "medio": {"epi": "Na medida", "da": "Você ouve a ideia nova sem largar o que funciona. Testa sem se apaixonar, pega o que serve, descarta o resto — e raramente compra gato por lebre. É a posição que dá estabilidade pra navegar mudança sem virar refém dela nem ignorá-la.", "custa": "O risco do meio é virar morno: nem a ousadia que abre um mercado novo, nem a teimosia que termina o que começou. Tem hora que o negócio precisa de uma aposta fora da curva pra sair do lugar — e você, equilibrado, deixa passar e fica vendo quem ousou colher. Equilíbrio é boa base, mas péssimo desempate.", "alavanca": "Nos próximos dias eu escolho UMA frente do negócio pra sair do meio de propósito — ou apostando fundo numa ideia diferente que eu vinha adiando, ou cortando seco uma novidade que só me distrai. O ponto é decidir pra que lado pender, em vez de ficar parado no centro achando que é prudência."}, "alto": {"epi": "Inquieto", "da": "Você enxerga oportunidade onde os outros só veem risco. Aprende rápido, conecta o que ninguém conecta, e quando o mercado vira você já estava olhando pra lá. Negócio com você na frente não morre de obsolescência — está sempre meia volta adiante de quem só copia.", "custa": "Mas ideia demais sem chão vira bagunça cara. Você começa três coisas e termina nenhuma, troca a rota antes dela respirar, e cansa quem trabalha com você de tanto recomeçar do zero. Cuidado: às vezes 'inovar' é só um nome bonito pra fugir do tédio de executar o que você mesmo já decidiu. Negócio não quebra por falta de ideia — quebra de ideia trocada toda semana.", "alavanca": "Nos próximos dias eu pego UMA coisa que já está rodando e me proíbo de mexer nela — só executo e termino. A pergunta deixa de ser 'o que mais dá pra inventar' e passa a ser 'o que eu já comecei e ainda não levei até o fim'. Disciplina, pra você, é parar de ter ideia nova antes da antiga dar resultado."}}}};

/* CONSTANTES */
const VK = ["ex","in","co","al","le"];
const NOME = {ex:"Excelência",in:"Intensidade",co:"Congruência",al:"Alma",le:"Lealdade"};
const BANNER = {ex:"Sua entrega · Excelência",in:"Sua chama · Intensidade",co:"Sua verdade · Congruência",al:"Seu coração · Alma",le:"Seu barco · Lealdade"};
const FREQ = ["Discordo muito","Discordo","Mais ou menos","Concordo","Concordo muito"];
const AREA_ICON = {"Trabalho":"💼","Família":"🏡","Saúde":"🌱","Equipe":"🤝","Dinheiro":"💸","Pressão":"⏱️","Você":"🪞","Casa":"🏡","Excelência":"✦"};
const CHEERS = {6:"Tá fluindo bem.",12:"Mais da metade — segue assim.",18:"Reta final.",24:"Quase lá. 🌟"};

/* ════════════════════════ MOTOR ════════════════════════ */
const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
function buildQuestions(){
  let light=[], heavy=[];
  ["H","E","X","A","C","O"].forEach(f=>(BANK.fatores[f]||[]).forEach(it=>{
    light.push({type:"freq",f,area:it.area,texto:it.texto,reverse:it.reverse});
  }));
  (BANK.psico||[]).forEach(p=> heavy.push({type:"mc",area:p.area,texto:p.texto,reflect:true,opts:shuffle(p.opcoes.map(o=>({t:o.texto})))}));
  shuffle(light); shuffle(heavy);
  const out=[]; out.push(...light.splice(0,2));
  const gap=Math.max(1,Math.floor(light.length/(heavy.length+1)));
  let li=0,hi=0,since=0;
  while(li<light.length||hi<heavy.length){
    if(hi<heavy.length && since>=gap && (light.length-li)>0){ out.push(heavy[hi++]); since=0; }
    else if(li<light.length){ out.push(light[li++]); since++; }
    else if(hi<heavy.length){ out.push(heavy[hi++]); }
  }
  return out;
}
const FATS=["H","E","X","A","C","O"];
function score(){
  const N=BANK.norms, sum={},cnt={}; FATS.forEach(f=>{sum[f]=0;cnt[f]=0;});
  Q.forEach((q,i)=>{ const a=ans[i];
    if(q.type==="freq"&&typeof a==="number"&&a>=1&&a<=5){ const v=q.reverse?(6-a):a; sum[q.f]+=v; cnt[q.f]++; }
  });
  const st={f:{}};
  FATS.forEach(f=>{ const mean=cnt[f]?sum[f]/cnt[f]:3; const z=(mean-N[f].mean)/N[f].sd;
    let pos=Math.round(50+z*20); pos=Math.max(4,Math.min(96,pos));
    const lv=z<-0.5?"baixo":z>0.5?"alto":"medio"; st.f[f]={mean,z,score:pos,level:lv}; });
  return st;
}

const Q = buildQuestions(); const N = Q.length;
const ans = {}; let step=0, nome="", leaderOpen=false;
const app=document.getElementById("app");
const $top=document.getElementById("top"), $bar=document.getElementById("bar"), $pct=document.getElementById("pct");

function progress(){ const s = step===0?0:(step>N?100:Math.round(step/(N+1)*100)); $bar.style.width=s+"%"; $pct.textContent=s+"%"; $top.classList.toggle("show",step>0&&step<=N); }
function paint(html,cls){ app.innerHTML=`<section class="screen ${cls||"enter"}">${html}</section>`; }
function transition(next){ const s=app.firstElementChild; if(s){s.classList.add("leaving"); setTimeout(next,200);} else next(); }
function goto(s){ step=Math.max(0,s); window.scrollTo({top:0,behavior:"instant"}); render(); }
function render(){ progress(); if(step===0) return Intro(); if(step>=1&&step<=N) return Question(step-1); return Report(); }

/* ════════════════════════ TELAS ════════════════════════ */
function Intro(){
  paint(`
    <div class="eyebrow">Mapa Comportamental ELOS</div>
    <h1>Mapa <span class="it">ELOS</span></h1>
    <p class="lead">Aqui não tem teste de certo ou errado — tem um <b>espelho</b>. Por situações do dia a dia, ele mostra como você funciona e onde está a sua alavanca.</p>
    <p class="sub">Não pense muito: escolha o que você <b>realmente faria</b>. Leva uns 8 minutos — e passa voando.</p>
    <label style="font-size:14px;color:var(--ink-2);font-weight:600">Como você se chama?</label>
    <input class="field" id="nm" placeholder="Seu primeiro nome" autocomplete="given-name" />
    <div class="row"><button class="btn gold" id="go">Começar &nbsp;→</button></div>`);
  const inp=document.getElementById("nm"); inp.value=nome;
  const begin=()=>{ nome=inp.value.trim(); transition(()=>goto(1)); };
  document.getElementById("go").onclick=begin;
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter") begin(); });
  setTimeout(()=>inp.focus(),300);
}
function Question(i){
  const q=Q[i], cur=ans[i], ic=AREA_ICON[q.area]||"";
  let body;
  if(q.type==="freq"){
    body=`<div class="scale">${FREQ.map((l,k)=>`<b class="${cur===k+1?"sel":""}" data-v="${k+1}">${l}</b>`).join("")}</div>`;
  } else {
    body=`<div class="opts">${q.opts.map((o,k)=>`<button class="opt ${cur===k?"sel":""}" data-k="${k}"><span class="key">${String.fromCharCode(65+k)}</span><span>${o.t}</span></button>`).join("")}</div>
      <button class="skip" data-k="skip">nenhuma combina comigo</button>`;
  }
  const cheer = CHEERS[i] ? `<div class="cheer">${CHEERS[i]}</div>` : "";
  paint(`
    <div class="qhead"><span class="qnum">${i+1} <span>/ ${N}</span></span><span class="chip">${ic} ${q.area}</span></div>
    <div class="qtext">${q.texto}</div>${body}${cheer}
    <div class="nav">${i>0?`<button class="back" id="bk">← voltar</button>`:""}</div>`);
  const choose = val => { ans[i]=val; // re-marca visual
    app.querySelectorAll(".opt,.scale b").forEach(el=>el.classList.remove("sel"));
    const sel = q.type==="freq" ? app.querySelector(`.scale b[data-v="${val}"]`) : app.querySelector(`.opt[data-k="${val}"]`);
    if(sel) sel.classList.add("sel");
    setTimeout(()=>transition(()=>goto(step+1)),230);
  };
  app.querySelectorAll(".opt").forEach(b=>b.onclick=()=>choose(b.dataset.k==="skip"?"skip":+b.dataset.k));
  app.querySelectorAll(".scale b").forEach(b=>b.onclick=()=>choose(+b.dataset.v));
  const sk=app.querySelector(".skip"); if(sk) sk.onclick=()=>choose("skip");
  const bk=document.getElementById("bk"); if(bk) bk.onclick=()=>transition(()=>goto(step-1));
}
function Report(){
  // tela de "montando" → revela
  paint(`<div class="computing"><div class="orbits"><span class="d"></span><span class="d"></span><span class="d"></span><span class="d"></span><span class="d"></span></div><div class="t">Montando o seu mapa…</div></div>`,"enter");
  $top.classList.remove("show");
  setTimeout(()=>transition(renderReport),1300);
}
function renderReport(){
  const st=score(), Nm=nome||"Você", C=CONTENT;
  const ord=FATS.slice().sort((a,b)=>Math.abs(st.f[b].score-50)-Math.abs(st.f[a].score-50));
  const head=ord.slice(0,2).map(f=>C[f].nomeElos);
  const gauges=FATS.map(f=>{ const s=st.f[f], b=C[f];
    const col=s.level==="medio"?"var(--ponto)":"var(--gold)";
    return `<div class="gauge"><div class="gh"><span class="gn">${b.nomeElos}</span><span class="gr"><span class="gz" style="color:${col}">${b.niveis[s.level].epi}</span></span></div>
      <div class="track"><span class="s"></span><span class="s"></span><span class="s"></span><span class="nd" data-pos="${s.score}"></span></div>
      <div class="tl"><span>${b.niveis.baixo.epi}</span><span>·</span><span>${b.niveis.alto.epi}</span></div></div>`;}).join("");
  const blocos=ord.map((f,i)=>{ const b=C[f], lv=b.niveis[st.f[f].level], lead=i===0;
    return `<div class="bloco ${lead?"lead":""}"><div class="epi">${b.nomeElos} — ${lv.epi} ${lead?'<span class="start">Seu traço mais marcante</span>':""}</div>
      <div class="estado">${b.essencia}</div>
      <div class="lyr"><span class="h">O que isso te dá</span><p>${lv.da}</p></div>
      <div class="lyr w"><span class="h">Onde pode te custar</span><p>${lv.custa}</p></div>
      <div class="lyr gr"><span class="h">A sua alavanca</span><p>${lv.alavanca}</p></div></div>`;}).join("");
  app.innerHTML=`<section class="screen enter stagger">
    <div class="eyebrow">A sua foto de agora</div>
    <h1>${Nm}, é assim que <span class="it">você funciona</span></h1>
    <p class="sub">Isto não é nota de prova — é um espelho. Nenhuma ponta é "a certa": cada jeito tem a sua força e o seu preço. O que vale é você enxergar o seu.</p>
    <div class="hero"><div class="k">O que mais te define hoje</div><div class="name">${head.join(" &nbsp;+&nbsp; ")}</div><p>São os dois traços que mais puxam o seu jeito de funcionar — comece o olhar por eles.</p></div>
    <div class="lbl">O seu mapa, em seis traços</div>${gauges}
    <div class="lbl">Passeando pelos seus traços</div>${blocos}
    <div class="close">${Nm}, nenhum desses traços é melhor ou pior — é o seu jeito. Conhecer a força e o preço de cada um já te dá o leme. Comece por um movimento só, no traço que mais te tocou.</div>
    <div class="row"><button class="btn gold" onclick="window.print()">Salvar / imprimir</button><button class="btn ghost" id="redo">Refazer</button></div>
    <div class="foot"><b>Instituto ELOS</b> · ELO Business<br>Mapa Comportamental — seis traços (base HEXACO)</div>
  </section>`;
  setTimeout(()=>app.querySelectorAll(".nd").forEach(n=>{n.classList.add("go");n.style.left=n.dataset.pos+"%";}),120);
  document.getElementById("redo").onclick=()=>{ for(const k in ans) delete ans[k]; step=0; window.scrollTo({top:0}); transition(render); };
}

render();
</script>

const CONTENT = {"blocos": {"ex_f": {"epi": "O “Dá Pro Gasto”", "estado": "Excelência, hoje em falta — vivendo no “tá bom assim”", "voz": "Tá bom assim. Ninguém vai reparar nesse detalhe — e eu ainda tenho mais dez coisas pra fazer.", "aparece": "Quem trabalha com você costuma te ver como quem faz acontecer e não trava — você entrega, gira o volume, não fica preso enfeitando vírgula. Na maioria das vezes, quando bate aquele “podia dar uma polida”, você já passou pra próxima: o suficiente resolve e o relógio não espera. Diferente de quem tem Excelência em excesso (que poli pra sempre e nunca solta a entrega), você solta — mas o que sai no “tá bom” costuma sair sem a sua assinatura, e quem recebe sente a diferença antes mesmo de saber explicar o que faltou.", "sinal": "Você costuma se pegar nisso quando aquela voz “tá bom assim” aparece bem na hora de revisar — e você fecha o arquivo antes da última olhada. Ou quando começa a se convencer de que “ninguém vai mexer nisso mesmo” pra justificar pular uma etapa que você sabe que era pra fazer.", "facetas": "Pode aparecer de dois jeitos: o que ENTREGA rápido e pula o acabamento pra dar conta do volume, e o que faz o JEITINHO — resolve por cima pra destravar e segue sem voltar pra fechar direito. Veja qual pesa mais em você.", "ip": "A intenção é sensata e provavelmente é o que te mantém de pé no meio de tanta coisa: você economiza energia pra não se esgotar e prioriza dar conta de tudo em vez de empacar num detalhe. Você solta no “tá bom” porque tem muita coisa na sua mão de verdade — e parar pra polir cada uma parece um luxo que você não pode pagar agora.", "alavancas": ["Escolha UMA entrega desta semana — só uma — pra colocar a sua assinatura por inteiro: aquela que mais gente vai ver, por exemplo. Nas outras, segue no ritmo de sempre; nessa, capriche até você ter orgulho de assinar embaixo.", "Da próxima vez que a voz “tá bom assim” aparecer bem na hora de soltar, em vez de fechar, dê uma última olhada cronometrada — cinco minutos, por exemplo, só atrás do que você já sabe que ficou pela metade.", "Combine com alguém de confiança um “check de acabamento” antes de soltar o que importa — alguém que te devolva um “isso já tá com a sua cara?” antes de ir pra rua."], "preenchimento": "Marque a que é mais a sua. Agora escreva a SUA versão, com data: Nos próximos 7 dias eu vou ______, quando ______.", "ponte": "Se você se pegar pensando “ninguém vai notar mesmo” bem na hora de soltar uma entrega, então é aí que vale dar a última olhada — porque quem nota primeiro é sempre você.", "pull": "Ninguém nota um “tá bom” de cada vez — mas todo mundo sente quando ele vira a sua marca.", "lider": {"ajuda": "é quem destrava e faz girar; não empaca num detalhe, entrega no volume e segura o ritmo quando todo mundo tá afogado. Com essa pessoa por perto, coisa nenhuma fica parada esperando ficar perfeita pra sair.", "atrapalha": "solta entrega no “tá bom assim” e deixa ponta solta que volta como retrabalho; o jeitinho de hoje vira o problema de amanhã; e, sem perceber, pode nivelar o time por baixo — porque se “tá bom pra mim, tá bom pra todo mundo”.", "reconhecer": "repara quando ela fecha uma entrega rápido demais e já parte pra próxima, quando justifica um acabamento pela metade com “ninguém vai mexer nisso”, ou quando resolve algo por cima só pra destravar e não volta pra fechar direito.", "conduzir": "combine com ela ONDE a régua sobe e onde “tá bom” já basta — ela não precisa caprichar em tudo, precisa saber as duas ou três entregas que merecem a assinatura dela. E mostre quem recebe do outro lado: o detalhe ganha sentido quando ela vê a cara de quem usa.", "evitar": "não cobre perfeição em tudo de uma vez (ela desliga e volta pro “tá bom” por pura exaustão); e não trate como preguiça ou desleixo — quase sempre é volume e economia de energia, não falta de capricho.", "naoSeAssuste": "ela soltar um “dá pro gasto”, minimizar a importância de um acabamento ou priorizar terminar tudo em vez de fechar bem uma coisa só — é o padrão falando, não falta de capacidade. A régua existe nela; tá só guardada pra economizar energia.", "pergunta": "Quais entregas suas você sente que mereciam mais capricho do que você tem dado? E o que te faz soltar no “tá bom” — é tempo, é volume, ou é que parece que ninguém vai reparar?", "repBaixo": "de ESTRUTURA: deixe combinado por escrito quais são as “entregas de assinatura” e qual o padrão mínimo de cada uma — assim a régua não vira a sua opinião contra a dela no calor da hora.", "repAlto": "basta NOMEAR e devolver a decisão: “essa aqui é uma das que merece a sua assinatura inteira — como você quer deixar ela?”"}}, "ex_e": {"epi": "O Artesão Travado", "estado": "Excelência, hoje puxando pro excesso", "voz": "Ainda não está bom o suficiente — só mais um ajuste e eu entrego.", "aparece": "Quem trabalha com você costuma te ver como a pessoa que não deixa nada sair torto — o último filtro antes de algo virar público. Na maioria das vezes, quando uma entrega já está 95% pronta, você não sente alívio: você enxerga os 5% que faltam e volta pra eles. Diferente de quem tem Excelência em falta (que solta qualquer coisa só pra se livrar da tarefa), você segura a entrega no capricho — mas o acabamento que você persegue pra blindar do erro costuma custar o prazo, e o que chega tarde e impecável quase sempre vale menos que o que chegou a tempo e bom.", "sinal": "Você costuma se pegar nisso quando começa a refazer uma parte que já estava boa atrás de um detalhe que só você nota, ou quando adia mandar algo \"até estar redondo\" e o prazo vai chegando sem você soltar.", "facetas": "Pode aparecer de dois jeitos: o que TRAVA e não entrega esperando ficar impecável, e o que ENTREGA mas refaz tudo de novo no detalhe que ninguém pediu. Veja qual pesa mais em você.", "ip": "A intenção é nobre e provavelmente é o que construiu a sua reputação: te proteger do erro e do julgamento, garantir que nada que leva o seu nome saia abaixo da linha. Você capricha porque qualidade importa de verdade pra você — é zelo, não defeito.", "alavancas": ["Antes de começar uma entrega, defina em uma linha o que é bom o suficiente pra ESTA — por exemplo, o nível que o cliente espera, não o teto que você consegue. Feito-e-ajustado anda na frente de perfeito-e-parado.", "Da próxima vez que se pegar mexendo \"só mais um pouco\" numa parte que já estava boa, marque um limite antes de mergulhar — por exemplo, \"mais 15 minutos e solto do jeito que estiver\".", "Combine com alguém de confiança um \"ponto de soltar\": mostre a versão 80% e pergunte se já dá pra ir, em vez de só revelar quando estiver impecável."], "preenchimento": "Marque a que é mais a sua. Agora escreva a SUA versão, com data: Nos próximos 7 dias eu vou ______, quando ______.", "ponte": "Se você se pegar mexendo \"só mais um pouco\" numa entrega que já está boa, então solte ali mesmo e mande — o ajuste que falta você faz depois, com o retorno real na mão.", "pull": "Perfeição que não entrega é o disfarce mais elegante da mediocridade.", "lider": {"ajuda": "é o controle de qualidade do time; o que sai pela mão dela dificilmente volta com erro, e os outros aprendem o padrão só de olhar o trabalho dela. É nela que você confia a entrega que não pode ter falha.", "atrapalha": "trava entrega esperando o impecável e estoura prazo; refaz o que já estava bom e gasta tempo no detalhe que o cliente nem percebe; vira gargalo quando nada passa sem o aval dela, e pode desanimar quem entregou \"bom\" e só ouviu o que faltou.", "reconhecer": "repara quando ela segura algo que já estava pronto \"pra dar um último ajuste\", quando refaz uma parte que ninguém pediu, ou quando some no detalhe e o prazo aperta sem ela avisar.", "conduzir": "dê o nível de acabamento esperado ANTES — \"pra essa, bom já resolve; impecável é só na proposta final\"; trate o prazo como parte da qualidade; e elogie o que ela entregou no tempo, não só o capricho.", "evitar": "não peça \"capricha mais\" sem teto (ela some no detalhe); não jogue nela toda revisão do time (vira gargalo); e não leia o atraso dela como descaso — é o oposto, é excesso de zelo.", "naoSeAssuste": "ela refazer algo que já estava bom, pedir \"mais um tempinho\" colado no prazo, ou apontar primeiro o que faltou numa entrega boa — é o padrão falando, não falta de ritmo nem implicância.", "pergunta": "Tem alguma entrega que você está segurando esperando ficar impecável? Pra essa aqui, o que já seria bom o suficiente pra gente soltar hoje?", "repBaixo": "de CRITÉRIO dado na largada: definir junto \"o que é bom o suficiente\" e o prazo de cada entrega — ela não precisa adivinhar onde parar.", "repAlto": "basta NOMEAR e devolver a decisão: \"vi a Excelência puxando pro excesso aí — pra essa entrega, dá pra soltar no bom?\""}}, "in_f": {"epi": "O Calmo Demais pra Começar", "estado": "Intensidade, hoje puxando pra falta", "voz": "Não precisa ser agora — depois eu faço.", "aparece": "Quem trabalha com você costuma te ver como a pessoa que não se afoba — enquanto o time corre e atropela, você mantém a calma e raramente erra na pressa. Na maioria das vezes, quando cai no seu colo uma tarefa que dá preguiça ou um pouco de medo, você não recusa: você adia, esperando a 'hora certa' que quase nunca chega sozinha. Diferente de quem tem Intensidade em excesso (que começa tudo no impulso e se queima no meio do caminho), você espera juntar vontade pra arrancar — só que a vontade que você espera costuma chegar depois do começo, não antes.", "sinal": "Você costuma se pegar nisso quando abre a tarefa, bate o olho e fecha 'pra daqui a pouco', ou quando se enche de coisinhas em volta — responder mensagem, ajeitar a mesa, adiantar o que é fácil — pra empurrar a única que realmente pesa.", "facetas": "Pode aparecer de dois jeitos: o que ESPERA bater a vontade pra começar (e ela quase nunca bate sozinha), e o que SE ENCHE de tarefa pequena pra fugir da grande. Veja qual pesa mais em você.", "ip": "A intenção é sábia e provavelmente já te livrou de muita furada: não se queimar à toa, não começar errado na pressa, deixar a cabeça assentar antes de agir. Você adia porque respeita a própria energia e não quer entregar mal feito — isso é cuidado, não desleixo.", "alavancas": ["Pegue a tarefa que você mais empurraria hoje e combine com você mesmo só 5 minutos nela — por exemplo, abrir o arquivo e escrever a primeira linha feia, sem cobrança nenhuma de terminar.", "Da próxima vez que se pegar esperando 'bater a vontade', inverta a ordem: comece pelo passo mais ridículo possível e deixe a vontade chegar andando — por exemplo, dê o primeiro clique antes de decidir se está a fim.", "Combine com alguém de confiança um horário fixo pra vocês começarem juntos — por exemplo, os dois na mesma chamada, cada um na sua tarefa, só pra você não arrancar sozinho."], "preenchimento": "Marque a que é mais a sua. Agora escreva a SUA versão, com data e gatilho: Nos próximos 7 dias, quando eu me pegar pensando 'depois eu faço', eu vou começar ______ por 5 minutos.", "ponte": "Se você se pegar pensando 'depois eu faço', então comece 5 minutos ali mesmo, antes de a vontade chegar — porque é o começo que chama a vontade, e não o contrário.", "pull": "A vontade chega depois do começo, não antes.", "lider": {"ajuda": "traz calma quando todo mundo se afoba; não decide no susto, não começa errado na pressa e segura um ritmo que dura o ano inteiro. Perto dessa pessoa, o time respira e erra menos por afobação.", "atrapalha": "empurra a tarefa até ela virar urgência; o que podia ser rápido vira atraso, e quem depende da parte dela pra andar fica parado esperando. Às vezes espera tanto a 'hora certa' que a janela passa.", "reconhecer": "repara quando ela deixa pra última hora algo que tinha prazo folgado, quando se ocupa de mil coisas pequenas e some da que pesa, ou quando diz 'depois eu vejo' pra algo que já dava pra começar agora.", "conduzir": "quebre a entrega no primeiro passo pequeno e combine quando ela COMEÇA, não só quando termina — um prazo de início destrava mais que um prazo de fim. Quando der, comece junto: às vezes ela só precisa de companhia pra sair do zero.", "evitar": "não jogue só pressão e urgência em cima (ela ou trava ou finge pressa pra te agradar); não trate como preguiça nem cobre na frente dos outros; não entregue um prazo distante e ache que vai andar sozinho até lá.", "naoSeAssuste": "ela deixar pra última hora e mesmo assim entregar, dizer 'já vou fazer' três vezes antes de fazer, ou se ocupar de tudo menos do que importa — é o padrão pedindo um empurrão pra começar, não falta de compromisso.", "pergunta": "Qual é a tarefa que você mais empurraria essa semana? O que te faria dar o primeiro passo nela hoje, mesmo sem vontade — e como eu posso deixar esse começo mais fácil pra você?", "repBaixo": "de ESTRUTURA: combine prazos de INÍCIO e um check rápido de 'o que você começou hoje', não só de entrega — com o começo já agendado, ela não precisa ficar esperando a vontade aparecer.", "repAlto": "basta NOMEAR e devolver a decisão: 'vi a Intensidade puxando pra baixo nessa tarefa aí — qual o primeiro passo de 5 minutos que você dá ainda hoje?'"}}, "in_e": {"epi": "O Rápido Demais pra Esperar", "estado": "Intensidade, hoje puxando pro excesso", "voz": "Se não for agora, cai. Então é tudo, já.", "aparece": "Quem trabalha com você costuma sentir sua energia chegar antes de você falar — você tende a ser o motor que tira as coisas do papel e não deixa o time esfriar. Na maioria das vezes, quando cai uma tarefa, você já está fazendo antes de os outros terminarem de entender o pedido. É provável que você trate quase tudo como urgente — e quando tudo vira prioridade, nada é prioridade de verdade. Diferente de quem tem Intensidade em falta (que deixa esfriar e nunca cria urgência), você acelera por responsabilidade — só que a mesma pressa que protege o resultado costuma atropelar o passo certo e cansar quem corre do seu lado.", "sinal": "Você costuma se pegar nisso quando começa a responder antes de ouvir o fim da frase, ou quando abre uma terceira frente ao mesmo tempo porque esperar a primeira terminar já parece tempo perdido.", "facetas": "Pode aparecer de dois jeitos: o que ACELERA tudo pra nada esfriar, e o que ABRAÇA tudo de uma vez pra não deixar nenhuma bola cair. Veja qual pesa mais em você.", "ip": "A intenção é nobre e provavelmente é o que faz as coisas saírem do lugar com você por perto: não deixar a bola cair, proteger o resultado, puxar o time pra frente. A pressa nasce de responsabilidade, não de descontrole — você corre porque o resultado importa de verdade.", "alavancas": ["Pegue a UMA frente que está mais quente hoje e dê a ela um começo e um fim antes de abrir a próxima — por exemplo, feche o disparo que já está na sua mão antes de iniciar o seguinte. Velocidade com clareza ainda é rápido.", "Da próxima vez que vier o impulso de responder na hora, em vez disso dê um respiro e pergunte 'qual o próximo passo certo?' — separar 'velocidade com clareza' de 'pressa ansiosa' costuma mudar a resposta.", "Combine com alguém de confiança pra te sinalizar quando você estiver tratando como incêndio algo que daria pra fazer bem-feito com mais um dia."], "preenchimento": "Marque a que é mais a sua. Agora escreva a SUA versão, com data: Nos próximos 7 dias eu vou ______, quando ______.", "ponte": "Se você se pegar abrindo uma frente nova antes de fechar a que está na mão, então pare por um respiro e pergunte \"qual o próximo passo certo?\" — velocidade com clareza ainda é rápido, e chega inteiro.", "pull": "Intensidade não é desespero — é clareza com velocidade. O que você empurra no susto chega quebrado; o que você conduz com foco chega inteiro — e ainda chega rápido.", "lider": {"ajuda": "é o motor do time; tira projeto do papel, cria senso de urgência onde os outros enrolam e não deixa bola cair — com essa pessoa por perto, as coisas andam.", "atrapalha": "atropela etapas e pessoas na pressa; abre mais frentes do que fecha; transforma tudo em urgência e cansa quem corre do lado; na correria, decide rápido demais e às vezes precisa refazer depois.", "reconhecer": "repara quando ela responde antes de ouvir o fim, abre três frentes ao mesmo tempo, ou trata como incêndio algo que ficaria melhor com mais um dia.", "conduzir": "ajude a separar o que é urgente de verdade do que só parece; peça pra ela fechar uma frente antes de abrir a próxima; dê meta de foco, não só de velocidade; valide a energia antes de pedir o freio.", "evitar": "não jogue mais fogo em cima ('pra ontem!') — isso liga o turbo no pior momento; não confunda a velocidade dela com a melhor decisão; não freie no susto na frente do time (ela acelera mais pra provar que dá conta).", "naoSeAssuste": "ela querer fazer tudo de uma vez, responder na hora ou tratar quase tudo como urgente — é o padrão falando, responsabilidade em excesso, não descontrole nem afobação sem causa.", "pergunta": "Dessas frentes todas que você está tocando, qual é a urgente de verdade? Como eu posso te ajudar a fechar uma antes de abrir a próxima?", "repBaixo": "de ESTRUTURA: ajude a priorizar por escrito no começo do dia ou da semana — com uma lista curta de 'o que é urgente de verdade', ela não precisa tratar tudo como incêndio.", "repAlto": "basta NOMEAR e devolver a decisão: 'vi a Intensidade puxando pro excesso ali — qual é o passo certo agora?'"}}, "co_f": {"epi": "O Personagem", "estado": "Congruência, hoje em falta", "voz": "Eu falo o que é certo — fazer, eu acerto depois.", "aparece": "Quem te ouve costuma sair achando que você já vive o que você fala — você tem o dom de descrever o ideal de um jeito que inspira, e provavelmente foi isso que te abriu portas e te deu o lugar que você ocupa hoje. Na maioria das vezes, quando o que você faz não bate com o que você prega, você não está mentindo: você adia a prática, aposta no 'depois' e segue cobrando dos outros o padrão que você mesmo ainda não deu conta de sustentar. Diferente de quem tem Congruência em excesso — que fala tudo cru, sem filtro, e às vezes machuca em nome da verdade —, você cuida tanto da imagem que acaba protegendo também a distância entre o seu discurso e a sua prática. E o personagem que você segura pra não decepcionar costuma cansar mais do que a verdade que você está evitando mostrar.", "sinal": "Você costuma se pegar nisso quando se ouve cobrando dos outros, em voz alta, um padrão que por dentro você sabe que ainda não cumpre — ou quando recebe um elogio por algo que você apresenta melhor do que pratica, e deixa o elogio de pé em vez de corrigir.", "facetas": "Pode aparecer de dois jeitos: o que PREGA pros outros um padrão que ele mesmo ainda não vive, e o que MAQUIA o que não fez pra imagem não cair. Veja qual pesa mais em você.", "ip": "A intenção é boa e provavelmente é o que te trouxe até aqui: você acredita de verdade no padrão que defende — fala o ideal porque ele te move e porque você quer ser alguém em quem as pessoas se inspiram. E manter a imagem nunca foi vaidade pura: no fundo é o medo de decepcionar quem passou a contar com você.", "alavancas": ["Escolha UM ponto onde você mais cobra os outros e seja você o primeiro a fazer essa semana — por exemplo, se você cobra pontualidade, chegue no horário antes de cobrar de alguém.", "Da próxima vez que receber um elogio por algo que você apresenta melhor do que pratica, em vez de deixar de pé, devolva com a verdade — por exemplo: 'obrigado, mas isso aí ainda é mais intenção do que hábito meu'.", "Combine com alguém de confiança pra te avisar, sem julgamento, toda vez que perceber você pregando um padrão que ainda não está vivendo."], "preenchimento": "Marque a que é mais a sua. Agora escreva a SUA versão, com data: Nos próximos 7 dias eu vou ______, quando ______.", "ponte": "Se você se pegar cobrando dos outros um padrão que você ainda não cumpre, então faça você uma vez antes de cobrar de novo — e repare se carregar a verdade pesa menos do que sustentar o personagem.", "pull": "As pessoas não se conectam com o personagem — se conectam com a verdade.", "lider": {"ajuda": "ele puxa o time pra cima no discurso — sabe pintar onde dá pra chegar, inspira, vende bem o padrão pra fora e faz a turma acreditar que dá pra ser melhor.", "atrapalha": "cobra dos outros o que ele mesmo não entrega; quando o time percebe a distância entre o que ele fala e o que ele faz, o discurso perde força — o exemplo deixa de puxar e começa a virar descrédito.", "reconhecer": "repara quando ele defende um padrão em reunião com muita convicção mas escapa de ser o primeiro a cumprir, ou quando aceita por inteiro um elogio por algo que apresentou melhor do que executou.", "conduzir": "deixe claro que mostrar onde ele realmente está NÃO é fraqueza — é o que devolve credibilidade pro discurso dele; peça um lugar concreto onde ele vai praticar antes de cobrar; e elogie mais a verdade do que a boa aparência.", "evitar": "não exponha a distância dele na frente do time (ele fecha e reforça o personagem); e não premie só a entrega bem embalada — se você aplaude só a aparência, ensina ele a cuidar mais da imagem do que da prática.", "naoSeAssuste": "ele aceitar um elogio que não cabe por inteiro, ou pregar um padrão que ainda não vive — é o padrão protegendo a imagem, não má-fé.", "pergunta": "Tem algum padrão que você cobra do time mas que você mesmo ainda não conseguiu fechar? O que eu posso fazer pra ficar mais seguro pra você mostrar onde você realmente está?", "repBaixo": "de ESTRUTURA: defina um ponto fixo onde o que ele fala e o que ele faz são olhados lado a lado — assim ele não precisa lembrar de ser coerente no susto, o ritual já cobra os dois.", "repAlto": "basta NOMEAR e devolver a escolha: 'percebi o discurso indo na frente da prática ali — como você quer alinhar os dois?'"}}, "co_e": {"epi": "O Duro Demais Consigo", "estado": "Congruência, hoje puxando pro excesso", "voz": "Falhei de novo — se eu não vivo o que prego, sou uma fraude.", "aparece": "Quem convive com você costuma te ver como alguém de palavra — o que você fala e o que você faz batem, e as pessoas confiam em você justamente por isso. Na maioria das vezes, quando você escorrega do próprio padrão (às vezes num detalhe que ninguém nem percebeu), você tende a abrir um processo interno contra si mesmo — e o veredito já sai condenando. Diferente de quem tem Congruência em falta (que diz uma coisa, faz outra e dorme tranquilo), você sente cada brecha entre o que prega e o que viveu — mas costuma virar essa brecha numa sentença contra você inteiro, não só contra o passo que faltou.", "sinal": "Você costuma se pegar nisso quando um deslize pequeno começa a virar uma frase sobre quem você é — quando o 'fiz algo errado' escorrega pra 'eu sou errado' —, ou quando fica reabrindo na cabeça uma falha que já passou, relendo os autos de um caso que já devia estar encerrado.", "facetas": "Pode aparecer de dois jeitos: o que vira a régua pra DENTRO e se condena por cada falha, e o que estende a mesma régua pra FORA e cobra dos outros a dureza que cobra de si. Veja qual pesa mais em você.", "ip": "A intenção é nobre e provavelmente é o que te tornou confiável: não ser hipócrita, manter a palavra de pé, ser por dentro o mesmo que você mostra por fora. A dureza nasce de levar a sério quem você quer ser — você se cobra porque a integridade importa de verdade pra você.", "alavancas": ["Da próxima vez que você se pegar dizendo 'sou uma fraude', separe o passo da pessoa — por exemplo, troque 'sou incoerente' por 'tenho um padrão que ainda não alcancei', e nomeie qual foi exatamente o passo que faltou.", "Quando o veredito interno vier pesado, faça o teste da régua: pergunte 'eu condenaria assim um amigo que fez isso?' — se a resposta é não, devolve pra você a mesma clemência que você daria pra ele.", "Em vez de encerrar o caso numa sentença, encerre num próximo passo: troque 'falhei de novo' por 'qual é o único ajuste que eu faço já' — e escreva esse passo, não só pense."], "preenchimento": "Marque a que é mais a sua. Agora escreva a SUA versão, com prazo: Nos próximos 7 dias, quando o veredito interno vier, eu vou ______ em vez de ______.", "ponte": "Se você se pegar dizendo 'sou uma fraude' depois de um deslize, então pare na frase e reescreva ali mesmo: troque o 'eu sou' pelo 'eu fiz' — você não é a falha, você é quem dá o passo seguinte.", "pull": "Congruência de verdade começa em admitir que a gente é incongruente — e dar o próximo passo mesmo assim.", "lider": {"ajuda": "é alguém de palavra: o que combina, cumpre. Você não precisa ficar atrás cobrando — ela se cobra sozinha, segura o padrão e dá ao time uma referência de coerência que não precisa de fiscal.", "atrapalha": "se pune demais por erros pequenos e demora a se refazer de um deslize; às vezes levanta a régua tão alto que nem ela alcança, e estende essa dureza pros colegas, deixando o clima pesado. Um erro que era só de ajustar vira um caso, e isso gasta energia que o time precisava no jogo.", "reconhecer": "repara quando ela reabre um erro que já estava resolvido, quando se desqualifica ('nem tenho moral pra falar disso'), quando fica dura demais por um deslize pequeno, ou quando cobra de um colega a mesma régua impossível que cobra de si.", "conduzir": "separe o erro da pessoa em voz alta: aponte o que precisa ajustar E afirme que ela continua confiável. Dê permissão explícita pra errar e se refazer, lembre que o padrão é uma direção e não uma sentença, e elogie a recuperação, não só o acerto perfeito.", "evitar": "não pese a mão quando ela já está se condenando — aí você vira o segundo promotor do caso; não use a régua dela contra ela na frente dos outros; e não confunda o tamanho da autocrítica com o tamanho real do problema, porque ela infla. Nunca peça pra ela 'se cobrar mais' — disso ela já tem de sobra.", "naoSeAssuste": "ela se chamar de fraude por algo pequeno, se desqualificar de um assunto que domina, ou travar remoendo um erro já encerrado — é o padrão falando, não falta de competência nem sinal de que ela vai desmoronar.", "pergunta": "Você está se cobrando o que cobraria de um amigo que fez o mesmo? Como eu posso te ajudar a fechar o caso e ir pro próximo passo, em vez de reabrir o julgamento?", "repBaixo": "de ESTRUTURA: um ritual fixo onde todo erro vira um 'o que eu ajusto na próxima' por escrito — a revisão tem que terminar num próximo passo, não num veredito aberto. Assim ela não fica sozinha reabrindo o caso.", "repAlto": "basta NOMEAR e devolver a decisão: 'vi a Congruência puxando pro excesso aí — esse erro é do tamanho que você tá dando? Como você quer jogar isso?' Ela mesma reabre a régua."}}, "al_f": {"epi": "O Que Entrega Sem Se Entregar", "estado": "Alma, hoje de menos — entrega cheia, presença vazia", "voz": "Faço, entrego e sigo. Botar o coração é se expor — e, no fim, ninguém repara mesmo.", "aparece": "Quem trabalha com você costuma te ver como alguém em quem dá pra confiar a entrega: você dá conta, cumpre o combinado, não deixa a bola cair. Na maioria das vezes, quando uma tarefa chega, você já mira direto no \"feito\" — faz com competência, mas sem se envolver, como quem passa por cima sem deixar digital. Diferente de quem tem Alma em excesso (que se gasta em cada detalhe e leva tudo pra dentro até não sobrar nada de si), você se blinda pra conseguir entregar sempre — só que o coração que você poupa pra não se gastar costuma sair na forma de frieza, e aí o trabalho fica certo e sem alma.", "sinal": "Você costuma se pegar nisso quando começa a tratar tudo na mesma temperatura — o pedido que importa e o trivial recebem o mesmo \"deixa comigo\" morno —, ou quando entrega rápido, certinho, e percebe que não sentiu nada no caminho.", "facetas": "Pode aparecer de dois jeitos: o que ECONOMIZA — entrega o que basta e nem um passo além —, e o que se BLINDA — às vezes até capricha no que faz, mas mantém todo mundo a um braço de distância pra não se envolver. Veja qual pesa mais em você.", "ip": "A intenção é legítima e provavelmente é o que te mantém de pé quando o volume aperta: se proteger pra não se esvaziar, manter a cabeça fria pra dar conta sempre, não deixar que cada tarefa leve um pedaço de você. Você se blinda porque, em algum momento, importar-se custou caro — e poupar-se virou o jeito mais seguro de seguir entregando.", "alavancas": ["Pegue UMA entrega desta semana — por exemplo, a próxima que cair na tua mão — e faça ela 'como se fosse pra alguém que você gosta'. Não muda o prazo nem o escopo: muda só a temperatura.", "Da próxima vez que se pegar respondendo 'deixa comigo' no automático, segure três segundos e pergunte 'quem é a pessoa do outro lado disso?' — e devolva um cuidado que ninguém pediu.", "Combine com alguém de confiança pra te avisar quando o teu 'tá certo' saiu frio — por dentro você nem sempre percebe a própria temperatura."], "preenchimento": "Marque a que é mais a sua. Agora escreva a SUA versão, com data: Nos próximos 7 dias eu vou ______, quando ______.", "ponte": "Se você se pegar entregando no piloto automático — aquele \"deixa comigo\" morno —, então pare e pergunte \"pra quem é isso, de verdade?\". O cuidado mora na resposta, não em horas a mais de trabalho.", "pull": "O cuidado que ninguém pediu é o que separa cumprir de servir.", "lider": {"ajuda": "é quem não deixa a bola cair: entrega no prazo, mantém a cabeça fria quando o resto do time se exalta e não faz drama. Você delega e pode até esquecer — vai estar feito, e feito direito.", "atrapalha": "o cliente (e o colega) começa a sentir que virou número — tá tudo certo e nada esquenta; entrega correta que não encanta ninguém e não fideliza; e, sem querer, esfria o time em volta, porque trata o que importa e o trivial na mesma temperatura morna.", "reconhecer": "repara quando ela entrega rápido e certinho, mas sem brilho nenhum; quando responde 'deixa comigo' no automático, sem perguntar nada; quando trata um pedido grande e um pequeno com a mesma indiferença educada.", "conduzir": "liga cada tarefa a um rosto e a um porquê — 'isso aqui é pro fulano, e muda o dia dele'; mostra o impacto real quando ela caprichou de verdade; e deixa claro que se envolver não vai virar sobrecarga nem decepção. Quando o cuidado aparecer, reconhece na hora e em particular.", "evitar": "não cobra 'mais paixão' no abstrato — ela esfria mais ainda; não confunde entrega competente com entrega envolvida; não expõe a frieza dela na frente dos outros; e cuidado pra não empilhar volume, porque quanto mais sobrecarga, mais ela foge pro piloto automático.", "naoSeAssuste": "ela entregar sem nenhum entusiasmo aparente, tratar o próprio capricho como 'nada de mais', ou soar seca numa mensagem — é o padrão se protegendo, não falta de comprometimento.", "pergunta": "O que desse trabalho ainda te dá vontade de caprichar? E o que virou só 'mais uma tarefa' — que a gente podia te devolver de um jeito que faça mais sentido pra você?", "repBaixo": "de ESTRUTURA: começa toda entrega importante nomeando pra quem é e por que importa, e cria um ritual fixo onde cada um conta um detalhe que caprichou na semana. Ela não precisa 'sentir' sozinha — o ritual reacende.", "repAlto": "basta NOMEAR e devolver a escolha: 'senti o piloto automático ligado nessa entrega — como você quer botar mais da tua cara nisso?'"}}, "al_e": {"epi": "O Que Doa Até Doer", "estado": "Alma, hoje puxando pro excesso", "voz": "Eles primeiro. Eu dou um jeito depois — e sempre dou.", "aparece": "Quem convive com você costuma te enxergar como o primeiro a aparecer quando alguém precisa — o tipo que oferece ajuda antes de o outro terminar de pedir. Na maioria das vezes, você diz \"sim\" antes de checar se ainda sobra espaço na sua própria semana, e o que é seu — o descanso, a pausa, o cuidado com o próprio corpo — costuma ser a primeira coisa a sair da lista. Diferente de quem tem Alma em falta (que ajuda só quando é conveniente e guarda a conta de cada favor na cabeça), você dá sem contar — mas tende a dar passando do seu próprio limite, e o que você não cuida em você costuma cobrar a fatura lá na frente.", "sinal": "Você costuma se pegar nisso quando responde \"pode deixar comigo\" antes mesmo de saber o tamanho do pedido, ou quando sente uma pontada de culpa só de pensar em parar pra você no meio do dia.", "facetas": "Pode aparecer de dois jeitos: o que CARREGA — assume a tarefa, o problema e o cansaço dos outros como se fossem seus; e o que SE APAGA — encolhe a própria necessidade até ela sumir do mapa (\"pra mim, tá tudo bem\"). Veja qual pesa mais em você.", "ip": "A intenção é das mais bonitas e provavelmente é o que faz tanta gente se sentir segura perto de você: estar presente, ser útil, não deixar ninguém na mão. Você dá tanto porque o outro importa de verdade — cuidar é o seu jeito de se importar.", "alavancas": ["Bloqueie UM tempo só seu nesta semana e trate como compromisso com cliente — por exemplo, um almoço sem celular ou uma saída no horário combinado. Não precisa ser grande; precisa ser inegociável.", "Da próxima vez que o 'pode deixar comigo' subir na garganta, segure três segundos e pergunte a si mesmo: 'isso é meu pra resolver, ou eu tô assumindo pra poupar alguém?' — às vezes a resposta já te libera.", "Escolha UMA coisa pequena nesta semana pra pedir ajuda em vez de fazer sozinho — por exemplo, devolver pro dono uma tarefa que você sempre puxa pra si. Receber também é cuidar do vínculo."], "preenchimento": "Marque a que mais fala com você. Agora escreva a SUA versão, com prazo: Nos próximos 7 dias eu vou ______, quando ______ — e quem vai saber que eu me comprometi é ______.", "ponte": "Se você se pegar dizendo \"pode deixar comigo\" no automático, então pare um segundo antes de assumir e cheque se ainda cabe na sua semana — porque o corpo costuma ser o último a avisar, e quando ele avisa, já é tarde.", "pull": "Em casa de ferreiro, o espeto também merece ser de aço.", "lider": {"ajuda": "é o coração do time; está por perto quando alguém precisa, cobre buraco sem reclamar e faz todo mundo se sentir cuidado. Cliente sente isso na hora — ninguém entrega presença como essa pessoa.", "atrapalha": "diz 'sim' pra tudo e vira gargalo sem perceber; assume a tarefa dos outros até afundar na própria; e tende a esconder de você que está no limite — quando você descobre, ela já está esgotada.", "reconhecer": "repara quando ela pega pra si uma tarefa que era de outro 'só pra adiantar', quando responde 'tá tudo bem comigo' rápido demais, ou quando é a última a sair e a primeira a chegar sem ninguém ter pedido.", "conduzir": "deixe explícito que cuidar de si NÃO é egoísmo nem moleza — é o que mantém ela inteira pro time; ajude ela a dizer 'não' dando você mesmo a permissão ('esse não é seu pra carregar'); e pergunte do limite dela antes de a conta chegar, não depois.", "evitar": "não use a generosidade dela como recurso infinito só porque ela nunca recusa — ela vai dar até quebrar e não vai avisar; e não confunda o 'tá tudo bem' dela com estar tudo bem de verdade.", "naoSeAssuste": "ela minimizar o próprio esgotamento, recusar ajuda com um 'imagina, eu dou conta', ou se sentir culpada quando tira um tempo pra ela — é o padrão falando, não falta de comprometimento.", "pergunta": "O que tá pesando em você que você ainda não me contou? E o que eu posso tirar do seu colo pra te sobrar um tempo que seja só seu?", "repBaixo": "de ESTRUTURA: combine um limite visível com ela — por exemplo, um teto de tarefas ou um horário fixo de encerrar o dia — pra ela não ter que decidir sozinha quando já é demais. Quem não sabe dizer 'não' precisa de um 'não' já combinado.", "repAlto": "basta NOMEAR e devolver a decisão: 'vi a Alma puxando pro excesso aí — você assumiu mais do que cabe. O que você quer largar?'"}}, "le_f": {"epi": "O Desabafo Sem Endereço", "estado": "Lealdade, hoje em falta", "voz": "Se eu falar na cara, sobra pra mim. Melhor desabafar com quem me entende.", "aparece": "Quem trabalha com você costuma te ver como alguém que fala o que pensa e não engole desaforo — e isso, na dose certa, é uma coragem que o time precisa. Na maioria das vezes, quando algo te incomoda, você põe pra fora rápido: é provável que a tensão saia de você antes de chegar em quem poderia resolver. Diferente de quem tem Lealdade em excesso (que engole tudo pra manter a paz e vai adoecendo calado), você alivia na hora — só que o desabafo costuma ir pro lado, pro colega, pro grupo, e quase nunca pro endereço certo. O que sai de você como alívio costuma voltar pro time como fogo amigo.", "sinal": "Você costuma se pegar nisso quando sente a tensão subir numa reunião e já procura com os olhos alguém pra comentar depois — ou quando algo te irrita e a primeira pessoa com quem você fala é qualquer uma, menos a que está no centro do incômodo.", "facetas": "Pode aparecer de dois jeitos: o que DESABAFA pro lado pra aliviar a tensão (e acaba espalhando o incômodo sem querer), e o que TERCEIRIZA a conta — aponta o que está errado, mas trata como problema dos outros. Veja qual pesa mais em você.", "ip": "A intenção é legítima e provavelmente é o que te mantém inteiro: pôr a tensão pra fora antes que ela te corroa, ser ouvido, se proteger num lugar onde nem sempre foi seguro falar na cara. Você desabafa porque engolir tudo também adoece — e isso é verdade.", "alavancas": ["Da próxima vez que algo te incomodar e bater a vontade de comentar com um colega, em vez disso leve pra própria pessoa no mesmo dia — por exemplo, num áudio curto e com alma: 'preciso te falar uma coisa que me incomodou'.", "Quando for reclamar de algo, combine com você mesmo de só abrir a boca se vier uma saída junto — por exemplo: 'isso aqui está travando, e eu faria assim'.", "Da próxima vez que a tensão subir, antes de desabafar pergunte 'quem é a única pessoa que pode resolver isso?' e leve pra ela primeiro."], "preenchimento": "Marque a que é mais a sua. Agora escreva a SUA versão, com prazo: Nos próximos 7 dias, quando ______ me incomodar, eu vou levar direto pra ______, no mesmo dia.", "ponte": "Se você se pegar começando uma frase com 'não é nada, mas...' pra um colega, então pare: esse é o sinal de que o desabafo está indo pro endereço errado — leve pra pessoa certa ainda hoje.", "pull": "Falar mal do barco que você rema é fogo amigo.", "lider": {"ajuda": "traz à tona o que o resto do time engole; você fica sabendo dos atritos cedo, sem pano quente — quando bem endereçado, é um termômetro honesto do clima.", "atrapalha": "leva incômodo pro lado errado e o ruído se espalha; reclama sem propor e contamina quem está perto; terceiriza a conta e o problema nunca vira responsabilidade de ninguém; pode minar a confiança do time sem perceber que foi ela.", "reconhecer": "repara quando ela comenta com um colega o que devia falar com você, quando aponta o que está errado mas não traz saída, ou quando 'o problema é sempre do outro setor'.", "conduzir": "abra um canal direto e rápido com você pra ela não precisar desabafar pro lado; combine a regra de que reclamação só vale com uma proposta junto; e quando ela trouxer o incômodo pro lugar certo, reconheça na hora — você está reforçando o caminho, não o atalho.", "evitar": "não a corrija na frente do time (vira fogo amigo contra você); não feche os canais de fala achando que assim cala o ruído — o desabafo só muda de endereço; não trate todo incômodo dela como 'mimimi', porque às vezes ela é a única te dizendo a verdade.", "naoSeAssuste": "ela desabafar pro lado, apontar o erro sem trazer saída, ou dizer que 'a culpa é do outro setor' — é o padrão falando, a necessidade de pôr pra fora e se proteger, não má índole.", "pergunta": "Tem algo te incomodando que você ainda não me trouxe direto? E o que você faria diferente se a decisão fosse sua?", "repBaixo": "de ESTRUTURA: um canal fixo e rápido (1:1 curto, áudio, mensagem) onde 'trazer o incômodo direto' é a regra — ela não precisa do palco do corredor pra ser ouvida.", "repAlto": "basta NOMEAR e devolver a regra: 'isso aí parece desabafo de corredor — me traz direto, e me traz com uma saída junto. Como você resolveria?'"}}, "le_e": {"epi": "O Bom Demais pra Magoar", "estado": "Lealdade — a sua força de sempre, hoje esticada pro excesso.", "voz": "Não quero machucar ninguém. Aguento mais um pouco — depois eu falo.", "aparece": "Quem convive com você tende a te enxergar como o ombro do time — a pessoa em quem dá pra confiar sem segunda intenção, e por isso tanta gente te puxa de canto pra desabafar. Na maioria das vezes, quando algo te incomoda de verdade, você guarda: diz pra si mesmo que \"não é a hora\", que dá pra aguentar mais um pouco. É provável que você prefira carregar o peso sozinho a colocar o outro numa saia justa. Diferente de quem tem Lealdade em falta — que fala o que pensa na lata, doa a quem doer —, você faz o oposto: cala pra não ferir. Só que o incômodo que você engole pra proteger o vínculo costuma voltar maior lá na frente, e aí já virou estouro.", "sinal": "Você costuma se flagrar ensaiando uma conversa difícil na cabeça e empurrando ela pra \"semana que vem\", que nunca chega. Ou se pega cobrindo a falha de alguém no silêncio — refazendo por conta própria o que o outro entregou pela metade, pra ninguém perceber que ele não deu conta.", "facetas": "Costuma aparecer de dois jeitos — repare qual fala mais alto em você. Tem o que ENGOLE: guarda o incômodo, sorri na reunião e adia a cobrança pra não criar clima. E tem o que COBRE: assume a tarefa, a culpa e o cansaço do outro pra blindar quem está rendendo menos. Os dois protegem o mesmo vínculo, só que por caminhos diferentes.", "ip": "A intenção aqui é das mais bonitas — e provavelmente é o que faz as pessoas se sentirem seguras perto de você: preservar o vínculo, não ferir, manter a casa em paz. Você segura porque o outro importa de verdade, não por fraqueza. Ninguém duvida do seu coração. O ajuste não é virar durão — é deixar esse mesmo cuidado também aparecer na conversa que você anda adiando.", "alavancas": ["Pegue a UMA conversa que você vem empurrando há mais tempo e marque a data dela ainda esta semana — por exemplo, mande a mensagem combinando o horário antes de inventar mais um motivo pra adiar. Vá com cuidado, não com dureza: a conversa dura feita com alma é o cuidado.", "Da próxima vez que bater o impulso de assumir a tarefa de alguém 'só dessa vez pra poupar', segure a mão e devolva com apoio — por exemplo: 'topo sentar e te ajudar a destravar, mas quem entrega é você'.", "Combine com uma pessoa de confiança um sinal — por exemplo, uma palavra combinada entre vocês — pra ela te cutucar quando perceber que você está engolindo algo que devia falar."], "preenchimento": "Escolha a que mais bate com o seu momento — não precisa ser as três. Agora passa pro concreto, com data marcada: \"Nos próximos 7 dias eu vou ______, quando ______.\" Escrever a hora é o que tira a conversa da sua cabeça e bota ela no mundo.", "ponte": "Se você se flagrar dizendo \"depois eu falo\" sobre algum incômodo, então trate esse \"depois\" como o próprio sinal pra marcar a data agora — o momento certo é o que você escolhe, não o que você fica esperando chegar.", "pull": "O que você adia pra não machucar, machuca mais lá na frente.", "lider": {"ajuda": "É a cola do time. Protege os colegas, segura a barra nos dias ruins e faz com que ninguém se sinta sozinho ali dentro. Onde essa pessoa está, o grupo se mantém inteiro.", "atrapalha": "Adia conversa difícil até virar estouro. Tende a blindar quem rende mal e, sem perceber, joga o peso em cima de quem rende bem — inclusive ela mesma. E pode esconder problema de você, não por má-fé, mas pra não criar clima.", "reconhecer": "Repare nos sinais miúdos: ela engole um incômodo no meio da reunião, assume uma tarefa que era de outro, refaz no silêncio o que alguém entregou pela metade, ou minimiza o próprio cansaço quando você pergunta se está tudo bem.", "conduzir": "Dê segurança explícita de que trazer um problema NÃO é deslealdade — pelo contrário, é o jeito mais leal de cuidar do time. Peça os fatos sem pedir pra ela 'dedurar' ninguém. E reconheça em particular, nunca expondo na frente dos outros.", "evitar": "Não cobre 'firmeza' dela no susto nem na frente do time — ela trava e se fecha. E não confunda o silêncio dela com concordância: muitas vezes o que parece um 'tá tudo certo' é uma conversa que ela guardou.", "naoSeAssuste": "Se ela minimizar o próprio cansaço, assumir uma culpa que não é dela ou sair em defesa de quem rende mal — não é falta de critério. É o padrão dela falando mais alto. Leia como lealdade no excesso, não como cegueira.", "pergunta": "Tem alguma conversa que você vem segurando pra não criar clima? E o que eu posso fazer pra ficar mais fácil você me trazer essas coisas mais cedo, antes de virarem bola de neve?", "repBaixo": "Se a Lealdade for um traço de fundo nessa pessoa, ela precisa de ESTRUTURA. Crie um ritual fixo de 1:1 onde 'trazer incômodos' já é a pauta combinada — assim ela não precisa decidir sozinha se é a hora de falar.", "repAlto": "Se a Lealdade for um traço forte e consciente, basta NOMEAR e devolver a decisão pra ela: 'vi a sua lealdade puxando pro excesso ali, segurando uma conversa — como você quer jogar isso?' Ela mesma corrige a rota."}}}, "ponto": {"ex": {"epi": "O Artesão", "dom": "Senso de dono e cuidado com o detalhe — sem virar refém da perfeição.", "pull": "O bem feito é o seu jeito de assinar o mundo."}, "in": {"epi": "A Chama Clara", "dom": "Iniciativa e urgência com clareza.", "pull": "Você não empurra a vida com a barriga."}, "co": {"epi": "O Inteiro", "dom": "Coerência e auto-honestidade.", "pull": "Quem te vê de perto e de longe vê a mesma pessoa."}, "al": {"epi": "O Coração Cheio", "dom": "Cuidado humano e autocuidado no ponto.", "pull": "Você serve sem se anular."}, "le": {"epi": "O Companheiro de Barco", "dom": "Confiança e feedback com alma.", "pull": "Feedback é diferente de reclamação."}}, "arch": {"dono": {"nome": "O Dono de Tudo", "desc": "Há uma parte sua que segura tudo na própria mão — porque confia no seu padrão e quer garantir que seja bem feito. O preço é que a operação trava esperando você, e o peso fica todo nas suas costas. Não é controle por controle: é amor pela excelência mal-canalizado.", "meta": "Reconheça o quanto eu carrego sozinho — e como eu queria poder confiar."}, "doa": {"nome": "O Que Doa Até Doer", "desc": "Há uma parte sua que cuida de todos e da empresa e esquece de você — até o corpo virar o alarme. A intenção é proteger, ser útil, estar presente. Mas cuidar de si É cuidar do barco. O sintoma costuma ser o freio que a mente não deu.", "meta": "Perceba que eu cuido de todos — menos de mim."}, "conciliador": {"nome": "O Bom Demais pra Brigar", "desc": "Há uma parte sua que segura as conversas difíceis pra não machucar — e segura até estourar no extremo. A intenção é nobre: preservar o vínculo, manter a paz. Mas o que você adia, cresce. A conversa dura, feita com alma, é justamente o cuidado que você já quer dar.", "meta": "Veja que eu só não quero machucar ninguém."}, "acomodado": {"nome": "O Acomodado", "desc": "Há uma parte sua que entrega o suficiente e arrasta o pé — pra economizar energia e se proteger do risco. A intenção é dar conta sem se esgotar. Mas “tá bom assim” vai te deixando longe do que você é capaz.", "meta": "Vê que eu só tô tentando dar conta sem me esgotar."}, "lobo": {"nome": "O Lobo Brilhante", "desc": "Há uma parte sua de muito talento e pouca entrega ao time — você prefere a sua autonomia. A intenção é se proteger e ser reconhecido. Mas carisma constrói movimento; lealdade constrói o que dura. O “nós” é o que falta pra esse brilho virar algo grande.", "meta": "Confie em mim, e eu mostro do que sou capaz."}, "maestro": {"nome": "O Maestro", "desc": "Você está, hoje, num raro estado de repertório: lê a situação e escolhe a resposta, em vez de rodar no automático. Não é que você não tenha padrões — é que você os enxerga e tem mais de uma porta de entrada pra cada um. Siga afinando.", "meta": "Continue me desafiando — eu gosto de escolher quem eu sou."}, "equilibrado": {"nome": "O Equilibrado", "desc": "Seus cinco elos estão no ponto — isso é raro. Só que você ainda tende a rodar no automático: uma resposta só pra cada situação. O próximo nível não é mexer num valor, é ganhar repertório.", "meta": "Me ajude a enxergar meus padrões antes de eles me pegarem."}}, "repLever": {"rep": "Você já tem várias portas pra cada situação. Pra afiar: na próxima vez que algo der certo, repare QUAL porta você usou — e use de propósito de novo.", "mis": "Em algumas coisas você troca de abordagem, em outras repete mais forte. Esta semana: escolha UMA situação que costuma te travar e, quando ela vier, faça diferente de propósito uma vez.", "rig": "Hoje você tende a ter uma resposta automática pra cada situação. Quando o seu jeito de sempre não funcionar, pare e pergunte \"que outro jeito eu teria?\" e teste um. 1x, 2x, 3x é padrão — viu o padrão, troca a resposta."}, "VAL": {"ex": {"nome": "Excelência"}, "in": {"nome": "Intensidade"}, "co": {"nome": "Congruência"}, "al": {"nome": "Alma"}, "le": {"nome": "Lealdade"}}};

/* ════════════════════════ CONSTANTES ════════════════════════ */
const VK = ["ex","in","co","al","le"];
const NOME = {ex:"Excelência",in:"Intensidade",co:"Congruência",al:"Alma",le:"Lealdade"};
const BANNER = {ex:"Sua entrega · Excelência",in:"Sua chama · Intensidade",co:"Sua verdade · Congruência",al:"Seu coração · Alma",le:"Seu barco · Lealdade"};
const FREQ = ["Nunca","Quase nunca","Às vezes","Quase sempre","Sempre"];
const AREA_ICON = {"Trabalho":"💼","Família":"🏡","Saúde":"🌱","Equipe":"🤝","Dinheiro":"💸","Pressão":"⏱️","Você":"🪞","Casa":"🏡","Excelência":"✦"};
const CHEERS = {6:"Tá fluindo bem.",12:"Mais da metade — segue assim.",18:"Reta final.",24:"Quase lá. 🌟"};

/* ════════════════════════ MOTOR ════════════════════════ */
const shuffle = a => { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
function buildQuestions(){
  let vq=[];
  VK.forEach(v=>(BANK.valores[v]||[]).forEach(it=>{
    if(it.format==="frequencia") vq.push({type:"freq",v,area:it.area,texto:it.texto,carga:it.cargaZona});
    else vq.push({type:"mc",area:it.area,texto:it.texto,opts:shuffle(it.opcoes.map(o=>({t:o.texto,sv:v,sz:o.zona})))});
  }));
  shuffle(vq);
  const fc=(BANK.fc||[]).map(b=>({type:"mc",area:"Você",texto:b.enunciado,opts:shuffle(b.opcoes.map(o=>({t:o.texto,sv:o.valor,sz:o.zona,w:.5})))}));
  const rp=(BANK.rep||[]).map(it=>({type:"mc",area:"Você",texto:it.texto,opts:shuffle(it.opcoes.map(o=>({t:o.texto,srep:o.nivel})))}));
  return vq.concat(shuffle(fc)).concat(shuffle(rp));
}
function score(){
  const acc={}; VK.forEach(v=>acc[v]={f:0,p:0,e:0}); let rs=0,rc=0;
  Q.forEach((q,i)=>{ const a=ans[i];
    if(q.type==="freq"){ if(typeof a==="number"&&a>=1&&a<=5){const k=q.carga==="excesso"?"e":"f";acc[q.v][k]+=Math.max(0,a-3)/2;acc[q.v].p+=Math.max(0,3-a)/2;} return; }
    if(a==="skip"||a==null) return; const o=q.opts[a]; if(!o) return;
    if(o.srep){ rs+=o.srep==="rep"?5:o.srep==="mis"?2.5:0; rc++; return; }
    if(o.sv){ acc[o.sv][o.sz.charAt(0)]+=(o.w||1); }
  });
  const st={m:{}};
  VK.forEach(v=>{ const c=acc[v],f=c.f,p=c.p,e=c.e; const ex=(e>=1.5&&e-p>=2), fa=(f>=1&&f-p>=.5);
    if(ex&&(!fa||e-p>=f-p)){st[v]="e";st.m[v]=e-p;} else if(fa){st[v]="f";st.m[v]=f-p;} else {st[v]="p";st.m[v]=0;} });
  const rsc=rc?rs/rc*2:5; st.re=rsc>=8?"rep":rsc>=5.5?"mis":"rig";
  return st;
}
const foraOrd = st => { const sal=v=>st.m[v]*(st[v]==="e"?1.25:1); return VK.filter(v=>st[v]!=="p").sort((a,b)=>sal(b)-sal(a)); };
function pickArch(st){ const Z=v=>st[v];
  const combo=(Z("ex")==="e"&&Z("le")==="e")?"dono":(Z("al")==="e"&&Z("in")==="e")?"doa":(Z("le")==="e"&&Z("al")==="e")?"conciliador":(Z("ex")==="f"&&Z("in")==="f")?"acomodado":(Z("le")==="f"&&Z("al")==="f")?"lobo":null;
  const fo=foraOrd(st);
  if(!fo.length) return st.re==="rep"?"maestro":"equilibrado";
  return combo||("epi:"+fo[0]+"_"+st[fo[0]]);
}
const archInfo = a => a.indexOf("epi:")===0 ? (b=>({nome:b.epi,desc:b.aparece,meta:""}))(CONTENT.blocos[a.slice(4)]) : (CONTENT.arch[a]||{nome:a,desc:"",meta:""});
const needle = (v,st) => st[v]==="p"?50 : st[v]==="e"?Math.min(90,58+st.m[v]*9) : Math.max(10,42-st.m[v]*9);
const zLabel = z => z==="p"?"No ponto":z==="e"?"Excesso":"Falta";

/* ════════════════════════ ESTADO + ROTEAMENTO ════════════════════════ */
const Q = buildQuestions(); const N = Q.length;
const ans = {}; let step=0, nome="", leaderOpen=false;
const app=document.getElementById("app");
const $top=document.getElementById("top"), $bar=document.getElementById("bar"), $pct=document.getElementById("pct");

function progress(){ const s = step===0?0:(step>N?100:Math.round(step/(N+1)*100)); $bar.style.width=s+"%"; $pct.textContent=s+"%"; $top.classList.toggle("show",step>0&&step<=N); }
function paint(html,cls){ app.innerHTML=`<section class="screen ${cls||"enter"}">${html}</section>`; }
function transition(next){ const s=app.firstElementChild; if(s){s.classList.add("leaving"); setTimeout(next,200);} else next(); }
function goto(s){ step=Math.max(0,s); window.scrollTo({top:0,behavior:"instant"}); render(); }
function render(){ progress(); if(step===0) return Intro(); if(step>=1&&step<=N) return Question(step-1); return Report(); }

/* ════════════════════════ TELAS ════════════════════════ */
function Intro(){
  paint(`
    <div class="eyebrow">Mapa Comportamental ELOS</div>
    <h1>Os 5 <span class="it">Elos</span></h1>
    <p class="lead">Aqui não tem teste de certo ou errado — tem um <b>espelho</b>. Por situações do dia a dia, ele mostra como você funciona e onde está a sua alavanca.</p>
    <p class="sub">Não pense muito: escolha o que você <b>realmente faria</b>. Leva uns 8 minutos — e passa voando.</p>
    <label style="font-size:14px;color:var(--ink-2);font-weight:600">Como você se chama?</label>
    <input class="field" id="nm" placeholder="Seu primeiro nome" autocomplete="given-name" />
    <div class="row"><button class="btn gold" id="go">Começar &nbsp;→</button></div>`);
  const inp=document.getElementById("nm"); inp.value=nome;
  const begin=()=>{ nome=inp.value.trim(); transition(()=>goto(1)); };
  document.getElementById("go").onclick=begin;
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter") begin(); });
  setTimeout(()=>inp.focus(),300);
}
function Question(i){
  const q=Q[i], cur=ans[i], ic=AREA_ICON[q.area]||"";
  let body;
  if(q.type==="freq"){
    body=`<div class="scale">${FREQ.map((l,k)=>`<b class="${cur===k+1?"sel":""}" data-v="${k+1}">${l}</b>`).join("")}</div>`;
  } else {
    body=`<div class="opts">${q.opts.map((o,k)=>`<button class="opt ${cur===k?"sel":""}" data-k="${k}"><span class="key">${String.fromCharCode(65+k)}</span><span>${o.t}</span></button>`).join("")}</div>
      <button class="skip" data-k="skip">nenhuma combina comigo</button>`;
  }
  const cheer = CHEERS[i] ? `<div class="cheer">${CHEERS[i]}</div>` : "";
  paint(`
    <div class="qhead"><span class="qnum">${i+1} <span>/ ${N}</span></span><span class="chip">${ic} ${q.area}</span></div>
    <div class="qtext">${q.texto}</div>${body}${cheer}
    <div class="nav">${i>0?`<button class="back" id="bk">← voltar</button>`:""}</div>`);
  const choose = val => { ans[i]=val; // re-marca visual
    app.querySelectorAll(".opt,.scale b").forEach(el=>el.classList.remove("sel"));
    const sel = q.type==="freq" ? app.querySelector(`.scale b[data-v="${val}"]`) : app.querySelector(`.opt[data-k="${val}"]`);
    if(sel) sel.classList.add("sel");
    setTimeout(()=>transition(()=>goto(step+1)),230);
  };
  app.querySelectorAll(".opt").forEach(b=>b.onclick=()=>choose(b.dataset.k==="skip"?"skip":+b.dataset.k));
  app.querySelectorAll(".scale b").forEach(b=>b.onclick=()=>choose(+b.dataset.v));
  const sk=app.querySelector(".skip"); if(sk) sk.onclick=()=>choose("skip");
  const bk=document.getElementById("bk"); if(bk) bk.onclick=()=>transition(()=>goto(step-1));
}
function Report(){
  // tela de "montando" → revela
  paint(`<div class="computing"><div class="orbits"><span class="d"></span><span class="d"></span><span class="d"></span><span class="d"></span><span class="d"></span></div><div class="t">Montando o seu mapa…</div></div>`,"enter");
  $top.classList.remove("show");
  setTimeout(()=>transition(renderReport),1300);
}
function renderReport(){
  const st=score(), arche=pickArch(st), A=archInfo(arche), Nm=nome||"Você";
  const fora=foraOrd(st), lever=fora[0]||null, forca=VK.find(v=>st[v]==="p")||null;
  const gauges=VK.map(v=>{ const zc=st[v]==="p"?"var(--ponto)":st[v]==="f"?"var(--falta)":"var(--excesso)";
    let tag=""; if(v===lever) tag='<span class="tagp lev">Comece por aqui</span>'; else if(v===forca) tag='<span class="tagp for">Sua força</span>';
    return `<div class="gauge"><div class="gh"><span class="gn">${NOME[v]}</span><span class="gr">${tag}<span class="gz" style="color:${zc}">${zLabel(st[v])}</span></span></div>
      <div class="track"><span class="s"></span><span class="s"></span><span class="s"></span><span class="nd" data-pos="${needle(v,st)}"></span></div>
      <div class="tl"><span>Falta</span><span>Ponto de excelência</span><span>Excesso</span></div></div>`;}).join("");
  const blocos=fora.map((v,i)=>{ const b=CONTENT.blocos[v+"_"+st[v]]; if(!b) return ""; const lead=i===0;
    const al = lead
      ? `<div class="lyr"><span class="h">Sua alavanca — toque a que é mais a sua</span><ul class="alav">${b.alavancas.map(a=>`<li>${a}</li>`).join("")}</ul><div class="fill">${b.preenchimento}</div></div>`
      : `<div class="lyr"><span class="h">Uma alavanca pra depois</span><p>${b.alavancas[0]}</p></div>`;
    return `<div class="bloco ${lead?"lead":""}"><div class="ban">${BANNER[v]}</div>
      <div class="epi">${b.epi} ${lead?'<span class="start">Comece por aqui</span>':""}</div>
      <div class="estado">${b.estado}</div>
      <div class="voz">A voz interna que costuma rodar: “${b.voz}”</div>
      <div class="lyr"><span class="h">Como isso costuma aparecer</span><p>${b.aparece}</p></div>
      <div class="lyr"><span class="h">O sinal precoce</span><p>${b.sinal}</p></div>
      <div class="lyr"><span class="h">Pode aparecer de dois jeitos</span><p>${b.facetas}</p></div>
      <div class="lyr gr"><span class="h">A intenção positiva por trás</span><p>${b.ip}</p></div>
      ${al}
      <div class="ponte"><span class="h">Ponte pra próxima vez</span>${b.ponte}</div>
      <div class="bpull">“${b.pull}”</div></div>`;}).join("");
  const noP=VK.filter(v=>st[v]==="p");
  const pontos=noP.length?`<div class="lbl">Onde você está no ponto</div>`+noP.map(v=>{const p=CONTENT.ponto[v];
    return `<div class="pcard"><div class="pe">${NOME[v]} — ${p.epi} <i>força</i></div><p>${p.dom}</p></div>`;}).join(""):"";
  const repName=st.re==="rep"?"Repertório — você tem várias portas":st.re==="mis"?"Repertório em construção":"Rigidez — uma resposta automática";

  app.innerHTML=`<section class="screen enter stagger">
    <div class="eyebrow">A sua foto de agora</div>
    <h1>${Nm}, é assim que <span class="it">você funciona</span></h1>
    <div class="seal">✓ Você respondeu com Congruência — então o que vem aqui tem valor</div>
    <p class="sub">Isto não é um julgamento, é um espelho — e ele separa sempre <b>a pessoa do padrão</b>. É normal ter um ou dois elos fora do ponto; comece por um.</p>
    <div class="hero"><div class="k">Seu arquétipo-assinatura</div><div class="name">${A.nome}</div><p>${A.desc}</p>${A.meta?`<div class="mm">“${A.meta}”</div>`:""}</div>
    <div class="lbl">A foto dos 5 Elos</div>${gauges}
    ${fora.length?`<div class="lbl">Passeando pelos seus elos</div>${blocos}`:`<div class="pcard"><p style="margin:0">Seus cinco elos estão no ponto hoje — raro. O trabalho agora é afiar o repertório.</p></div>`}
    ${pontos}
    <div class="lbl">O que torna tudo isso mutável</div>
    <div class="rep"><div class="k">Repertório · Flexibilidade × Rigidez</div><div class="n">${repName}</div><p>${CONTENT.repLever[st.re]}</p></div>
    <div class="lcta"><div class="k">Para o líder</div><div class="t">Como conduzir essa pessoa pra um lugar melhor</div><p>Um guia separado — pro dono, sócio ou mentor: como reconhecer cada padrão no dia a dia, o que fazer, o que evitar, e a pergunta certa pra abrir a conversa.</p><button id="lead">${leaderOpen?"Esconder o Guia do Líder":"Ver o Guia do Líder →"}</button></div>
    <div id="lbox" class="${leaderOpen?"":"hidden"}">${leaderHTML(st,Nm)}</div>
    <div class="close">${Nm}, nenhum desses padrões é quem você é. São o que você <b>faz</b> hoje — e tudo que se faz, dá pra escolher fazer diferente. <b>Tomar consciência já é metade da mudança.</b> A outra metade é uma alavanca só, começando ${lever?`pela sua <b>${NOME[lever]}</b>`:"por onde te tocou mais"}.</div>
    <div class="row"><button class="btn gold" onclick="window.print()">Salvar / imprimir</button><button class="btn ghost" id="redo">Refazer</button></div>
    <div class="foot"><b>Instituto ELOS</b> · ELO Business<br>Os 5 Elos — relatório em camadas + Guia do Líder</div>
  </section>`;
  // anima as agulhas
  setTimeout(()=>app.querySelectorAll(".nd").forEach(n=>{n.classList.add("go");n.style.left=n.dataset.pos+"%";}),120);
  // interações
  app.querySelectorAll(".alav li").forEach(li=>li.onclick=()=>{li.parentElement.querySelectorAll("li").forEach(x=>x.classList.remove("on"));li.classList.add("on");});
  document.getElementById("lead").onclick=()=>{ leaderOpen=!leaderOpen; const box=document.getElementById("lbox"); box.classList.toggle("hidden",!leaderOpen); document.getElementById("lead").textContent=leaderOpen?"Esconder o Guia do Líder":"Ver o Guia do Líder →"; if(leaderOpen) setTimeout(()=>box.scrollIntoView({behavior:"smooth",block:"start"}),60); };
  document.getElementById("redo").onclick=()=>{ for(const k in ans) delete ans[k]; step=0; leaderOpen=false; window.scrollTo({top:0}); transition(render); };
}
function leaderHTML(st,Nm){
  const fora=foraOrd(st);
  let r=`<div class="lbl">Guia do Líder</div>
    <div class="postura">Você não conserta a Lealdade, a Excelência ou a Alma de ninguém — você cria o ambiente onde o ponto fica fácil. Conduzir aqui é fazer pergunta e devolver a escolha. Use o nome do valor como língua comum com ${Nm}.</div>`;
  if(!fora.length){ r+=`<div class="lcard"><p>${Nm} está equilibrado(a) nos cinco elos. Conduza pelo Repertório: ${st.re==="rep"?"já escolhe bem — desafie com problemas mais complexos.":"ajude a enxergar os próprios padrões antes de eles pegarem."}</p></div>`; return r; }
  fora.forEach((v,i)=>{ const b=CONTENT.blocos[v+"_"+st[v]]; if(!b) return; const li=b.lider, lead=i===0;
    r+=`<div class="lcard ${lead?"lead":""}"><h3>${NOME[v]} — ${b.epi} ${lead?'<span class="start" style="background:var(--green)">O principal</span>':""}</h3>
      <div class="lb"><span class="h">Como ajuda o time</span><p>${li.ajuda}</p></div>
      <div class="lb w"><span class="h">Onde atrapalha</span><p>${li.atrapalha}</p></div>
      <div class="lb"><span class="h">Como reconhecer no dia a dia</span><p>${li.reconhecer}</p></div>
      <div class="lb"><span class="h">Como conduzir pro ponto</span><p>${li.conduzir}</p></div>
      <div class="lb w"><span class="h">O que evitar</span><p>${li.evitar}</p></div>
      <div class="lb"><span class="h">Não se assuste se</span><p>${li.naoSeAssuste}</p></div>
      <div class="lb"><span class="h">Modo de condução (repertório ${st.re})</span><p>${st.re==="rep"?li.repAlto:li.repBaixo}</p></div>
      <div class="lb q"><span class="h">A pergunta pra abrir a conversa</span><p>“${li.pergunta}”</p></div></div>`;});
  return r;
}
render();
</script>
</body>
</html>

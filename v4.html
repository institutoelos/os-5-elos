<style>
/* ============================ DESIGN SYSTEM ============================ */
:root{
  --bg:#F4EFE7; --bg-grad-a:#F7F2EA; --bg-grad-b:#EFE7DA;
  --ink:#231F1A; --ink-2:#5E574D; --ink-3:#928A7C;
  --line:#E5DCCC; --line-2:#D8CCB8; --card:#FFFFFF;
  --gold:#B4823A; --gold-2:#C99A50; --gold-soft:#EFDFBE; --gold-bg:#FBF3E2;
  --green:#3E7A5C; --green-soft:#D7E9DC; --green-bg:#EAF3EC;
  --terra:#B25B3C; --terra-soft:#F0D7CC;
  --amber:#A6863F; --amber-soft:#EFE3C4;
  --falta:#A6863F; --ponto:#3E7A5C; --excesso:#B25B3C;
  --shadow-sm:0 2px 10px -4px rgba(60,40,15,.18);
  --shadow:0 14px 50px -22px rgba(60,40,15,.40);
  --shadow-lg:0 30px 70px -30px rgba(60,40,15,.45);
  --serif:"Fraunces",ui-serif,Georgia,"Times New Roman",serif;
  --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --r:18px; --r-lg:26px;
  --ease:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--sans);color:var(--ink);line-height:1.55;font-size:16px;
  background:radial-gradient(120% 90% at 50% -10%, var(--bg-grad-a), var(--bg-grad-b) 70%) fixed;
  min-height:100dvh;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  display:flex;flex-direction:column;align-items:center;overflow-x:hidden;
}
.wrap{width:100%;max-width:680px;padding:0 22px;flex:1;display:flex;flex-direction:column}
::selection{background:var(--gold-soft)}

/* ---------- top bar / progress ---------- */
.top{position:sticky;top:0;z-index:20;padding:18px 0 12px;
  background:linear-gradient(var(--bg-grad-a) 62%, transparent);display:flex;align-items:center;gap:14px;opacity:0;transition:opacity .4s}
.top.show{opacity:1}
.logo{font-family:var(--serif);font-weight:600;font-size:16px;letter-spacing:.01em;white-space:nowrap}
.logo b{color:var(--gold);font-style:italic}
.bar{flex:1;height:6px;background:rgba(180,160,130,.22);border-radius:99px;overflow:hidden}
.bar > i{display:block;height:100%;width:0;border-radius:99px;
  background:linear-gradient(90deg,var(--gold-2),var(--gold) 40%,var(--green));transition:width .55s var(--ease)}
.pctn{font-size:12.5px;font-weight:600;color:var(--ink-3);font-variant-numeric:tabular-nums;min-width:36px;text-align:right}

/* ---------- screen transitions ---------- */
.screen{flex:1;display:flex;flex-direction:column;justify-content:center;padding:6px 0 52px}
.enter{animation:enter .55s var(--ease) both}
.leaving{animation:leave .26s ease both}
@keyframes enter{from{opacity:0;transform:translateY(20px) scale(.985)}to{opacity:1;transform:none}}
@keyframes leave{to{opacity:0;transform:translateY(-12px) scale(.99)}}
.stagger > *{animation:enter .5s var(--ease) both}
.stagger > *:nth-child(2){animation-delay:.05s}.stagger > *:nth-child(3){animation-delay:.1s}
.stagger > *:nth-child(4){animation-delay:.15s}.stagger > *:nth-child(5){animation-delay:.2s}
.stagger > *:nth-child(6){animation-delay:.25s}.stagger > *:nth-child(n+7){animation-delay:.3s}

/* ---------- typography ---------- */
.eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:16px}
h1{font-family:var(--serif);font-weight:600;font-size:clamp(33px,8.5vw,50px);line-height:1.04;letter-spacing:-.018em;margin-bottom:20px}
h1 .it{font-style:italic;color:var(--gold)}
.lead{font-size:18px;color:var(--ink);line-height:1.5;margin-bottom:16px}
.sub{font-size:16px;color:var(--ink-2);margin-bottom:18px}
.pull{font-family:var(--serif);font-style:italic;font-size:19px;line-height:1.4;color:var(--ink);
  border-left:3px solid var(--gold-soft);padding-left:18px;margin:22px 0}

/* ---------- buttons / fields ---------- */
.btn{appearance:none;border:none;cursor:pointer;font-family:var(--sans);font-weight:650;font-size:16px;
  background:var(--ink);color:#fff;padding:17px 30px;border-radius:15px;box-shadow:var(--shadow);
  transition:transform .14s var(--ease),box-shadow .2s,filter .2s;display:inline-flex;align-items:center;gap:9px}
.btn:hover{filter:brightness(1.08)}.btn:active{transform:translateY(1px) scale(.985)}
.btn.gold{background:linear-gradient(135deg,var(--gold-2),var(--gold))}
.btn.ghost{background:transparent;color:var(--ink-2);box-shadow:none;border:1.5px solid var(--line-2);font-weight:600}
.row{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.field{width:100%;font:inherit;font-size:18px;padding:17px 18px;border:1.5px solid var(--line-2);border-radius:15px;
  background:var(--card);color:var(--ink);margin:8px 0 20px;box-shadow:var(--shadow-sm);transition:border-color .2s,box-shadow .2s}
.field:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-soft)}
.field::placeholder{color:var(--ink-3)}

/* ---------- question ---------- */
.qhead{display:flex;align-items:center;gap:11px;margin-bottom:18px}
.qnum{font-size:13px;color:var(--gold);font-weight:700;letter-spacing:.04em;font-variant-numeric:tabular-nums}
.qnum span{color:var(--ink-3);font-weight:600}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;letter-spacing:.04em;
  text-transform:uppercase;color:var(--green);background:var(--green-bg);padding:5px 12px;border-radius:99px;border:1px solid var(--green-soft)}
.qtext{font-family:var(--serif);font-weight:500;font-size:clamp(21px,5.2vw,28px);line-height:1.26;margin-bottom:26px;letter-spacing:-.01em}
.opts{display:flex;flex-direction:column;gap:11px}
.opt{display:flex;align-items:center;gap:15px;width:100%;text-align:left;background:var(--card);
  border:1.5px solid var(--line);border-radius:16px;padding:17px 18px;cursor:pointer;font:inherit;font-size:16px;
  color:var(--ink);line-height:1.4;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
  transition:border-color .18s,transform .14s var(--ease),box-shadow .18s,background .18s}
.opt:hover{border-color:var(--gold-soft);transform:translateY(-1px)}
.opt:active{transform:scale(.99)}
.opt .key{font-family:var(--serif);font-weight:600;font-size:15px;color:var(--gold);width:24px;height:24px;flex:none;
  display:grid;place-items:center;border:1.5px solid var(--line-2);border-radius:8px;transition:.18s}
.opt.sel{border-color:var(--gold);background:var(--gold-bg);box-shadow:0 0 0 3px var(--gold-soft),var(--shadow-sm)}
.opt.sel .key{background:var(--gold);color:#fff;border-color:var(--gold)}
.opt.sel::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(201,154,80,.16),transparent);
  animation:sweep .5s var(--ease)}
@keyframes sweep{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.scale{display:flex;gap:8px}
.scale b{flex:1;text-align:center;background:var(--card);border:1.5px solid var(--line);border-radius:13px;
  padding:15px 4px;font:inherit;font-size:13.5px;font-weight:600;color:var(--ink-2);cursor:pointer;line-height:1.2;
  box-shadow:var(--shadow-sm);transition:.16s var(--ease)}
.scale b:hover{border-color:var(--gold-soft);color:var(--ink);transform:translateY(-1px)}
.scale b.sel{background:linear-gradient(135deg,var(--gold-2),var(--gold));color:#fff;border-color:var(--gold);transform:translateY(-2px)}
.skip{display:block;margin:18px auto 0;background:none;border:none;color:var(--ink-3);text-decoration:underline;
  text-underline-offset:3px;cursor:pointer;font:inherit;font-size:14px}
.nav{margin-top:26px}
.back{background:none;border:none;color:var(--ink-3);cursor:pointer;font:inherit;font-size:14.5px;display:inline-flex;align-items:center;gap:6px}
.back:hover{color:var(--ink-2)}
.cheer{margin-top:14px;font-size:13.5px;color:var(--gold);font-weight:600;text-align:center;animation:enter .5s var(--ease)}

/* ---------- computing ---------- */
.computing{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:26px;min-height:60vh}
.orbits{position:relative;width:120px;height:120px}
.orbits .d{position:absolute;width:15px;height:15px;border-radius:99px;top:50%;left:50%;margin:-7px}
.orbits .d:nth-child(1){background:var(--gold)}.orbits .d:nth-child(2){background:var(--green)}
.orbits .d:nth-child(3){background:var(--terra)}.orbits .d:nth-child(4){background:var(--amber)}
.orbits .d:nth-child(5){background:var(--ink)}
.orbits .d{animation:orbit 1.5s var(--ease) infinite}
.orbits .d:nth-child(2){animation-delay:.12s}.orbits .d:nth-child(3){animation-delay:.24s}
.orbits .d:nth-child(4){animation-delay:.36s}.orbits .d:nth-child(5){animation-delay:.48s}
@keyframes orbit{0%,100%{transform:rotate(0deg) translateX(46px) scale(.7);opacity:.5}50%{transform:rotate(180deg) translateX(46px) scale(1.25);opacity:1}}
.computing .t{font-family:var(--serif);font-size:22px;color:var(--ink);font-weight:500}

/* ============================ REPORT ============================ */
.seal{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--green);
  background:var(--green-bg);border:1px solid var(--green-soft);padding:8px 15px;border-radius:99px;margin:8px 0 20px}
.hero{background:linear-gradient(150deg,#28221b,#3c3023 55%,#4a3a26);color:#f7eede;border-radius:var(--r-lg);
  padding:30px 26px;margin:8px 0 28px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;right:-60px;top:-50px;width:220px;height:220px;
  background:radial-gradient(circle,rgba(201,154,80,.5),transparent 68%)}
.hero::after{content:"";position:absolute;left:-40px;bottom:-60px;width:180px;height:180px;
  background:radial-gradient(circle,rgba(62,122,92,.32),transparent 70%)}
.hero .k{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-soft);font-weight:700;position:relative}
.hero .name{font-family:var(--serif);font-weight:600;font-size:clamp(30px,7vw,40px);line-height:1.05;margin:8px 0 12px;position:relative;letter-spacing:-.01em}
.hero p{color:#e8dcc7;font-size:16px;position:relative;margin:0}
.hero .mm{margin-top:16px;font-family:var(--serif);font-style:italic;font-size:17.5px;color:#f8eed8;
  border-top:1px solid rgba(255,255,255,.16);padding-top:15px;position:relative}
.lbl{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:700;margin:34px 0 15px;display:flex;align-items:center;gap:10px}
.lbl::after{content:"";flex:1;height:1px;background:var(--line)}

/* gauges */
.gauge{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 19px;margin-bottom:11px;box-shadow:var(--shadow-sm)}
.gauge .gh{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px;gap:8px}
.gauge .gn{font-family:var(--serif);font-weight:600;font-size:17.5px}
.gauge .gr{display:flex;gap:8px;align-items:center}
.tagp{font-size:10.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:3px 9px;border-radius:99px}
.tagp.lev{background:var(--terra-soft);color:#8c3f23}.tagp.for{background:var(--green-soft);color:#2c5942}
.gz{font-size:12.5px;font-weight:700}
.track{position:relative;height:11px;border-radius:99px;display:flex;margin:0 9px;box-shadow:inset 0 1px 3px rgba(0,0,0,.07)}
.track .s{flex:1;height:100%}
.track .s:first-child{border-radius:99px 0 0 99px;background:var(--amber-soft)}
.track .s:nth-child(2){background:var(--green-soft)}
.track .s:last-child{border-radius:0 99px 99px 0;background:var(--terra-soft)}
.nd{position:absolute;top:50%;width:21px;height:21px;border-radius:99px;background:#fff;border:3px solid var(--ink);
  transform:translate(-50%,-50%) scale(0);box-shadow:0 3px 12px -2px rgba(0,0,0,.45);left:50%;transition:left .9s var(--ease) .2s}
.nd.go{animation:pop .5s var(--ease) forwards}
@keyframes pop{to{transform:translate(-50%,-50%) scale(1)}}
.tl{display:flex;justify-content:space-between;font-size:10.5px;color:var(--ink-3);margin:9px 9px 0;font-weight:500}

/* bloco em camadas */
.bloco{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:24px 22px;margin-bottom:15px;box-shadow:var(--shadow-sm)}
.bloco.lead{border:1.5px solid var(--gold-soft);box-shadow:0 0 0 3px var(--gold-soft),var(--shadow)}
.bloco .ban{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:700}
.bloco .epi{font-family:var(--serif);font-weight:600;font-size:24px;margin:5px 0 3px;line-height:1.12;display:flex;align-items:center;gap:11px;flex-wrap:wrap}
.start{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:4px 10px;border-radius:99px;background:linear-gradient(135deg,var(--gold-2),var(--gold));color:#fff}
.estado{font-size:13px;color:var(--ink-2);font-weight:600;margin-bottom:2px}
.voz{font-family:var(--serif);font-style:italic;color:var(--ink-2);font-size:16px;margin:15px 0 0;line-height:1.4}
.lyr{margin-top:15px}
.lyr .h{font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:800;color:var(--gold)}
.lyr.gr .h{color:var(--green)}
.lyr p{margin:4px 0 0;color:var(--ink);font-size:15.5px;line-height:1.5}
.alav{margin-top:8px;display:flex;flex-direction:column;gap:9px}
.alav li{list-style:none;position:relative;padding:12px 14px 12px 38px;background:var(--gold-bg);border:1px solid var(--gold-soft);
  border-radius:12px;font-size:15px;color:var(--ink);line-height:1.45;cursor:pointer;transition:.16s var(--ease)}
.alav li::before{content:"";position:absolute;left:14px;top:15px;width:14px;height:14px;border:1.5px solid var(--gold);border-radius:5px;transition:.16s}
.alav li:hover{transform:translateX(2px)}
.alav li.on{background:#fff;border-color:var(--gold)}
.alav li.on::before{background:var(--gold);box-shadow:inset 0 0 0 2px #fff}
.fill{margin-top:13px;background:var(--bg-grad-b);border:1px dashed var(--gold-2);border-radius:13px;padding:14px 15px;font-size:14.5px;color:var(--ink-2)}
.fill b{color:var(--ink)}
.ponte{margin-top:15px;font-size:15px;color:var(--ink-2);line-height:1.5}
.ponte .h{font-weight:700;color:var(--green);font-size:11px;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:3px}
.bpull{font-family:var(--serif);font-style:italic;font-size:18px;line-height:1.35;color:var(--gold);margin-top:17px;padding-left:16px;border-left:3px solid var(--gold-soft)}
.pcard{background:var(--green-bg);border:1px solid var(--green-soft);border-radius:var(--r);padding:17px 19px;margin-bottom:10px}
.pcard .pe{font-family:var(--serif);font-weight:600;font-size:17px;display:flex;gap:10px;align-items:center}
.pcard .pe i{font-size:10px;font-weight:800;text-transform:uppercase;background:var(--green);color:#fff;padding:3px 9px;border-radius:99px;font-style:normal;letter-spacing:.04em}
.pcard p{margin:8px 0 0;font-size:15px;color:var(--ink)}
.rep{background:linear-gradient(150deg,#163029,#274a3f);color:#eaf3ee;border-radius:var(--r-lg);padding:24px 22px;margin:8px 0}
.rep .k{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--green-soft);font-weight:700}
.rep .n{font-family:var(--serif);font-size:23px;font-weight:600;margin:7px 0 9px}
.rep p{color:#d6e7de;font-size:15px;margin:0}
.close{font-family:var(--serif);font-size:21px;line-height:1.42;color:var(--ink);margin:30px 0 14px}
.close b{color:var(--gold)}

/* guia do lider */
.lcta{background:linear-gradient(150deg,#1d2a25,#243a32);color:#eaf3ee;border-radius:var(--r-lg);padding:24px 22px;margin:20px 0;box-shadow:var(--shadow)}
.lcta .k{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--green-soft);font-weight:700}
.lcta .t{font-family:var(--serif);font-size:21px;font-weight:600;margin:7px 0 8px;line-height:1.15}
.lcta p{color:#cfe0d8;font-size:15px;margin:0 0 16px}
.lcta button{background:#fff;color:#16302a;border:none;border-radius:13px;padding:14px 24px;font:inherit;font-weight:700;font-size:15px;cursor:pointer;box-shadow:var(--shadow);transition:transform .14s var(--ease),filter .2s}
.lcta button:hover{filter:brightness(.96)}.lcta button:active{transform:scale(.98)}
.postura{font-family:var(--serif);font-style:italic;color:var(--ink-2);font-size:16px;margin:6px 0 18px;border-left:3px solid var(--green-soft);padding-left:16px;line-height:1.45}
.lcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:20px 21px;margin-bottom:13px;box-shadow:var(--shadow-sm)}
.lcard.lead{border:1.5px solid var(--green-soft);box-shadow:0 0 0 3px var(--green-soft),var(--shadow-sm)}
.lcard h3{font-family:var(--serif);font-size:19px;font-weight:600;margin-bottom:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.lb{margin-top:12px}
.lb .h{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:var(--green)}
.lb.w .h{color:var(--terra)}
.lb p{margin:3px 0 0;font-size:15px;color:var(--ink);line-height:1.48}
.lb.q{background:var(--green-bg);border:1px solid var(--green-soft);border-radius:12px;padding:13px 15px;margin-top:15px}
.lb.q p{font-family:var(--serif);font-style:italic;font-size:16px;color:#1f3a30}

.foot{font-size:12.5px;color:var(--ink-3);border-top:1px solid var(--line);margin-top:34px;padding:20px 0 46px;text-align:center;line-height:1.6}
.foot b{color:var(--ink-2)}
.hidden{display:none!important}
@media(max-width:480px){.wrap{padding:0 18px}}
@media print{
  .top,.nav,.row,.lcta button,.skip{display:none!important}
  .hidden{display:block!important}
  body{background:#fff}
  .em30,.combo2,.reg,.qbox,.plano,.falta,.combos,.alerta,.manual,.prio,.hero,.cbox,.mt,.pn,.fbar,.fbar i,.rbar,.rbar i,.qd,.lcta,.lyr{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .em30,.combo2,.reg,.qbox,.plano,.falta,.combos,.alerta,.manual,.obra,.prio,.hero,.cbox{break-inside:avoid;page-break-inside:avoid}
}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

.obra{margin:14px 0;padding:14px 16px;border:1px solid rgba(0,0,0,.08);border-radius:18px;background:#fff}
.eixo{display:flex;justify-content:space-between;align-items:baseline;margin:2px 0 8px;font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-2);font-weight:700}
.eixo b{font-size:11px;opacity:.6;font-weight:600}
.frow{display:flex;align-items:center;gap:9px;padding:6px 0}
.frow .fn{flex:0 0 132px;display:flex;flex-direction:column;line-height:1.15}
.frow .fn b{font-weight:600;font-size:13.5px}
.frow .fn i{font-style:normal;font-size:10px;color:var(--ink-3);font-weight:500;margin-top:1px;letter-spacing:.005em}
.frow .fbar{flex:1;height:7px;border-radius:6px;background:rgba(0,0,0,.07);position:relative;overflow:hidden}

const CONTENT = {"raiva": {"nome": "O Inconformado", "mercado": "Governança", "frase": "Você move pela indignação com o que está errado.", "curto": {"comportamentos": "Cobra, não deixa o medíocre passar, bate o pé pelo que acredita, confronta de frente. Quem trabalha com você sabe onde pisa, e sente a régua.", "ferida": "Injustiça, ser controlado, passar por cima de você.", "sofrimento": "O mundo não é como deveria ser, e isso te consome.", "evolucao": "Usar a indignação como bússola, não como detonador. Cobrar sem queimar a ponte."}, "fundo": {"essencia": "No fundo, você é movido por uma recusa: a de aceitar que o errado fique do jeito que está. Onde a maioria passa a vista e segue, você trava, algo dentro grita que não pode ser assim, e esse grito é o seu motor. Não é mau humor nem birra; é uma noção de como as coisas deveriam ser, tão nítida que a distância entre o ideal e o real te dói fisicamente. Por isso você cobra, confronta, bate o pé: a indignação, em você, é uma forma de cuidado disfarçada de dureza, você briga porque ainda acredita que dá pra ser melhor.", "comportamentos": "No dia a dia isso aparece de um jeito que ninguém ignora: você diz o que os outros engolem, aponta o que está torto na frente de todos, não deixa o medíocre passar batido. Quem trabalha com você sabe exatamente onde pisa, você é régua viva, e tem gente que cresce ao seu lado justamente porque você não afrouxa. Essa é a luz. A sombra é a mesma força sem freio: o tom que sobe rápido demais, a crítica que mira a pessoa e não o erro, o silêncio pesado depois de uma reunião em que você \"só falou a verdade\". Você raramente sai de uma sala sem deixar marca, a questão é se a marca foi a correção que faltava ou a ferida que vai cobrar caro lá na frente.", "usoMaduro": "Maduro, você usa a indignação como bússola, não como detonador. Sente o errado com a mesma intensidade de sempre, mas escolhe o momento, a dose e o alvo, cobra o comportamento, defende o padrão, e separa o que a pessoa fez do que a pessoa é. Aqui sua raiva vira a coisa mais rara numa empresa: alguém disposto a ter a conversa difícil que todo mundo evita, com firmeza e sem covardia. Você confronta de frente, mas a outra pessoa sai sabendo o que precisa mudar, não querendo te destruir. É quando a sua dureza protege o time em vez de feri-lo.", "usoImaturo": "Imaturo, é a força que te governa em vez de você governar ela. A indignação não espera o momento certo, explode na hora, na frente de quem não devia, com uma força desproporcional ao tamanho do erro. Você ataca a pessoa achando que está atacando o problema, queima pontes que levou anos pra construir e depois guarda o rancor como quem cobra uma dívida que o outro nem sabe que tem. O pior: você quase sempre tem razão no conteúdo e perde tudo na forma, e aí ninguém escuta o que você disse, só lembra de como você disse. A conta vem em gente boa que vai embora calada e em verdades que param de chegar até você.", "ferida": "A ferida central é a injustiça, ter sido passado pra trás, controlado, ou visto errado por quem tinha poder sobre você. Em algum momento você aprendeu que, se não brigar, ninguém vai te defender, que o mundo passa por cima de quem fica quieto. Por isso ser controlado, ser injustiçado ou ver alguém abusar de poder te aciona de imediato, num reflexo mais antigo que a situação na sua frente. A raiva nasceu ali como armadura: ela te protegeu quando você era pequeno demais pra se impor de outro jeito, e continua se armando sozinha, mesmo quando você já não precisa mais dela.", "sofrimento": "Seu sofrimento recorrente é viver num mundo que insiste em não ser como deveria ser. O errado está em todo lugar, na entrega malfeita, na palavra não cumprida, no detalhe que ninguém mais nota, e você vê tudo, o tempo todo, sem botão de desligar. Isso te consome: você carrega uma tensão de fundo, uma irritação que nunca descansa, porque sempre tem algo torto pedindo correção. E vem a solidão de ser quem segura a régua: o que pra você é zelo, pros outros parece implicância, e você acaba sendo o chato necessário que ninguém agradece.", "evolucao": "O caminho não é sentir menos, é não deixar a primeira reação virar a sua reação. Crie o intervalo: entre o estímulo e a resposta, ganhe alguns segundos pra perguntar se aquele erro merece toda essa força, ou se você está descarregando algo que vem de antes. Aprenda a separar o errado grave do errado pequeno, você gasta a mesma munição com os dois, e devia guardar fôlego pro que importa. E faça o trabalho mais difícil pra você: cobrar sem ferir, dizer a verdade dura de um jeito que o outro consiga receber. Quando a sua indignação vira padrão defendido com justiça em vez de fogo amigo, você deixa de ser temido e passa a ser respeitado, e essas duas coisas não são a mesma.", "comoLiderar": "Quem lidera o Inconformado precisa dar a ele uma causa que valha a indignação e uma régua clara pra defender, sem alvo legítimo, a energia dele vira fogo amigo e mira pra dentro do próprio time. Não tente amaciar o confronto nem pedir que ele \"pegue mais leve\"; isso ele lê como pedir pra ser falso. Canalize: mostre onde a dureza dele constrói e onde ela destrói, e dê o exemplo de como ter a conversa difícil sem queimar a pessoa. Evite humilhá-lo em público ou passar por cima dele em decisão que era dele, é o gatilho mais certeiro pra acionar a ferida e perder a confiança de vez. Bem conduzido, ele é o melhor guardião de padrão que você vai ter: a pessoa que sustenta a exigência quando todo mundo afrouxou."}, "denso": {"emo": "raiva", "voceE": "Firme, frontal, exigente, inconformado.", "oQueMove": "A recusa de aceitar que o errado fique do jeito que está.", "forcas": ["Tem a conversa difícil que todo mundo evita.", "Sustenta o padrão quando o resto do time afrouxa.", "Diz o que os outros engolem, e na frente de todos.", "Régua viva: quem trabalha com você sabe onde pisa."], "pontosAtencao": ["O tom sobe rápido demais e mira a pessoa, não o erro.", "Você tem razão no conteúdo e perde tudo na forma.", "Queima ponte que levou anos pra construir, e guarda o rancor."], "feridaCurta": "A injustiça: ter sido controlado, passado pra trás ou visto errado por quem tinha poder.", "sofrimentoCurto": "Viver vendo o errado em todo lugar, o tempo todo, sem botão de desligar.", "precisaDesenvolver": "o intervalo entre o estímulo e a resposta, cobrar sem queimar.", "eviteComVoce": "humilhar em público ou passar por cima de uma decisão que era dela.", "comoConduzir": ["Dê uma causa que valha a indignação e uma régua clara pra ele defender.", "Não peça pra 'pegar mais leve', ele lê como pedido pra ser falso.", "Mostre onde a dureza dele constrói e onde ela destrói."], "alavanca": "Nos próximos dias, antes de cobrar no calor, ganhe alguns segundos e pergunte: esse erro merece toda essa força?"}}, "medo": {"nome": "O Guardião", "mercado": "Prudência", "frase": "Você protege o que importa antecipando o que pode dar errado.", "curto": {"comportamentos": "Pensa nos riscos, se prepara, não se afoba, segura a barra na crise. É difícil te pegar de surpresa.", "ferida": "Insegurança, ameaça, traição.", "sofrimento": "E se der errado? Não dá pra confiar.", "evolucao": "Agir apesar do medo. Separar o risco real do fantasma."}, "fundo": {"essencia": "No seu núcleo existe um vigia que nunca dorme. Antes de qualquer decisão, uma parte sua já rodou o filme até o fim e viu onde a coisa pode desabar, e é exatamente isso que faz você sentir o peso de proteger o que construiu. O medo, no seu caso, não é fraqueza: é a antena que percebe a ameaça enquanto os outros ainda estão comemorando. O motor por baixo de tudo é responsabilidade, você carrega o que pode dar errado como se fosse seu dever pessoal evitar que aconteça.", "comportamentos": "No dia a dia você é o que lê o contrato até a última cláusula, monta o plano B antes de precisar dele e não se afoba quando todo mundo já está eufórico. Na crise, enquanto o time entra em pânico, você é a pessoa mais firme da sala, porque você já tinha imaginado aquilo. Essa é a luz. A sombra aparece quando o mesmo radar que te protege começa a ver fantasma em tudo: você adia decisão boa por excesso de cautela, pede mais uma análise que já não muda nada, e transforma prudência em freio de mão puxado. Quem trabalha com você sente segurança, mas às vezes também sente o ar mais pesado do que precisava.", "usoMaduro": "Você maneja bem quando usa o medo pra preparar, não pra paralisar. É quando você lê o risco real, separa ele do ruído, monta o plano e age, mesmo com o frio na barriga ainda presente. A maturidade aqui não é deixar de sentir medo; é agir apesar dele. Nesse ponto você vira o líder que a empresa quer ter no comando quando o mar fica grosso: calmo porque preparado, firme porque já pensou no pior e sabe que aguenta. A sua cautela, bem usada, é o seguro que evita o prejuízo que quebraria os outros.", "usoImaturo": "A sombra te governa quando o medo deixa de ser conselheiro e vira chefe. Aí você trava: adia o lançamento esperando a garantia que nunca vem, segura a contratação que faria diferença, perde a janela porque exigiu certeza onde só existia risco aceitável. A ansiedade come por dentro, você revisa o que já está pronto, antecipa catástrofe que não tem base, e gasta energia defendendo o que nem está sendo atacado. O preço é alto e silencioso: enquanto você protege contra a ameaça que imaginou, a oportunidade real passa pela porta. Cautela demais também é uma forma de prejuízo, só que ninguém vê na planilha.", "ferida": "A ferida nasce de algum lugar onde o chão sumiu sem aviso, uma perda, uma traição, uma vez em que você confiou e levou a conta. Ali você aprendeu, no corpo, que baixar a guarda custa caro. Desde então uma parte sua decidiu que nunca mais seria pego desprevenido, e é essa parte que vigia. A ferida morde toda vez que você sente que não está no controle, que depende da palavra de alguém, que precisa confiar sem ter como garantir. A insegurança, a ameaça e a traição não são só temas pra você, são o lugar exato onde a cicatriz ainda dói quando alguém aperta.", "sofrimento": "Seu sofrimento recorrente tem nome: \"e se der errado?\". É a pergunta que liga sozinha, de madrugada, mesmo quando tudo está indo bem. Você sofre porque enxerga os riscos com nitidez que os outros não têm, e carrega esse peso sozinho, achando que se não for você a se preocupar, ninguém vai. A desconfiança crônica cansa: é exaustivo viver achando que não dá pra confiar de verdade em ninguém nem em nada. No fundo, você paga o preço de uma vigilância que nunca tira folga.", "evolucao": "O caminho concreto começa por uma separação que muda tudo: distinguir o risco real do fantasma. Pega o que te trava e pergunta, isso é uma ameaça com evidência, ou é a velha cicatriz projetando? Treine agir com o medo ainda presente, em decisões pequenas primeiro, pra provar pro seu corpo que dá pra saltar e sobreviver. Coloque prazo na análise: cautela tem hora pra acabar, senão vira fuga disfarçada de prudência. E o passo mais difícil, aprender a delegar a vigilância, confiar parte da guarda a quem é seu, em vez de carregar tudo. Você não precisa parar de ver o risco. Precisa parar de deixar ele decidir por você.", "comoLiderar": "Quem lidera o Guardião precisa entender uma coisa: pressão crua não funciona, só aperta o freio. Antes de pedir o salto, dê contexto e segurança, mostre o terreno, reconheça o risco que ele já enxergou (ignorar isso é perder ele na hora) e prove que dá pra agir mesmo assim. Use o radar dele a favor: ponha o Guardião pra mapear o que pode dar errado num projeto e você ganha o melhor mapa de risco da empresa. O que evitar: surpresa, mudança de última hora sem aviso, e tratar a cautela dele como covardia. O que dar: previsibilidade, tempo razoável pra ele se preparar, e o empurrão firme, mas respeitoso, pra ele agir quando a análise já deu o que tinha que dar."}, "denso": {"emo": "medo", "voceE": "Cauteloso, vigilante, preparado, firme na crise.", "oQueMove": "Proteger o que construiu antecipando onde pode desabar.", "forcas": ["Lê o risco que os outros só veem quando já é tarde.", "Monta o plano B antes de precisar dele.", "É a pessoa mais firme da sala quando o mar fica grosso.", "Não se afoba na euforia coletiva, segura a régua."], "pontosAtencao": ["Adia decisão boa por excesso de cautela.", "Pede mais uma análise que já não muda nada.", "Vê fantasma onde só existe risco aceitável."], "feridaCurta": "Uma vez o chão sumiu sem aviso, e baixar a guarda passou a custar caro.", "sofrimentoCurto": "O \"e se der errado?\" que liga sozinho de madrugada, mesmo com tudo indo bem.", "precisaDesenvolver": "separar o risco real do fantasma e agir com o medo ainda presente.", "eviteComVoce": "surpresa, mudança de última hora sem aviso e tratar a cautela dela como covardia.", "comoConduzir": ["Dê contexto e segurança antes de pedir o salto.", "Reconheça o risco que ela já enxergou, ignorar isso é perder ela na hora.", "Use o radar a favor: ponha ela pra mapear o que pode dar errado."], "alavanca": "Nos próximos dias, pegue uma decisão travada, ponha prazo na análise e aja antes do prazo vencer, mesmo com o frio na barriga."}}, "tristeza": {"nome": "O Profundo", "mercado": "Profundidade", "frase": "Você sente fundo e leva cada coisa a sério.", "curto": {"comportamentos": "Percebe o clima antes dos outros, conecta pelo que dói, não passa por cima. Tem peso e uma presença que não precisa de barulho.", "ferida": "Rejeição, perda, não pertencer.", "sofrimento": "A falta, a ausência, o vazio.", "evolucao": "Virar a sensibilidade em conexão, não em retraimento."}, "fundo": {"essencia": "No seu núcleo existe um líder que se recusa a viver na superfície. Onde os outros passam batido, você sente, o que dói, o que está fora do lugar, o que ninguém teve coragem de dizer em voz alta. Esse é o motor: você não consegue tratar nada como descartável, nenhuma pessoa como peça, nenhum problema como número numa planilha. A tristeza, no seu caso, não é fraqueza, é a profundidade de quem leva a vida e os outros a sério demais pra fingir que está tudo bem quando não está.", "comportamentos": "Na sala você é o primeiro a perceber o clima virar, sente o desânimo de um time, a tensão num cliente, a despedida que ainda não foi anunciada. Conecta pelo que dói, não pelo que brilha: as pessoas confiam em você porque sentem que você não passa por cima delas. Tem peso e uma presença que dispensa barulho, quando você fala, pesa. Essa é a luz. A sombra é que o mesmo radar que capta tudo também recolhe tudo pra dentro: você carrega dor que não é sua, rumina a conversa que já acabou, e às vezes some pra um canto quando o que o time precisava era de você na frente.", "usoMaduro": "A força aparece quando você usa a sensibilidade como instrumento, não como dreno. Você lê a pessoa e age sobre a leitura: chama pra conversa quem está se afundando, segura uma decisão pesada até o momento certo, dá ao luto e à perda o espaço que a pressa do mercado costuma negar. Madura, sua profundidade vira lealdade, gente que ficaria com você na pior porque sentiu que, com você, ela é gente e não recurso. Você transforma o que sente em algo que serve ao outro, em vez de afogar a si mesmo nisso.", "usoImaturo": "Imatura, a tristeza para de ser leitura e vira o lugar onde você mora. Você se fecha, se isola, rumina por dias o que se resolveria numa conversa de dez minutos. Leva tudo pro lado pessoal, uma crítica ao trabalho vira uma rejeição a quem você é. Some quando deveria conduzir, carrega como culpa o que não é sua responsabilidade, e contamina o ambiente com um peso que ninguém entende de onde vem. A sombra cobra caro: o time perde a referência justo na hora em que mais precisava dela, e você adoece de carregar o mundo nas costas.", "ferida": "No fundo mora o medo de não pertencer, de ser deixado de fora, de não fazer falta, de a porta se fechar e ninguém notar a sua ausência. Em geral vem de uma perda real, de uma rejeição que marcou, de um lugar onde você sentiu que o seu valor dependia de não incomodar. Por isso a rejeição te morde como pouca coisa morde: cada distância vira confirmação do que você mais teme. Você aprendeu a sentir tudo cedo, talvez porque sentir era o jeito de antecipar a próxima perda antes que ela chegasse.", "sofrimento": "Seu sofrimento recorrente tem nome: a falta. A ausência do que foi, o vazio do que poderia ter sido, a distância de quem você queria perto. Enquanto o mundo corre atrás do próximo, você fica olhando pra trás, sentindo o peso do que se perdeu pelo caminho, e isso te puxa pra baixo numa frequência que os outros raramente entendem. É o preço de sentir fundo: você também sente a falta fundo, e ela volta sem pedir licença.", "evolucao": "O caminho não é sentir menos, é decidir o que fazer com o que você sente. Aprenda a separar o que é seu do que você só está carregando pelos outros: nem todo peso na sala precisa virar peso seu. Vire a leitura em ação rápida, sentiu, fala, resolve, em vez de ruminar em silêncio até virar isolamento. E construa um lugar seguro pra processar (uma pessoa, um registro, um ritmo), pra que a profundidade vire conexão e direção, não retraimento. O ponto de virada é esse: sua sensibilidade serve quando ela sai de você pra alguém, e te afunda quando fica só rodando lá dentro.", "comoLiderar": "Quem lidera o Profundo precisa entender que ele sente antes de pensar, e que isso é um ativo raro, não um defeito a corrigir. Dê espaço pra ele processar antes de exigir resposta; pressão crua e pressa o empurram pra dentro de si. Valorize em voz alta a leitura fina que ele faz das pessoas e do ambiente, é informação que ninguém mais te dá. Mas ajude-o a não levar tudo pro lado pessoal e a soltar o peso que não é dele: separe com clareza o que é responsabilidade dele do que é só o clima da sala. E nunca o deixe sumir na hora difícil, chame, mostre que ele faz falta, porque a pior coisa que você pode fazer com quem teme não pertencer é confirmar o medo dele com o seu silêncio."}, "denso": {"emo": "tristeza", "voceE": "Profundo, sensível, leal, intenso.", "oQueMove": "Sentir fundo o que os outros passam batido.", "forcas": ["Lê o clima da sala antes de virar problema.", "Conecta pelo que dói, gera lealdade de verdade.", "Leva pessoa e decisão a sério, nunca como número.", "Presença que pesa sem precisar de barulho."], "pontosAtencao": ["Recolhe tudo pra dentro: carrega dor que não é sua.", "Some pro canto quando o time precisava de você na frente.", "Leva crítica ao trabalho como rejeição a quem você é."], "feridaCurta": "Rejeição, perda, não pertencer.", "sofrimentoCurto": "A falta, a ausência, o vazio.", "precisaDesenvolver": "virar a leitura em ação rápida, não em ruminação silenciosa.", "eviteComVoce": "pressa, pressão crua e deixá-la sumir na hora difícil.", "comoConduzir": ["Dê espaço pra processar antes de exigir resposta.", "Valorize em voz alta a leitura fina que ela faz das pessoas.", "Nunca a deixe sumir no momento duro, chame, mostre que faz falta."], "alavanca": "Nos próximos dias, sentiu algo na sala? Fala na hora, resolve em dez minutos o que viraria dias de ruminação."}}, "alegria": {"nome": "O Catalisador", "mercado": "Vivacidade", "frase": "Você acende o ambiente e leva todo mundo junto.", "curto": {"comportamentos": "Energiza, anima, vê o lado bom, mobiliza. Onde você entra, o astral muda.", "ferida": "Tédio, aprisionamento, não ser visto.", "sofrimento": "O peso, a monotonia, a rotina sem brilho.", "evolucao": "Profundidade sem perder a leveza. Terminar o que começa."}, "fundo": {"essencia": "Por baixo de tudo, você é movido por energia. Não a energia barata do animado de palestra, a sua é um motor que precisa de movimento pra existir, e que mobiliza gente sem esforço aparente. Onde você entra, o astral muda, a sala respira diferente, o que estava travado começa a andar. Mas entenda o que isso significa de verdade: você não busca alegria por vaidade, busca porque o peso e a estagnação te sufocam. Liderar, pra você, é contagiar, e essa é uma força rara, desde que você saiba o que fazer quando o entusiasmo não basta.", "comportamentos": "No dia a dia, você é quem puxa o time pra cima quando a coisa esfria, quem enxerga a saída quando todo mundo só vê o problema, quem transforma uma reunião morta em algo que anda. As pessoas te procuram pra recarregar, e você dá isso sem cobrar. Mas a mesma vivacidade tem sombra: você se anima com o começo e some no meio, troca o que é importante pelo que é empolgante, e quando o assunto fica pesado ou repetitivo, seu corpo já está procurando a próxima coisa. Quem trabalha com você sente os dois lados: o impulso que destrava e a dificuldade de te ver sentado no tédio necessário até o fim.", "usoMaduro": "Sua força aparece inteira quando você usa a energia pra mover o que está parado, e fica até o movimento virar resultado. O Catalisador maduro sabe que entusiasmo é gasolina, não destino: ele acende o time, emplaca o projeto travado, atravessa a crise mantendo a moral de pé, e depois tem disciplina pra terminar mesmo quando a graça já passou. Você não foge do sério, você o encara com leveza, que é coisa diferente. Nesse ponto você vira o líder que ninguém substitui: o que segura o astral sem mentir sobre a realidade, e que faz gente boa querer ficar perto.", "usoImaturo": "A sombra cobra caro quando a alegria deixa de ser sua ferramenta e vira sua fuga. Aí você dispersa, abre frente demais, larga o pesado no colo dos outros e se convence de que \"vai dar certo\" pra não precisar olhar o que está dando errado. Você confunde ânimo com progresso, e o time aprende que perto de você se começa muito e se termina pouco. O preço é silencioso: as pessoas param de levar seus arranques a sério, e o que parecia mobilização vira só barulho. A leveza que era força vira o jeito de não encarar o que dói.", "ferida": "No fundo mora o tédio e o aprisionamento, e, mais embaixo ainda, o medo de não ser visto. Em algum momento você aprendeu que o brilho garante o lugar: animado, você é querido; apagado, some do mapa. Por isso a monotonia não é só chata pra você, ela é uma pequena morte, te lembra de uma versão sua que ninguém olhava. A ferida morde exatamente aí: você corre do peso não por preguiça, mas porque ficar parado no que é cinzento mexe com um vazio antigo que você passou a vida fugindo.", "sofrimento": "Seu sofrimento recorrente é a rotina sem brilho e o peso que não passa. O que para os outros é só uma fase chata, pra você é insuportável de um jeito que você nem sempre explica. Você sofre quando a vida vira repetição, quando o trabalho perde graça, quando precisa estar presente em algo pesado e seu instinto inteiro grita pra ir embora. E sofre uma segunda vez, mais escondida: a culpa de ter abandonado coisas e gente porque a empolgação acabou.", "evolucao": "Seu caminho não é perder a leveza, é parar de usá-la como saída de emergência. Comece a medir entusiasmo por entrega, não por sensação: o que você terminou vale mais do que o que você acendeu. Treine ficar no tédio necessário de propósito, dez minutos de cada vez, até descobrir que o pesado não te mata, e que do outro lado dele existe uma profundidade que a euforia nunca te deu. Aprenda a diferença entre fugir do peso e atravessar o peso. O Catalisador que amadurece não vira sério; vira alguém cuja alegria as pessoas confiam, porque ela aguenta o real.", "comoLiderar": "Dê a ele palco e gente pra mobilizar, é onde rende o triplo. Use a energia dele pra destravar o que emperrou e pra segurar a moral nos momentos duros, que é função que poucos fazem bem. Mas não terceirize pra ele o acabamento sozinho: emparelhe-o com quem fecha o que ele abre, e cobre conclusão, não só largada. Evite enterrá-lo em rotina morta, você mata o que ele tem de melhor. E faça uma coisa que ele raramente recebe: mostre que você o vê mesmo quando ele não está brilhando. Tire o palco da equação e veja se o vínculo permanece, é isso que o liberta de performar pra existir."}, "denso": {"emo": "alegria", "voceE": "Energético, mobilizador, otimista, magnético", "oQueMove": "Mover o que está parado, e levar todo mundo junto.", "forcas": ["Acende o time quando a coisa esfria, sem esforço aparente.", "Enxerga a saída quando todo mundo só vê o problema.", "Destrava o que emperrou e faz reunião morta andar.", "Segura a moral na crise sem mentir sobre a realidade."], "pontosAtencao": ["Anima-se com o começo e some no meio, abre frente demais.", "Troca o que é importante pelo que é empolgante.", "Confunde ânimo com progresso e larga o pesado no colo dos outros."], "feridaCurta": "Tédio e aprisionamento, e, mais embaixo, o medo de não ser visto.", "sofrimentoCurto": "A rotina sem brilho e o peso que não passa.", "precisaDesenvolver": "Profundidade sem perder a leveza, e terminar o que começa, mesmo quando a graça já passou.", "eviteComVoce": "Enterrá-lo em rotina morta e cobrar só largada, você mata o que ele tem de melhor.", "comoConduzir": ["Dê palco e gente pra mobilizar, é onde rende o triplo.", "Emparelhe com quem fecha o que ele abre; cobre conclusão, não só largada.", "Mostre que você o vê mesmo quando ele não está brilhando."], "alavanca": "Nos próximos dias, escolha uma coisa que você já abriu e termine-a até o fim, mesmo depois que a empolgação passou."}}, "cuidado": {"nome": "O Cuidador", "mercado": "Acolhimento", "frase": "Você cuida de gente de verdade e constrói lealdade.", "curto": {"comportamentos": "Escuta, desenvolve, põe a pessoa antes da tarefa, protege quem é seu. As pessoas se sentem vistas.", "ferida": "Não ser necessário, abandono.", "sofrimento": "Dar e não receber de volta.", "evolucao": "Cuidar dos outros sem se esquecer de si."}, "fundo": {"essencia": "No fundo, o que te move é não deixar ninguém pra trás. Você sente o outro antes que ele fale, percebe quem está quebrado na reunião, quem não dormiu, quem está prestes a pedir as contas, e algo dentro de você não consegue ignorar isso. Pra você, gente não é recurso, é responsabilidade: cuidar é como você dá sentido ao que faz, e uma empresa onde as pessoas são tratadas como peça descartável te parece um fracasso, mesmo que dê lucro. Esse é o motor, desenvolver, proteger, nutrir, e quando bem usado, ele cria times que ficam, que vestem a camisa de verdade, que aguentam o tranco com você. Mas o mesmo motor, sem freio, te faz carregar gente que devia andar com as próprias pernas.", "comportamentos": "No dia a dia você escuta de verdade, lembra do nome do filho da pessoa, segura a barra de quem está mal e põe a pessoa antes da tarefa quando a coisa aperta. Quem trabalha com você se sente visto, e isso não é pouco, é a matéria-prima da lealdade. Mas a mesma mão que acolhe é a mão que tem dificuldade de cobrar: você adia a conversa dura pra não machucar, refaz o trabalho do outro pra poupá-lo do desconforto, e vai virando o depósito dos problemas de todo mundo. A luz é um time que confia em você; a sombra é um time que se acostuma a não ser cobrado, e te drena até não sobrar nada.", "usoMaduro": "Você maneja bem essa força quando entende que cuidar de verdade às vezes é não resolver pela pessoa. O cuidado maduro cobra: ele dá o feedback duro porque acredita que o outro aguenta crescer, segura o padrão porque sabe que blindar alguém da realidade é abandoná-lo de luva de pelica. Aqui você desenvolve gente em vez de só protegê-la, escuta, mas devolve a responsabilidade; acolhe, mas mantém a régua. É a sua maior força de líder: você constrói um time que confia em você o suficiente pra ouvir a verdade da sua boca, e isso quase ninguém consegue.", "usoImaturo": "A força te governa quando você confunde cuidar com não incomodar. Aí você se anula: aceita o inaceitável pra manter a paz, faz o trabalho dos outros pra ninguém sofrer, evita a conversa dura até o problema apodrecer. Você vira o gargalo, tudo passa por você porque você não delega de verdade, só absorve, e se esgota dando, dando, dando, esperando em silêncio um reconhecimento que raramente vem. O preço é alto: um time que não amadurece porque nunca foi cobrado, e um líder exausto, ressentido por dentro e incapaz de dizer o porquê. Cuidado que se anula não é generosidade, é uma conta que chega depois.", "ferida": "No fundo mora um medo antigo: o de não ser necessário. Em algum momento você aprendeu que seu lugar no mundo se ganha servindo, que ser útil é a condição pra ser querido, e que se você parar de dar, param de te querer. Por isso o abandono te apavora mais do que o cansaço, e por isso você prefere se esgotar a arriscar não ser preciso. Essa ferida morde exatamente quando você mais precisa de descanso: a culpa de se priorizar parece prova de que você é egoísta, quando na verdade é só você, pela primeira vez, sendo gente também.", "sofrimento": "Seu sofrimento recorrente é dar muito e receber pouco de volta, e nunca cobrar isso em voz alta. Você se desdobra pelos outros e fica esperando uma reciprocidade que ninguém combinou com você, então o ressentimento se acumula calado, debaixo do sorriso. Dói ver que quem você carregou seguiu em frente sem olhar pra trás, e dói mais ainda perceber que parte da conta você mesmo criou, ao ensinar todo mundo que com você não tem cobrança, só acolhimento.", "evolucao": "O caminho é entender que cuidar dos outros sem se incluir na conta não é virtude, é uma fuga elegante de si. Comece a tratar a cobrança como um ato de cuidado, não o contrário dele: quem te respeita aguenta ouvir a verdade, e poupar alguém do desconforto de crescer é a forma mais educada de atrasá-lo. Estabeleça o limite antes do esgotamento, não depois; aprenda a devolver o problema pra mão de quem é dono dele; e pratique pedir, não só dar, porque um líder que nunca precisa de nada também nunca deixa ninguém retribuir. Maturidade aqui tem nome: cuidar com régua.", "comoLiderar": "Reconheça o cuidado que essa pessoa dá, ela quase nunca cobra por isso, e some por dentro quando passa despercebido. Mas não a deixe virar o pano de prato de todos: proteja o tempo dela, devolva pros donos os problemas que não são dela, e cobre dela uma coisa específica, que ela cobre os outros. Dê a ela permissão explícita pra ser dura, porque ela sente que precisa de licença pra isso. O que evitar: empilhar mais gente carente em cima dela achando que ela aguenta, e confundir a disposição de servir com obrigação de se anular. O melhor que você faz por ela é mostrar que ela continua querida mesmo quando diz não."}, "denso": {"emo": "cuidado", "voceE": "Acolhedor, leal, atento, generoso", "oQueMove": "Não deixar ninguém pra trás, gente é responsabilidade, não recurso.", "forcas": ["Escuta de verdade e enxerga o outro antes de ele falar", "Constrói lealdade, time que fica e veste a camisa", "Desenvolve e protege gente: as pessoas se sentem vistas", "Põe a pessoa antes da tarefa quando aperta"], "pontosAtencao": ["Tem dificuldade de cobrar, adia a conversa dura pra não machucar", "Vira o gargalo: absorve o problema de todo mundo e não delega", "Se esgota dando, dando, dando, e espera reconhecimento em silêncio"], "feridaCurta": "O medo de não ser necessário, e o abandono que vem junto.", "sofrimentoCurto": "Dar muito, receber pouco, e nunca cobrar em voz alta.", "precisaDesenvolver": "cuidar com régua, incluir a si mesmo na conta e tratar a cobrança como cuidado.", "eviteComVoce": "empilhar mais gente carente sobre ela achando que aguenta, e confundir disposição de servir com obrigação de se anular.", "comoConduzir": ["Reconheça em voz alta o cuidado dela, ela some por dentro quando passa despercebido", "Devolva pros donos os problemas que não são dela e proteja o tempo dela", "Cobre dela uma coisa: que ela cobre os outros, dê licença pra ser dura"], "alavanca": "Nos próximos dias, tenha a conversa dura que você vem adiando, e estabeleça um limite antes do esgotamento, não depois."}}, "busca": {"nome": "O Explorador", "mercado": "Curiosidade", "frase": "Você vive atrás do novo e não se acomoda.", "curto": {"comportamentos": "Explora, questiona, inventa, quer aprender. Traz o que ninguém tinha pensado, e às vezes abre frente demais.", "ferida": "Limitação, ficar pra trás, não saber.", "sofrimento": "Nunca é suficiente; sempre falta a próxima fronteira.", "evolucao": "Presença no agora, não só na próxima fronteira."}, "fundo": {"essencia": "No fundo, o que te move não é o dinheiro nem o aplauso: é a descoberta. Você é um líder que enxerga o que ainda não existe e não consegue ficar parado enquanto tem terreno pra explorar, pergunta pra fazer, jeito novo pra testar. O motor por baixo de tudo é uma fome de fronteira, o conhecido te entedia rápido, e é justamente nesse desconforto com o \"já resolvido\" que mora a sua maior força. Você não lidera para conservar; você lidera para abrir caminho.", "comportamentos": "No dia a dia você é a pessoa que chega com a ideia que ninguém tinha pensado, que questiona o processo que todo mundo já aceitou, que larga o que está funcionando só pra ver se existe um jeito melhor. Sua mesa vive cheia de frentes abertas, livros pela metade, projetos que começaram empolgados e esperam um final. Essa é a luz e a sombra na mesma moeda: a mesma inquietação que faz você inovar é a que faz você dispersar. Quem trabalha com você nunca sabe se vai pegar o você que termina ou o você que já está de olho na próxima coisa antes desta fechar.", "usoMaduro": "Você está no seu melhor quando a curiosidade tem foco e linha de chegada, quando explora E entrega, não só explora. Aí você vira o cara que enxerga a oportunidade antes do mercado, que traz o repertório que destrava o problema dos outros, que tem coragem de abandonar o conforto do que já dá certo para construir o próximo patamar. A maturidade aqui não é matar a fome de novo; é colocar rédea nela: escolher poucas frentes, ir até o fim, e deixar que a profundidade, não só a quantidade de ideias, seja a sua marca. Curiosidade que termina é vantagem competitiva. Curiosidade que só abre é hobby caro.", "usoImaturo": "A sombra aparece quando a força passa a te governar: você abre frente demais, começa tudo e fecha pouco, e a empresa vira um campo de obras sem nenhum prédio entregue. O novo deixa de ser ferramenta e vira fuga, toda vez que um projeto entra na parte chata, na execução repetitiva que dá resultado, você já arrumou um motivo pra pular pro próximo. Pior: nada nunca é suficiente, então mesmo o que deu certo você desmancha por tédio, trocando o que funciona pelo que é só mais interessante. O time cansa de remar atrás das suas viradas de mesa, e o que parecia visão começa a parecer falta de palavra.", "ferida": "A ferida central é o medo de ficar pequeno, preso, pra trás. Em algum momento ficar limitado, sem saber, sem poder explorar, encaixotado numa rotina ou numa caixinha, doeu o suficiente pra você jurar que nunca mais. Por isso a parte de você que busca não está só atrás de novidade: está fugindo da sensação de estagnar, de ser ultrapassado, de não ser mais relevante. É uma ferida que morde justamente no sucesso, quanto mais você conquista, mais rápido aquilo vira \"velho\", e mais cedo bate o pavor de ter parado no tempo.", "sofrimento": "O seu sofrimento recorrente é que nunca é suficiente. Você chega no topo de uma montanha e, em vez de descansar, já está incomodado com a próxima que apareceu no horizonte. Isso te tira o gosto do que já foi conquistado, a vitória dura um café, e o vazio do \"e agora?\" volta rápido. Você vive um pouco no futuro o tempo todo, e isso cobra um preço: o presente, que era pra ser o prêmio, passa quase sem você perceber.", "evolucao": "O caminho não é apagar a fome de novo, é ensinar ela a terminar. Concretamente: escolha menos frentes e proteja-as até a entrega, porque uma coisa acabada vale mais do que dez começadas. Treine a presença no agora, comemorar o que ficou pronto, sentir o resultado antes de correr pro próximo, perceber que aprofundar uma coisa também é uma forma de explorar. E aprenda a delegar a parte repetitiva sem abandoná-la: o que te entedia pode ser justamente o que sustenta a casa. Sua evolução é virar o líder que descobre e consolida, não o que vive trocando de fronteira e nunca planta bandeira em nenhuma.", "comoLiderar": "Quem lidera um Explorador precisa entender uma coisa: prendê-lo na rotina é matá-lo aos poucos. Dê problema novo, terreno pra inventar, espaço pra questionar, é assim que você extrai o melhor dele. Mas seja o contrapeso que ele não tem sozinho: ajude-o a fechar antes de abrir a próxima frente, cobre entrega, não só ideia, e mostre que terminar é tão valioso quanto descobrir. Evite duas coisas, sufocá-lo com processo engessado, que o faz desligar, e ceder a cada nova empolgação dele, que enche a empresa de obras inacabadas. Dê liberdade com linha de chegada: é nesse cabresto que a curiosidade dele vira resultado em vez de bagunça."}, "denso": {"emo": "busca", "voceE": "Inquieto, inventivo, ousado, insaciável.", "oQueMove": "Fome de fronteira: enxergar o que ainda não existe e ir atrás.", "forcas": ["Enxerga a oportunidade antes do mercado ver.", "Traz a ideia que ninguém na mesa tinha pensado.", "Questiona o processo que todo mundo já aceitou como dado.", "Larga o conforto do que funciona pra construir o próximo patamar."], "pontosAtencao": ["Abre frente demais: começa muito, termina pouco.", "Foge da execução repetitiva, justo a parte que dá resultado.", "Desmancha o que já deu certo só por tédio."], "feridaCurta": "Medo de ficar pequeno, preso, ultrapassado.", "sofrimentoCurto": "Nunca é suficiente, a vitória dura um café e o vazio do \"e agora?\" volta.", "precisaDesenvolver": "Presença no agora, terminar e consolidar, não só abrir a próxima fronteira.", "eviteComVoce": "Prendê-lo na rotina engessada ou ceder a cada nova empolgação dele.", "comoConduzir": ["Dê problema novo e terreno pra inventar, é onde ele rende.", "Seja o contrapeso: cobre entrega e conclusão, não só ideia.", "Liberdade com linha de chegada, fechar antes de abrir a próxima."], "alavanca": "Nos próximos dias, escolha uma frente aberta e leve até o fim antes de iniciar qualquer outra."}}};

/* flexão de gênero: dicionário curado (frases exatas do nosso conteúdo) + pronomes. Aplicado só quando gen==='f'. */
function flexG(s){
  const D=[["movido por","movida por"],["líder caloroso e aberto","líder calorosa e aberta"],["líder intenso e guardado","líder intensa e guardada"],
    ["é puxado por outras","é puxada por outras"],["ser levado por ela","ser levada por ela"],["de ser levado","de ser levada"],
    ["Ser abandonado","Ser abandonada"],["visto como fraco","vista como fraca"],["pego desprevenido","pega desprevenida"],
    ["preso, pequeno, ultrapassado","presa, pequena, ultrapassada"],["ser rejeitado","ser rejeitada"],["isolado e apagado","isolada e apagada"],
    ["Esgotado e ressentido","Esgotada e ressentida"],["entediado e irritado","entediada e irritada"],["não ser visto de verdade","não ser vista de verdade"],
    ["de não ser necessário","de não ser necessária"],["nenhuma força o domina","nenhuma força a domina"]];
  D.forEach(([a,b])=>{ s=s.split(a).join(b); });
  s=s.replace(/\bdele\b/g,"dela").replace(/\bnele\b/g,"nela").replace(/\bele\b/g,"ela").replace(/-lo\b/g,"-la");
  return s;
}
function analyze(st){
  const cn=e=>st.emo[e].cen, mt=e=>st.emo[e].mat;
  const ord=EMO.slice().sort((a,b)=>cn(b)-cn(a));
  const qd=e=>{ const c=cn(e),m=mt(e);
    if(c>=HICEN){ if(m>=3)return 'g'; if(m<=-3)return 'r'; return 'gb'; }
    if(c<=LOWCEN){ if(m>=3)return 'b'; if(m<=-3)return 'k'; return 'kb'; }
    return 'mid'; };
  const Q={}; EMO.forEach(e=>Q[e]=qd(e));
  const green=ord.filter(e=>Q[e]==='g'), red=ord.filter(e=>Q[e]==='r'), hiBuild=ord.filter(e=>Q[e]==='gb');
  const lows=ord.filter(e=>cn(e)<=LOWCEN);
  const dom=ord[0], sec=ord[1];
  const exp=cn('alegria')+cn('cuidado')+cn('busca'), con=cn('raiva')+cn('medo')+cn('tristeza');
  const temp= (exp-con>10)?'exp':((con-exp>10)?'con':'bal');
  const cens=ord.map(cn), ampl=cn(dom)-(cens[2]+cens[3])/2;   /* pico − mediana: robusto a um único piso fundo (pico − vale era refém do outlier) */
  const mats=EMO.map(mt), reg=(Math.max(...mats)-Math.min(...mats))>=6?'irregular':'solida';
  const hi=e=>cn(e)>=HICEN, tens=[], alli=[];
  const duoKey=[dom,sec].sort().join('|'), duo=PAIRS[duoKey]||null;   /* o par da identidade enriquece o combo, não repete nas "forças juntas" */
  for(let i=0;i<EMO.length;i++)for(let j=i+1;j<EMO.length;j++){
    const a=EMO[i],b=EMO[j]; if(!(hi(a)&&hi(b)))continue;
    const key=[a,b].sort().join('|'); if(key===duoKey)continue;
    const p=PAIRS[key]; if(!p)continue;
    (p.k==='t'?tens:alli).push({t:p.t,x:p.x});
  }
  const lac=cn(dom)-cn(sec);   /* lacuna 1º–2º: ≤3 mistura de verdade; ≥10 dominante com tempero */
  const flat=(green.length+red.length+hiBuild.length===0);   /* perfil plano: nenhuma força acima do corte. Equilíbrio é leitura própria, não ausência de conteúdo */
  const bestMat=EMO.slice().sort((a,b)=>mt(b)-mt(a))[0], worstMat=EMO.slice().sort((a,b)=>mt(a)-mt(b))[0];
  return {ord,dom,sec,Q,green,red,hiBuild,lows,temp,exp,con,ampl,reg,tens,alli,duo,lac,flat,bestMat,worstMat,
    nome:(NOMES[dom]&&NOMES[dom][sec])||"O Líder", essencia:IDN[dom]+" que "+MOD[sec],
    band: st.reg>=32?'hi':(st.reg<=18?'lo':'mid') };
}

    else if(q.type==="freq"){ if(typeof a==="number"&&a>=1&&a<=5){ const v=(q.good?(a-3):(3-a)); mat[q.emo]+=v; matc[q.emo]++; allM+=v; allN++; if(q.gov){govS+=v; govN++;} } }
  });
  const st={emo:{}}; EMO.forEach(e=>{ const c=Math.max(10,Math.min(40,Math.round(10+(cen[e]+12)/24*30)));  /* faixa 10..40: piso 10 (sem zero num circuito primario), teto 40 (extremos 0-10 e 40-50 sao raros) */
    const m=matc[e]?Math.round(mat[e]/(matc[e]*2)*10):0; st.emo[e]={cen:c,mat:Math.max(-10,Math.min(10,m))}; });
  const spine=govN?(govS/(govN*2)):0, supp=allN?(allM/(allN*2)):0;   // cada um em -1..1
  const g01=0.6*spine+0.4*supp;                                       // mistura ponderada
  st.reg=Math.max(10,Math.min(40,Math.round(10+(g01+1)/2*30)));        // faixa 10..40 (mesma do resto)
  return st;
}

const Q = buildQuestions(); const N = Q.length;

/* via link: #r=<base64> = relatório (espelho); #g=<base64> = Guia de Condução (pra quem lidera). Payload {n,g,c[6],m[6],r} */
function loadFromHash(){ try{
  const mt=(location.hash||"").match(/^#(r|g)=(.+)$/); if(!mt) return false;
  GUIA=(mt[1]==="g");
  const j=JSON.parse(decodeURIComponent(escape(atob(mt[2].replace(/-/g,'+').replace(/_/g,'/')))));
  if(!j||!Array.isArray(j.c)||j.c.length!==6) return false;
  const st={emo:{}}; EMO.forEach((e,i)=>{ st.emo[e]={cen:j.c[i],mat:j.m[i]}; }); st.reg=j.r;
  FORCED_ST=st; nome=j.n||""; gen=(j.g==='f')?'f':'m'; return true;
}catch(e){ return false; } }
const app=document.getElementById("app");
const $top=document.getElementById("top"), $bar=document.getElementById("bar"), $pct=document.getElementById("pct");

function progress(){ const s = step===0?0:(step>N?100:Math.round(step/(N+1)*100)); $bar.style.width=s+"%"; $pct.textContent=s+"%"; $top.classList.toggle("show",step>0&&step<=N); }
function paint(html,cls){ app.innerHTML=`<section class="screen ${cls||"enter"}">${html}</section>`; }
function transition(next){ const s=app.firstElementChild; if(s){s.classList.add("leaving"); setTimeout(next,200);} else next(); }
function goto(s){ step=Math.max(0,s); window.scrollTo({top:0,behavior:"instant"}); render(); }
function render(){ progress(); if(step===0) return Intro(); if(step>=1&&step<=N) return Question(step-1); return GUIA?renderGuia():Report(); }

function Question(i){

  let body;
  if(q.type==="q4"){
    body=`<div class="q4hint" id="q4h"></div><div class="opts">${q.opts.map((o,k)=>`<button class="opt q4o" data-k="${k}"><span class="key">${String.fromCharCode(65+k)}</span><span>${o.t}</span></button>`).join("")}</div>`;
  } else if(q.type==="freq"){
    body=`<div class="scale">${FREQ.map((l,k)=>`<b class="${cur===k+1?"sel":""}" data-v="${k+1}">${l}</b>`).join("")}</div>`;
  } else {
    body=`<div class="opts">${q.opts.map((o,k)=>`<button class="opt ${cur===k?"sel":""}" data-k="${k}"><span class="key">${String.fromCharCode(65+k)}</span><span>${o.t}</span></button>`).join("")}</div>
      ${q.fc?"":'<button class="skip" data-k="skip">nenhuma combina comigo</button>'}`;
  }
  const cheer = CHEERS[i] ? `<div class="cheer">${CHEERS[i]}</div>` : "";
  paint(`
    <div class="qhead"><span class="qnum">${i+1} <span>/ ${N}</span></span><span class="chip">${ic} ${q.area}</span></div>
    <div class="qtext">${q.texto}</div>${body}${cheer}
    <div class="nav">${i>0?`<button class="back" id="bk">← voltar</button>`:""}</div>`);
  const choose = val => { ans[i]=val; // re-marca visual
    app.querySelectorAll(".opt,.scale b").forEach(el=>el.classList.remove("sel"));
    const sel = q.type==="freq" ? app.querySelector(`.scale b[data-v="${val}"]`) : app.querySelector(`.opt[data-k="${val}"]`);
    if(sel) sel.classList.add("sel");
    setTimeout(()=>transition(()=>goto(step+1)),230);
  };
  if(q.type==="q4"){
    let most=(cur&&cur.most!=null)?cur.most:null, least=(cur&&cur.least!=null)?cur.least:null;
    const hint=document.getElementById("q4h");
    const refresh=()=>{ app.querySelectorAll(".q4o").forEach((b,k)=>{ b.classList.toggle("most",k===most); b.classList.toggle("least",k===least); const kb=b.querySelector(".key"); kb.textContent=(k===most)?"✓":(k===least)?"✗":String.fromCharCode(65+k); }); hint.innerHTML=(most==null)?"Toque na que <b>MAIS</b> é a sua cara":"Agora a que <b>MENOS</b> é a sua cara"; };
    app.querySelectorAll(".q4o").forEach((b,k)=>b.onclick=()=>{ if(k===most){most=null;least=null;refresh();return;} if(most==null){most=k;refresh();} else if(k!==most){least=k;ans[i]={most,least};refresh();setTimeout(()=>transition(()=>goto(step+1)),280);} });
    refresh();
  } else {
  app.querySelectorAll(".opt").forEach(b=>b.onclick=()=>choose(b.dataset.k==="skip"?"skip":+b.dataset.k));
  }
  app.querySelectorAll(".scale b").forEach(b=>b.onclick=()=>choose(+b.dataset.v));
  const sk=app.querySelector(".skip"); if(sk) sk.onclick=()=>choose("skip");
  const bk=document.getElementById("bk"); if(bk) bk.onclick=()=>transition(()=>goto(step-1));
}

    return location.origin+location.pathname+'#'+pfx+'='+b; };
  const feridaHTML = V.lac<=3 && C[sec].denso && C[sec].denso.feridaCurta
    ? `<p>${D.feridaCurta}</p><p>E, empatada com ela, a ferida do segundo eixo: ${C[sec].denso.feridaCurta.charAt(0).toLowerCase()+C[sec].denso.feridaCurta.slice(1)}</p>`
    : `<p>${D.feridaCurta}</p>`;
  const _html=`<section class="screen enter stagger">
    <div class="eyebrow">O seu mapa de forças</div>
    <h1>Você é <span class="it">${nomeX}</span></h1>
    <p class="sub">${cap(essX)}. Abaixo, o seu mapa lido por inteiro: cada força, como você a usa, e onde isso te leva.</p>
    ${em30}
    <div class="obra"><div class="eixo"><span>O que mais te move</span><b>de 0 a 50</b></div>${chart}<div class="qleg"><span class="qd g"></span>domina <span class="qd r"></span>te domina <span class="qd lo"></span>piso/ponto cego</div><div class="eixleg">O <b>tamanho</b> da barra é o quanto te move. A <b>cor</b> é como você usa: verde você domina, vermelho te domina.</div></div>
    ${combinaHTML}
    ${bizHTML}
    ${flatHTML}
    ${superHTML}
    ${materiaHTML}
    ${sabHTML}
    ${cegoHTML}
    ${combosHTML}
    ${aggHTML}
    ${regBand}
    ${planoHTML}
    <div class="lyr w"><span class="h">A ferida por baixo</span>${feridaHTML}</div>
    <div class="agora"><div class="ak2">E agora? Os próximos 90 dias</div>
      <div class="arow2"><span class="an">1</span><p><b>Esta semana:</b> ${D.alavanca}</p></div>
      <div class="arow2"><span class="an">2</span><p><b>Mostre o seu mapa</b> pro seu sócio ou pra quem trabalha do seu lado, e pergunte: "bate?". O olhar de fora confirma (ou corrige) o espelho.</p></div>
      <div class="arow2"><span class="an">3</span><p><b>Refaça em 90 dias</b> (${new Date(Date.now()+90*864e5).toLocaleDateString('pt-BR')}). O quanto te move muda pouco; o COMO você usa sobe com prática. É esse número que você quer ver se mexer.</p></div>
      <div class="abtns"><button class="btn2" id="cpMapa">Copiar link do meu mapa</button><button class="btn2" id="cpGuia">Copiar o Guia de Condução (pra quem te lidera)</button></div>
    </div>
    <div class="close">${Nm}, uma força não é boa nem ruim; o que muda tudo é o uso. O seu mapa não é um rótulo, é onde mexer primeiro.</div>
    <div class="row"><button class="btn gold" onclick="window.print()">Salvar / imprimir</button><button class="btn ghost" id="redo">Refazer</button></div>
    <div class="foot"><b>Instituto ELOS</b> · ELO Assessment<br>O Mapa das Forças · V4.3</div>
    <div class="plink">O seu mapa vivo (abra este link pra ver a versão sempre atualizada e gerar o Guia de Condução):<br>${mkLink('r')}</div>
  </section>`;
  app.innerHTML = gen==='f' ? flexG(_html) : _html;
  setTimeout(()=>app.querySelectorAll(".fbar i,.reg .rbar i").forEach(n=>{n.style.width=n.dataset.w+"%";}),120);
  document.getElementById("redo").onclick=()=>{ for(const k in ans) delete ans[k]; step=0; window.scrollTo({top:0}); transition(render); };
  const wire=(id,pfx,lbl)=>{ const b=document.getElementById(id); if(!b) return;
    b.onclick=()=>{ navigator.clipboard.writeText(mkLink(pfx)).then(()=>{ b.textContent='Copiado ✓'; setTimeout(()=>b.textContent=lbl,1800); }); }; };
  wire('cpMapa','r','Copiar link do meu mapa');
  wire('cpGuia','g','Copiar o Guia de Condução (pra quem te lidera)');
}
/* ══════════ GUIA DE CONDUÇÃO (visão pra quem lidera) ══════════ */
function renderGuia(){
  const st=FORCED_ST||score(), Nm=nome||"Esta pessoa", C=CONTENT, V=analyze(st);
  const dom=V.dom, sec=V.sec, A=C[dom], D=A.denso, cn=e=>st.emo[e].cen;
  const bul=a=>`<ul class="bul">${(a||[]).map(x=>`<li>${x}</li>`).join("")}</ul>`;
  const frow=e=>{ const s=st.emo[e],b=C[e],pri=(e===dom);
    return `<div class="frow ${pri?'pri':''}"><span class="fn"><b>${b.mercado}</b><i>${GLOSS[e]||''}</i></span><span class="fbar q-${V.Q[e]}"><i data-w="${Math.max(2,s.cen*2)}"></i></span><span class="fnum">${s.cen}</span></div>`;};
  const mn=MANUAL[dom]||{}, al=ALERTA[dom]||{}, dl=DELEGAR[dom]||{}, mo=MOTIVADOR[dom]||{}, me=MEDO[dom]||{};
  const mo2=MOTIVADOR[sec]||{}, mn2=MANUAL[sec]||{};   /* o tempero do 2º eixo: o kit não pode ser dominante-only */
  const nomeX=(gen==='f'&&NOMESF[dom]&&NOMESF[dom][sec])||V.nome;
  const essX=((gen==='f'?IDNF[dom]:IDN[dom])||'')+" que "+MOD[sec];
  const superG = V.green.length?`<div class="lbl">Onde ${Nm} brilha (forças que domina)</div><div class="qbox g">${V.green.map(e=>`<div class="qrow"><b>${C[e].mercado}.</b> ${cap(QUAD[e].g)}.</div>`).join("")}</div>`:"";
  const materiaG = V.hiBuild.length?`<div class="lbl">A matéria-prima de ${Nm}</div><div class="qbox a">${V.hiBuild.map(e=>`<div class="qrow"><b>${C[e].mercado}.</b> Força de sobra, lapidação em curso. Lapidada, ${QUAD[e].g}. Sob pressão, ainda escorrega pra ${SB[e]}.</div>`).join("")}<div class="qsint">Não trate como defeito: é a força que já move ${Nm} antes de dominá-la. Lapidar isso é o maior retorno que você tem como líder.</div></div>`:"";
  const sabG = V.red.length?`<div class="lbl">Onde ${Nm} se sabota</div><div class="qbox r">${V.red.map(e=>`<div class="qrow"><b>${C[e].mercado}.</b> ${cap(QUAD[e].r)}.</div>`).join("")}<div class="qtom">${st.reg<=18?'Hoje ativo: a Maestria baixa deixa isso à mostra.':(st.reg>=32?'Risco latente: a Maestria segura, mas fique de olho.':'Oscila com a pressão: nos dias tensos, é isso que aparece.')}</div></div>`:(V.hiBuild.length?"":`<div class="lyr"><span class="h">Onde ${Nm} se sabota</span><p>Raro: nenhuma força o domina hoje. O risco é depender demais das que já funcionam.</p></div>`);
  /* modulador de feedback: o vetor muda como a pessoa recebe dureza (não só o dominante) */
  const fbMod=[];
  if(cn('medo')>=25) fbMod.push("Pressão direta funciona no curto prazo (o medo responde com entrega), mas cobra juros em ansiedade. Use com parcimônia e feche sempre reafirmando a confiança.");
  if(cn('raiva')>=25) fbMod.push("Aguenta franqueza dura melhor que a maioria; rodeio é o que irrita.");
  if(cn('tristeza')>=25) fbMod.push("Feedback em público custa caro pra essa pessoa; em particular, sempre.");
  const fbModHTML = fbMod.length?`<div class="falta"><div class="fk">Como a dureza cai nessa pessoa</div><ul>${fbMod.slice(0,2).map(x=>`<li>${x}</li>`).join("")}</ul></div>`:"";
  const _g=`<section class="screen enter stagger">
    <div class="eyebrow">Guia de Condução · pra quem lidera</div>
    <h1>Como conduzir <span class="it">${Nm}</span></h1>
    <p class="sub">O mapa de operação de <b>${Nm}</b>: quem é, o que move, como tirar o melhor, o que evitar e quando intervir.</p>
    <div class="hero"><div class="k">O tipo</div><div class="name">${nomeX}</div><p>${C[dom].mercado} + ${C[sec].mercado}. ${cap(essX)}.</p></div>
    <div class="obra"><div class="eixo"><span>O que mais move ${Nm}</span><b>de 0 a 50</b></div>${EMO.map(frow).join("")}<div class="qleg"><span class="qd g"></span>domina <span class="qd r"></span>te domina <span class="qd lo"></span>piso/ponto cego</div></div>
    <div class="lyr"><span class="h">Quem é</span><p>${cap(essX)}. ${TEMP[V.temp]}</p><p>${REGT[V.reg]}</p></div>
    ${superG}
    ${materiaG}
    ${sabG}
    <div class="cols">
      <div class="cbox motiv"><span class="h">🎯 O maior motivador</span><p>${mo.o||""}</p><p class="csub"><b>Como usar:</b> ${mo.como||""}</p><p class="csub"><b>Segundo motor (${C[sec].mercado}):</b> ${(mo2.o||"").charAt(0).toLowerCase()+(mo2.o||"").slice(1)}</p></div>
      <div class="cbox medo"><span class="h">🚫 O maior medo, não acione</span><p>${me.o||""}</p><p class="csub"><b>Evite:</b> ${me.evite||""}</p></div>
    </div>
    <div class="lbl">Como dar feedback</div>
    <div class="cols">
      <div class="cbox do"><span class="h">✓ O que falar</span>${bul(FBDO[dom])}</div>
      <div class="cbox dont"><span class="h">✕ O que NÃO falar</span>${bul(FBDONT[dom])}</div>
    </div>
    ${fbModHTML}
    <div class="manual"><div class="mk">Como trabalhar com ${Nm}</div>
      <div class="mrow"><b>O que evitar</b><p>${mn.ev||""}</p></div>
      <div class="mrow"><b>O ambiente que faz render</b><p>${mn.am||""}</p></div>
      <div class="mrow"><b>Como delegar</b><p><b class="ok2">Dê:</b> ${dl.serve||""} <b class="no2">Mantenha longe:</b> ${dl.longe||""}</p></div>
      <div class="mrow"><b>O tempero do 2º eixo (${C[sec].mercado})</b><p>${mn2.fb||""}</p></div>
    </div>
    <div class="prio big"><div class="k">🔑 Como extrair o máximo</div><p>${EXTRAIR[dom]||""}</p></div>
    <div class="alerta"><div class="ak">⚠ Sinais de alerta, quando caiu na sombra</div>
      <div class="arow"><b>Você percebe assim</b><p>${al.sinal||""}</p></div>
      <div class="arow"><b>O que fazer</b><p>${al.acao||""}</p></div>
    </div>
    ${V.lows.length?`<div class="falta"><div class="fk">O ponto cego: o que falta em ${Nm}</div><ul>${V.lows.map(e=>`<li><b>${C[e].mercado}.</b> ${cap(QUAD[e][V.Q[e]==='k'?'k':(V.Q[e]==='b'?'b':'n')])}.<span class="cmp">↳ cerque com ${COMPLEMENT[e]}</span></li>`).join("")}</ul></div>`:""}
    ${(V.tens.length||V.alli.length)?`<div class="combos"><div class="ck">O que as forças dizem juntas</div>${V.alli.map(o=>`<div class="cmb"><b>🔗 ${o.t}</b><p>${o.x}.</p></div>`).join("")}${V.tens.map(o=>`<div class="cmb"><b>⚡ ${o.t}</b><p>${o.x}.</p></div>`).join("")}</div>`:""}
    <div class="prio"><div class="k">💬 A conversa que destrava</div><p>“${CONVERSA[dom]||""}”</p></div>
    <div class="prio"><div class="k">🏆 Como reconhecer de um jeito que importa</div><p>${RECONHECER[dom]||""}</p></div>
    <div class="close">${Nm} não é um rótulo. Este guia é onde apoiar, o que evitar e como conduzir. O resto é presença.</div>
    <div class="row"><button class="btn gold" onclick="window.print()">Salvar / imprimir</button></div>
    <div class="foot"><b>Instituto ELOS</b> · ELO Assessment<br>Guia de Condução · V4.3</div>
  </section>`;
  app.innerHTML = gen==='f' ? flexG(_g) : _g;
  setTimeout(()=>app.querySelectorAll(".fbar i").forEach(n=>{n.style.width=n.dataset.w+"%";}),120);
}
if(loadFromHash()) step=N+1;
render();
</script>
</body>
</html>
